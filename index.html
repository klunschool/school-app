  const [classFilter,setClassFilter]=useState("");
  const [expanded,setExpanded]=useState("");
  const [accountDetails,setAccountDetails]=useState({});
  const load=async()=>{
    setLoading(true);setErr("");
    try{const rows=await sbFetch("rpc/list_parent_link_requests",{method:"POST",token,body:"{}"});setItems(rows||[]);}
    catch(e){setErr(e.message||"โหลดคำขอไม่สำเร็จ");}
    finally{setLoading(false);}
  };
  useEffect(()=>{load();},[token]);
  const review=async(id,decision)=>{
    setBusy(id+decision);setErr("");
    try{
      await sbFetch("rpc/review_parent_link_request",{method:"POST",token,body:JSON.stringify({p_request_id:id,p_decision:decision})});
      if(decision==="approved"){
        try{
          await notifyParentApproved(id,token);
        }catch(mailError){
          setErr(tx("อนุมัติบัญชีแล้ว แต่ส่งอีเมลไม่สำเร็จ: ","Account approved, but the email could not be sent: ")+(mailError.message||""));
        }
      }
      await load();
    }catch(e){setErr(e.message||"บันทึกผลไม่สำเร็จ");}
    finally{setBusy("");}
  };
  const toggleDetails=async(x)=>{
    if(expanded===x.request_id){setExpanded("");return;}
    setExpanded(x.request_id);
    if(accountDetails[x.parent_id])return;
    try{
      const detail=await sbFetch("rpc/get_parent_account_details",{method:"POST",token,body:JSON.stringify({p_parent_id:x.parent_id})});
      setAccountDetails(p=>({...p,[x.parent_id]:detail}));
    }catch(e){setAccountDetails(p=>({...p,[x.parent_id]:{error:e.message||tx("โหลดรายละเอียดไม่สำเร็จ","Could not load details")}}));}
  };
  if(loading)return <Spin/>;
  const label={pending:"รอตรวจ",approved:"อนุมัติแล้ว",rejected:"ไม่อนุมัติ"};
  const color={pending:C.yellow,approved:C.green,rejected:C.red};
  const classes=Array.from(new Map(items.filter(x=>x.class_id).map(x=>[String(x.class_id),x.class_name||"-"])).entries()).sort((a,b)=>a[1].localeCompare(b[1],"th"));
  const visibleItems=classFilter?items.filter(x=>String(x.class_id)===classFilter):items;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:16,fontWeight:800,color:C.navy}}>👪 คำขอผูกบัญชีผู้ปกครอง</div>
        <div style={{fontSize:12,color:C.g400,marginTop:3}}>ตรวจสอบข้อมูลก่อนอนุมัติให้เข้าถึงข้อมูลนักเรียน</div>
        <select value={classFilter} onChange={e=>setClassFilter(e.target.value)} style={{width:"100%",marginTop:12,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,background:C.white,color:C.navy,fontSize:14,fontWeight:700}}>
          <option value="">{tx("ทุกห้อง","All classes")}</option>
          {classes.map(([id,name])=><option key={id} value={id}>{name}</option>)}
        </select>
      </div>
      {err&&<div style={{background:C.redL,color:C.red,borderRadius:10,padding:11,fontSize:13,fontWeight:700}}>⚠️ {err}</div>}
      {visibleItems.length===0?<div style={{background:C.white,borderRadius:16}}><Empty icon="✅" msg={tx("ไม่มีคำขอในห้องที่เลือก","No requests in the selected class")}/></div>:visibleItems.map(x=>(
        <div key={x.request_id} style={{background:C.white,borderRadius:14,padding:15,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
            <div style={{fontWeight:800,color:C.navy,fontSize:14}}>{x.student_name}</div>
            <span style={{color:color[x.status],fontSize:12,fontWeight:800}}>{label[x.status]||x.status}</span>
          </div>
          <div style={{fontSize:12,color:C.g600,marginTop:3}}>{x.class_name||"-"} · เลขที่ {x.student_no||"-"} · {x.student_id_no}</div>
          <div style={{fontSize:13,color:C.g700,marginTop:10}}>ผู้ปกครอง: <b>{x.parent_name}</b></div>
          <div style={{fontSize:12,color:C.g400}}>{x.parent_email}</div>
          <div style={{fontSize:11,color:C.g400,marginTop:4}}>{tx("ส่งคำขอ","Requested")}: {formatThaiDateTime(x.requested_at)}{x.reviewed_at?` · ${tx("ตรวจเมื่อ","Reviewed")}: ${formatThaiDateTime(x.reviewed_at)}`:""}</div>
          <button onClick={()=>toggleDetails(x)} style={{width:"100%",marginTop:10,padding:9,border:`1px solid ${C.g200}`,borderRadius:9,background:C.g50,color:C.navy,fontWeight:800,cursor:"pointer"}}>
            {expanded===x.request_id?tx("ซ่อนรายละเอียดบัญชี","Hide account details"):tx("ดูรายละเอียดบัญชี","View account details")}
          </button>
          {expanded===x.request_id&&<ParentAccountDetails data={accountDetails[x.parent_id]}/>}
          {x.status==="pending"&&!readOnly&&<div style={{display:"flex",gap:8,marginTop:12}}>
            <button disabled={!!busy} onClick={()=>review(x.request_id,"rejected")} style={{flex:1,padding:9,border:`1px solid ${C.red}`,borderRadius:9,background:C.redL,color:C.red,fontWeight:800}}>ไม่อนุมัติ</button>
            <button disabled={!!busy} onClick={()=>review(x.request_id,"approved")} style={{flex:1,padding:9,border:"none",borderRadius:9,background:C.green,color:C.white,fontWeight:800}}>อนุมัติ</button>
          </div>}
        </div>
      ))}
    </div>
  );
}

// ======= PARENT VIEW =======
function ParentView({token,profile,userId}){
  const [children,setChildren]=useState([]);const [requests,setRequests]=useState([]);const [sel,setSel]=useState(null);const [info,setInfo]=useState(null);const [loading,setLoading]=useState(true);const [page,setPage]=useState("home");const [err,setErr]=useState("");
  const [adding,setAdding]=useState(false);const [childIdNo,setChildIdNo]=useState("");const [addBusy,setAddBusy]=useState(false);const [addMsg,setAddMsg]=useState("");const [reloadKey,setReloadKey]=useState(0);
  useEffect(()=>{
    const load=async()=>{
      setLoading(true);setErr("");
      try{
        const parentId=userId||profile?.id;
        const pending=await sbFetch("rpc/get_my_parent_link_requests",{method:"POST",token,body:"{}"}).catch(()=>[]);
        setRequests(pending||[]);
        const links=await sbFetch(`parent_student?parent_id=eq.${parentId}&select=student_id`,{token});
        const ids=(links||[]).map(x=>x.student_id).filter(Boolean);
        if(ids.length===0){
          setChildren([]);
          return;
        }
        const k=await sbFetch(`students?id=in.(${ids.join(",")})&select=id,full_name,student_no,photo_path,classes(name)&order=student_no.asc`,{token});
        setChildren(k||[]);
        if((k||[]).length===0){setErr("พบการผูกแล้ว แต่ยังอ่านข้อมูลนักเรียนไม่ได้ กรุณาตรวจ RLS ของ students/classes");}
        if((k||[]).length===1){setSel(k[0]);setInfo(k[0]);}
      }catch(e){
        setChildren([]);
        setErr(e.message||"โหลดข้อมูลบุตรหลานไม่สำเร็จ");
      }finally{setLoading(false);}
    };
    load();
  },[token,profile,userId,reloadKey]);
  const addChild=async()=>{
    setAddMsg("");
    if(!/^\d{13}$/.test(childIdNo))return setAddMsg(tx("กรุณากรอกเลขประจำตัวนักเรียนให้ครบ 13 หลัก","Enter the student's complete 13-digit ID number."));
    setAddBusy(true);
    try{
      const result=await sbFetch("rpc/submit_parent_link_request",{method:"POST",token,body:JSON.stringify({p_student_id_no:childIdNo})});
      setAddMsg(result?.status==="approved"?tx("นักเรียนคนนี้ผูกกับบัญชีแล้ว","This student is already linked."):tx("ส่งคำขอแล้ว กรุณารอ Admin อนุมัติ","Request sent. Please wait for administrator approval."));
      setChildIdNo("");setAdding(false);setReloadKey(k=>k+1);
    }catch(e){setAddMsg(e.message||tx("ส่งคำขอไม่สำเร็จ","Could not send request."));}
    finally{setAddBusy(false);}
  };
  if(loading)return <Spin/>;
  if(!sel)return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`linear-gradient(135deg,${C.navyD},${C.navy})`,borderRadius:20,padding:20}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:58,height:58,borderRadius:99,background:C.goldP,border:`3px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>👪</div>
          <div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>ผู้ปกครอง</div><div style={{color:C.gold,fontSize:17,fontWeight:800}}>{profile?.full_name}</div></div>
        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>👶 เลือกบุตรหลาน</div>
        {err&&<div style={{background:C.redL,color:C.red,border:`1.5px solid ${C.red}`,borderRadius:10,padding:"10px 12px",fontSize:13,fontWeight:700,marginBottom:10}}>{err}</div>}
        {children.length===0&&requests.length>0?requests.map(r=>(
          <div key={r.request_id} style={{background:C.yellowL,borderRadius:12,padding:"13px 14px",marginBottom:8}}>
            <div style={{fontWeight:800,color:C.navy,fontSize:14}}>{r.student_name}</div>
            <div style={{fontSize:12,color:C.g600}}>{r.class_name||"-"} · เลขที่ {r.student_no||"-"}</div>
            <div style={{fontSize:12,fontWeight:800,color:r.status==="rejected"?C.red:C.yellow,marginTop:5}}>{r.status==="rejected"?"ไม่ผ่านการอนุมัติ":"รอผู้ดูแลระบบอนุมัติ"}</div>
          </div>
        )):children.length===0?<Empty icon="👪" msg="ยังไม่มีข้อมูลบุตรหลาน"/>:children.map(c=>(
          <button key={c.id} onClick={()=>{setSel(c);setInfo(c);}} style={{width:"100%",textAlign:"left",background:C.g50,border:`1.5px solid ${C.g200}`,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
            <StudentAvatar path={c.photo_path} token={token} size={46}/>
            <div><div style={{fontWeight:700,fontSize:15,color:C.navy}}>{c.full_name}</div><div style={{fontSize:12,color:C.g400}}>{c.classes?.name||"—"} · เลขที่ {c.student_no||"—"}</div></div>
            <div style={{marginLeft:"auto",color:C.gold,fontSize:20}}>›</div>
          </button>
        ))}
        {children.length>0&&requests.filter(r=>r.status!=="approved").map(r=>(
          <div key={r.request_id} style={{background:C.yellowL,borderRadius:10,padding:"10px 12px",marginTop:8}}>
            <div style={{fontWeight:700,color:C.navy,fontSize:13}}>{r.student_name}</div>
            <div style={{fontSize:12,color:r.status==="rejected"?C.red:C.yellow,fontWeight:700}}>{r.status==="rejected"?tx("ไม่ผ่านการอนุมัติ","Rejected"):tx("รอ Admin อนุมัติ","Awaiting administrator approval")}</div>
          </div>
        ))}
        {adding?<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.g200}`}}>
          <input value={childIdNo} onChange={e=>setChildIdNo(e.target.value.replace(/\D/g,"").slice(0,13))} inputMode="numeric" maxLength="13" placeholder={tx("เลขประจำตัวนักเรียน 13 หลัก","Student's 13-digit ID number")} style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,outline:"none"}}/>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>{setAdding(false);setAddMsg("");}} style={{flex:1,padding:10,border:`1px solid ${C.g200}`,borderRadius:9,background:C.white,color:C.g600,fontWeight:700}}>{tx("ยกเลิก","Cancel")}</button>
            <button onClick={addChild} disabled={addBusy} style={{flex:1,padding:10,border:"none",borderRadius:9,background:C.navy,color:C.white,fontWeight:800,opacity:addBusy?0.7:1}}>{addBusy?tx("กำลังส่ง...","Sending..."):tx("ส่งคำขอ","Send request")}</button>
          </div>
        </div>:<button onClick={()=>setAdding(true)} style={{width:"100%",marginTop:12,padding:11,border:`1.5px solid ${C.navy}`,borderRadius:10,background:C.white,color:C.navy,fontWeight:800,cursor:"pointer"}}>＋ {tx("เพิ่มบุตรหลาน","Add child")}</button>}
        {addMsg&&<div style={{marginTop:9,padding:"9px 11px",borderRadius:9,background:C.g100,color:C.g700,fontSize:12,fontWeight:700}}>{addMsg}</div>}
      </div>
    </div>
  );
  // หน้าย่อยสำหรับผู้ปกครอง
  const Back=()=><button onClick={()=>setPage("home")} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,marginBottom:14}}>← กลับ</button>;
  if(page==="attend")return <div><Back/><AttendContent token={token} student={sel}/></div>;
  if(page==="schedule")return <div><Back/><StudentSchedule token={token} studentId={sel.id}/></div>;
  if(page==="grades")return <div><Back/><Grades token={token} isTeacher={false}/></div>;
  if(page==="announce")return <div><Back/><Announce token={token} profile={profile}/></div>;
  if(page==="talk")return <div><Back/><ParentTeacherTalk token={token} profile={profile} role="parent" student={sel}/></div>;
  if(page==="leave")return <div><Back/><LeaveForm token={token} profile={profile} initStudents={children}/></div>;
  if(page==="checkin")return <div><Back/><AttendHist token={token} studentId={sel.id} studentName={sel.full_name} role="parent"/></div>;
  if(page==="tuition")return <div><Back/><TuitionView token={token} profile={profile} student={sel}/></div>;
  if(page==="exam")return <div><Back/><ComingSoonView/></div>;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSel(null)} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14}}>← กลับ</button>
        <div style={{fontWeight:700,fontSize:15,color:C.navy}}>{sel.full_name}</div>
      </div>
      <StudentHome token={token} profile={profile} studentId={sel.id} studentInfo={info} onPageChange={setPage}/>
    </div>
  );
}

function AttendContent({token,student}) {
  const studentId=student?.id;
  const className=student?.classes?.name;
  const [att,setAtt]=useState([]);const [loading,setLoading]=useState(true);
  const [date,setDate]=useState(localDateISO());
  const [mode,setMode]=useState("month");
  const [filter,setFilter]=useState("all");
  useEffect(()=>{
    const load=()=>{
      const selected=new Date(date+"T12:00:00");
      const monthStart=new Date(selected.getFullYear(),selected.getMonth(),1);
      const monthEnd=new Date(selected.getFullYear(),selected.getMonth()+1,0);
      const today=new Date(localDateISO()+"T12:00:00");
      const range=mode==="day"
        ?{from:date,to:date}
        :{from:clampAttendanceFrom(localDateISO(monthStart),className),to:localDateISO(monthEnd>today?today:monthEnd)};
      if(range.from>range.to){setAtt([]);setLoading(false);return;}
      setLoading(true);
      return sbFetch("rpc/get_derived_attendance",{method:"POST",token,body:JSON.stringify({p_student_id:studentId,p_date_from:range.from,p_date_to:range.to})}).then(a=>setAtt(a||[])).finally(()=>setLoading(false));
    };
    load();const timer=setInterval(load,10000);return()=>clearInterval(timer);
  },[token,studentId,className,date,mode]);
  if(loading)return <Spin/>;
  const sum={present:0,late:0,absent:0,leave:0};att.forEach(a=>{if(sum[a.status]!==undefined)sum[a.status]++;});
  const pct=att.length>0?Math.round(((sum.present+sum.late)/att.length)*100):0;
  const shown=filter==="all"?att:att.filter(a=>a.status===filter);
  const statusStyle={
    present:{label:tx("มา","Present"),color:C.green,bg:C.greenL},
    late:{label:tx("สาย","Late"),color:C.yellow,bg:C.yellowL},
    absent:{label:tx("ขาด","Absent"),color:C.red,bg:C.redL},
    leave:{label:tx("ลา","Leave"),color:C.g600,bg:C.g100}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:10}}>📅 {tx("เลือกวันที่","Select date")}</div>
        <input type="date" value={date} max={localDateISO()} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:10}}>
          {[["day",tx("รายวัน","Daily")],["month",tx("ทั้งเดือน","Monthly")]].map(([v,l])=><button key={v} onClick={()=>setMode(v)} style={{border:"none",borderRadius:9,padding:9,background:mode===v?C.navy:C.g100,color:mode===v?C.white:C.g600,fontWeight:800,cursor:"pointer"}}>{l}</button>)}
        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <div style={{width:66,height:66,borderRadius:99,background:pct>=80?C.greenL:C.yellowL,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,color:pct>=80?C.green:C.yellow,flexShrink:0}}>{pct}%</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(sum).map(([k,v])=><button key={k} onClick={()=>setFilter(filter===k?"all":k)} style={{border:filter===k?`1.5px solid ${statusStyle[k].color}`:"none",background:statusStyle[k].bg,color:statusStyle[k].color,borderRadius:8,padding:"4px 9px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{statusStyle[k].label} {v}</button>)}
          </div>
        </div>
        {shown.length===0?<Empty icon="📋" msg={tx("ไม่มีข้อมูลในช่วงที่เลือก","No records for the selected period")}/>:shown.map((a,i)=>{
          const st=statusStyle[a.status]||statusStyle.absent;
          return <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<shown.length-1?`1px solid ${C.g100}`:"none"}}>
            <div>
              <div style={{fontSize:14,color:C.g700,fontWeight:600}}>{new Date(a.date+"T00:00:00").toLocaleDateString("th-TH",{dateStyle:"medium"})}</div>
              {a.scanned_time&&<div style={{fontSize:11,color:C.g400,marginTop:2}}>{a.scan_source==="teacher_manual"?a.attendance_note:tx("เวลาสแกน","Scan time")+" "+String(a.scanned_time).slice(0,5)}</div>}
            </div>
            <span style={{background:st.bg,color:st.color,borderRadius:99,padding:"3px 11px",fontSize:12,fontWeight:800}}>{st.label}</span>
          </div>;
        })}
      </div>
    </div>
  );
}

function ChangePasswordView({email,token,onChanged}){
  const [form,setForm]=useState({current:"",next:"",confirm:""});
  const [show,setShow]=useState({current:false,next:false,confirm:false});
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState("");
  const fieldStyle={width:"100%",border:`1.5px solid ${C.g200}`,borderRadius:10,padding:"12px 44px 12px 12px",fontSize:15,outline:"none",background:C.white};
  const setValue=(key,value)=>setForm(p=>({...p,[key]:value}));
  const toggle=(key)=>setShow(p=>({...p,[key]:!p[key]}));
  async function submit(e){
    e.preventDefault();setError("");
    if(!form.current||!form.next||!form.confirm)return setError(tx("กรุณากรอกข้อมูลให้ครบ","Please complete all fields"));
    if(form.next.length<8)return setError(tx("รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว","New password must contain at least 8 characters"));
    if(form.next!==form.confirm)return setError(tx("ยืนยันรหัสผ่านใหม่ไม่ตรงกัน","New passwords do not match"));
    if(form.current===form.next)return setError(tx("รหัสผ่านใหม่ต้องไม่ซ้ำกับรหัสเดิม","New password must differ from the current password"));
    setBusy(true);
    try{
      await signIn(email,form.current);
      await updatePassword(token,form.next);
      await sbFetch("rpc/log_my_password_change",{method:"POST",token,body:"{}"}).catch(()=>null);
      window.alert(tx("เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่","Password changed. Please sign in again."));
      onChanged();
    }catch(err){setError(err.message||tx("เปลี่ยนรหัสผ่านไม่สำเร็จ","Could not change password"));}
    finally{setBusy(false);}
  }
  const PasswordField=({field,label})=>(
    <label style={{display:"block",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.g700,marginBottom:6}}>{label}</div>
      <div style={{position:"relative"}}>
        <input type={show[field]?"text":"password"} value={form[field]} onChange={e=>setValue(field,e.target.value)} autoComplete={field==="current"?"current-password":"new-password"} style={fieldStyle}/>
        <button type="button" onClick={()=>toggle(field)} aria-label={show[field]?tx("ซ่อนรหัสผ่าน","Hide password"):tx("แสดงรหัสผ่าน","Show password")} title={show[field]?tx("ซ่อนรหัสผ่าน","Hide password"):tx("แสดงรหัสผ่าน","Show password")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",width:36,height:36,border:"none",background:"transparent",fontSize:18,cursor:"pointer"}}>{show[field]?"🙈":"👁️"}</button>
      </div>
    </label>
  );
  return(
    <form onSubmit={submit} style={{background:C.white,borderRadius:16,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
      <div style={{fontSize:17,fontWeight:800,color:C.navy,marginBottom:18}}>🔐 {tx("เปลี่ยนรหัสผ่าน","Change password")}</div>
      <PasswordField field="current" label={tx("รหัสผ่านปัจจุบัน","Current password")}/>
      <PasswordField field="next" label={tx("รหัสผ่านใหม่","New password")}/>
      <PasswordField field="confirm" label={tx("ยืนยันรหัสผ่านใหม่","Confirm new password")}/>
      {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:9,padding:"10px 12px",fontSize:13,fontWeight:600,marginBottom:14}}>{error}</div>}
      <button disabled={busy} style={{width:"100%",padding:"12px",border:"none",borderRadius:11,background:C.navy,color:C.white,fontSize:15,fontWeight:800,cursor:busy?"wait":"pointer",opacity:busy?0.7:1}}>{busy?tx("กำลังเปลี่ยน...","Changing..."):tx("บันทึกรหัสผ่านใหม่","Save new password")}</button>
    </form>
  );
}

// ======= MAIN APP =======
function App(){
  const [auth,setAuth]=useState(()=>{try{const s=localStorage.getItem("sch");return s?JSON.parse(s):null;}catch{return null;}});
  const [recoveryToken,setRecoveryToken]=useState(()=>getRecoveryToken());
  const [checkingParentAccess,setCheckingParentAccess]=useState(true);
  const [tab,setTab]=useState("home");
  const [subPage,setSubPage]=useState(null);
  const [activeRole,setActiveRole]=useState(null);
  const [lang,setLang]=useState(()=>localStorage.getItem("school_lang")||"th");

  useEffect(()=>{
    let cancelled=false;
    const check=async()=>{
      const isParentAccount=auth&&(
        ["parent","teacher_parent"].includes(auth.profile?.role)||
        auth.session?.user?.user_metadata?.registration_source==="school_parent"
      );
      if(!isParentAccount){if(!cancelled)setCheckingParentAccess(false);return;}
      setCheckingParentAccess(true);
      try{
        const links=await sbFetch(`parent_student?parent_id=eq.${auth.session.user.id}&select=student_id&limit=1`,{token:auth.session.access_token});
        if(!cancelled&&(links||[]).length===0){
          await signOut(auth.session.access_token);
          localStorage.removeItem("sch");
          setAuth(null);
        }
      }catch(e){
        if(!cancelled){localStorage.removeItem("sch");setAuth(null);}
      }finally{if(!cancelled)setCheckingParentAccess(false);}
    };
    check();
    return()=>{cancelled=true;};
  },[auth?.session?.access_token,auth?.profile?.role]);

  function goPage(p){setSubPage(p);setTab("home");}
  function goBack(){setSubPage(null);}
  function onLogin(d){setCheckingParentAccess(d.profile?.role==="parent");setAuth(d);setTab("home");setSubPage(null);setActiveRole(null);}
  function onLogout(){signOut(auth?.session?.access_token);localStorage.removeItem("sch");setAuth(null);}

  if(recoveryToken)return <ResetPasswordView token={recoveryToken} onDone={()=>{localStorage.removeItem("sch");setAuth(null);setRecoveryToken("");}}/>;
  if(checkingParentAccess)return <div style={{minHeight:"100vh",background:C.bg}}><Spin/></div>;
  if(!auth)return <Login onLogin={onLogin}/>;
  const {session,profile}=auth;
  const token=session?.access_token;
  if(profile?.role==="student"&&session?.user?.user_metadata?.registration_source==="school_parent")profile.role="parent";
  const rawRole=profile?.role;
  const role=rawRole==="teacher_parent"?(activeRole||"teacher"):rawRole;
  const hasDualRole=rawRole==="teacher_parent";
  const isDirector=String(session?.user?.email||"").toLowerCase()==="director@klunschool.com";

  // Bottom tabs
  const tabs=["teacher","finance","admin"].includes(role)
    ?[{id:"home",icon:"🏠",label:tx("หน้าหลัก","Home")},{id:"scan",icon:"📷",label:tx("สแกน","Scan")},{id:"announce",icon:"📢",label:tx("ประกาศ","News")},{id:"settings",icon:"⚙️",label:tx("ตั้งค่า","Settings")}]
    :[{id:"home",icon:"🏠",label:tx("หน้าหลัก","Home")},{id:"announce",icon:"📢",label:tx("ประกาศ","News")},{id:"settings",icon:"⚙️",label:tx("ตั้งค่า","Settings")}];

  function handleTab(id){
    if(id==="scan"){window.open("./scanner.html","_self");return;}
    setTab(id);setSubPage(null);
  }

  function renderContent(){
    // sub pages
    if(subPage){
      const Back=()=><button onClick={goBack} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,marginBottom:14}}>← {tx("กลับ","Back")}</button>;
      if(subPage==="checkin")return <div><Back/><AttendHist token={token} role={role} email={session?.user?.email}/></div>;
      if(subPage==="attendance")return <div><Back/><AttendCheck token={token} profile={profile}/></div>;
      if(subPage==="schedule"&&role==="teacher")return <div><Back/><TeacherSchedule token={token} profile={profile}/></div>;
      if(subPage==="grades")return <div><Back/><Grades token={token} isTeacher={role==="teacher"}/></div>;
      if(subPage==="leave")return <div><Back/>{role==="parent"?<LeaveForm token={token} profile={profile} initStudents={[]}/>:<LeaveRequestsView token={token} profile={profile} readOnly={isDirector}/>}</div>;
      if(subPage==="tuition")return <div><Back/><TuitionView token={token} profile={profile}/></div>;
      if(subPage==="announce")return <div><Back/><Announce token={token} profile={profile}/></div>;
      if(subPage==="exam")return <div><Back/><ComingSoonView/></div>;
      if(subPage==="talk")return <div><Back/><ParentTeacherTalk token={token} profile={profile} role={role}/></div>;
      if(subPage==="parent-report"&&["teacher","teacher_parent","admin"].includes(role))return <div><Back/><HomeroomParentReport token={token} profile={profile} role={role}/></div>;
      if(subPage==="parent-usage"&&["teacher","teacher_parent","admin"].includes(role))return <div><Back/><ParentUsageReport token={token}/></div>;
      if(subPage==="student-management"&&role==="admin")return <div><Back/><AdminStudentManagement token={token}/></div>;
      if(subPage==="reports"&&role==="admin")return <div><Back/><AdminReports token={token}/></div>;
      if(subPage==="password")return <div><Back/><ChangePasswordView email={session?.user?.email||""} token={token} onChanged={onLogout}/></div>;
      if(subPage==="parent-requests"&&role==="admin")return <div><Back/><ParentLinkApprovals token={token} readOnly={isDirector}/></div>;
    }
    // tabs
    if(tab==="announce")return <Announce token={token} profile={profile}/>;
    if(tab==="settings")return(
      <div style={{background:C.white,borderRadius:16,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:16}}>⚙️ {tx("การตั้งค่า","Settings")}</div>
        {[{icon:"👤",label:tx("ข้อมูลส่วนตัว","Profile")},{icon:"🔐",label:tx("เปลี่ยนรหัสผ่าน","Change password"),action:()=>goPage("password")},{icon:"🔔",label:tx("การแจ้งเตือน","Notifications")},{icon:"ℹ️",label:tx("เวอร์ชัน 1.7.3","Version 1.7.3")}].map((x,i)=>(
          <div key={i} onClick={x.action} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.g100}`,cursor:x.action?"pointer":"default"}}>
            <span style={{fontSize:20}}>{x.icon}</span><div style={{flex:1,fontSize:14,fontWeight:600,color:C.g700}}>{x.label}</div><span style={{color:C.g400}}>›</span>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.g100}`}}>
          <span style={{fontSize:20}}>🌐</span>
          <label htmlFor="language-select" style={{flex:1,fontSize:14,fontWeight:600,color:C.g700}}>{tx("ภาษา","Language")}</label>
          <select id="language-select" value={lang} onChange={e=>{localStorage.setItem("school_lang",e.target.value);setLang(e.target.value);}} style={{border:`1.5px solid ${C.g200}`,borderRadius:9,padding:"7px 9px",background:C.white,color:C.navy,fontWeight:700}}>
            <option value="th">ไทย</option>
            <option value="en">English</option>
          </select>
        </div>
        <button onClick={onLogout} style={{width:"100%",marginTop:20,padding:"12px",background:C.redL,color:C.red,border:`1.5px solid ${C.red}`,borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>🚪 {tx("ออกจากระบบ","Sign out")}</button>
      </div>
    );
    if(tab==="home"){
      if(["teacher","finance","admin"].includes(role))return <TeacherHomeView token={token} profile={profile} setPage={goPage} role={role} email={session?.user?.email}/>;
      if(role==="parent")return <ParentView token={token} profile={profile} userId={session?.user?.id}/>;
      return <StudentHome token={token} profile={profile} studentId={null} studentInfo={null} onPageChange={goPage}/>;
    }
    return null;
  }

  const rl={teacher:tx("ครู","Teacher"),student:tx("นักเรียน","Student"),parent:tx("ผู้ปกครอง","Parent"),teacher_parent:tx("ครู/ผู้ปกครอง","Teacher/Parent"),finance:tx("ฝ่ายการเงิน","Finance"),admin:tx("ผู้ดูแลระบบ","Administrator")};

  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:C.bg,fontFamily:"'Sarabun','Segoe UI',sans-serif",paddingBottom:72}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.navyD},${C.navy})`,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:20,boxShadow:"0 2px 12px rgba(26,58,107,0.35)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src="./icon-512.png" style={{width:38,height:38,objectFit:"contain"}} alt="ตราโรงเรียนกลั่นวิทยา"/>
          <div style={{color:C.gold,fontSize:15,fontWeight:800}}>{tx("กลั่นวิทยา","Klunwittaya")}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20,cursor:"pointer"}}>🔔</span>
          <div style={{background:"rgba(201,162,39,0.2)",border:`1px solid ${C.gold}`,borderRadius:99,padding:"3px 10px",color:C.gold,fontSize:12,fontWeight:700}}>{rl[role]||role}</div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:14,animation:"fadeIn 0.25s ease"}}>
        {hasDualRole&&<div style={{background:C.white,borderRadius:14,padding:6,display:"flex",gap:6,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:12}}>
          {[{id:"teacher",label:tx("โหมดครู","Teacher mode"),icon:"👩‍🏫"},{id:"parent",label:tx("โหมดผู้ปกครอง","Parent mode"),icon:"👪"}].map(x=>(
            <button key={x.id} onClick={()=>{setActiveRole(x.id);setTab("home");setSubPage(null);}} style={{flex:1,border:"none",borderRadius:10,padding:"9px 8px",background:role===x.id?`linear-gradient(135deg,${C.navy},${C.navyL})`:C.g100,color:role===x.id?C.white:C.g600,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              {x.icon} {x.label}
            </button>
          ))}
        </div>}
        {renderContent()}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:C.white,borderTop:`1px solid ${C.g200}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -2px 12px rgba(0,0,0,0.08)"}}>
        {tabs.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>handleTab(t.id)} style={{flex:1,padding:"8px 2px 10px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id&&!subPage?`2.5px solid ${C.navy}`:"2.5px solid transparent",transition:"all 0.15s"}}>
            <span style={{fontSize:22}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,color:tab===t.id&&!subPage?C.navy:C.g400}}>{t.label}</span>
          </button>
        ))}
      </div>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});}
</script>
</body>
</html>
