function tx(th,en){return localStorage.getItem("school_lang")==="en"?en:th;}

async function sbFetch(path,options={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${options.token||SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation",...options.headers},
    ...options,
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||res.statusText);}
  return res.status===204?null:res.json();
}
async function signIn(email,pw){
  const res=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
  const d=await res.json();if(!res.ok)throw new Error(d.error_description||"เข้าสู่ระบบไม่สำเร็จ");return d;
}
async function signUpParent(form){
  const redirectTo=`${location.origin}${location.pathname}`;
  const res=await fetch(`${SUPABASE_URL}/auth/v1/signup?redirect_to=${encodeURIComponent(redirectTo)}`,{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({
      email:form.email.trim().toLowerCase(),
      password:form.password,
      data:{
        full_name:form.full_name.trim(),
        registration_source:"school_parent",
        student_id_no:form.student_id_no.trim(),
        link_code:form.link_code.trim().toUpperCase()
      }
    })
  });
  const d=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(d.msg||d.error_description||d.message||tx("ลงทะเบียนไม่สำเร็จ","Registration failed"));
  return d;
}
async function claimParentFromMetadata(session){
  const meta=session?.user?.user_metadata||{};
  if(meta.registration_source!=="school_parent"||!meta.student_id_no||!meta.link_code)return;
  await sbFetch("rpc/claim_parent_student",{method:"POST",token:session.access_token,body:JSON.stringify({
    p_student_id_no:meta.student_id_no,
    p_link_code:meta.link_code
  })});
}
async function updatePassword(token,password){
  const res=await fetch(`${SUPABASE_URL}/auth/v1/user`,{
    method:"PUT",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({password}),
  });
  const d=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(d.msg||d.message||tx("เปลี่ยนรหัสผ่านไม่สำเร็จ","Could not change password"));
  return d;
}
async function signOut(token){await fetch(`${SUPABASE_URL}/auth/v1/logout`,{method:"POST",headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`}}).catch(()=>{});}
async function uploadPaymentSlip(file,path,token){
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/payment-slips/${path}`,{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`,"Content-Type":file.type||"image/jpeg","x-upsert":"false"},
    body:file,
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||"อัปโหลดสลิปไม่สำเร็จ");}
  return path;
}
async function getPaymentSlipUrl(path,token){
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/sign/payment-slips/${path}`,{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({expiresIn:300}),
  });
  const d=await res.json();
  if(!res.ok)throw new Error(d.message||"เปิดสลิปไม่สำเร็จ");
  return `${SUPABASE_URL}/storage/v1${d.signedURL}`;
}
async function notifyTelegramPayment(paymentId,token){
  const res=await fetch(`${SUPABASE_URL}/functions/v1/notify-payment`,{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({paymentId}),
  });
  const d=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(d.error||"ส่งข้อความ Telegram ไม่สำเร็จ");
  return d;
}

  navy:"#1a3a6b",navyD:"#0f2347",navyL:"#2a5298",
  gold:"#c9a227",goldL:"#f0d060",goldP:"#fdf6dc",
  white:"#ffffff",bg:"#f0f4ff",
  g50:"#f8fafc",g100:"#f1f5f9",g200:"#e2e8f0",g400:"#94a3b8",g600:"#475569",g700:"#334155",g900:"#0f172a",

function Spin(){return <div style={{display:"flex",justifyContent:"center",padding:40}}><div style={{width:36,height:36,border:`3px solid ${C.g200}`,borderTopColor:C.navy,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/></div>;}
function Empty({icon,msg}){return <div style={{textAlign:"center",padding:"28px 16px",color:C.g400}}><div style={{fontSize:38}}>{icon}</div><div style={{marginTop:8,fontSize:14}}>{msg}</div></div>;}

function ParentRegister({onBack}){
  const [form,setForm]=useState({full_name:"",email:"",student_id_no:"",link_code:"",password:"",confirm:""});
  const [busy,setBusy]=useState(false);const [error,setError]=useState("");const [sent,setSent]=useState(false);
  const inputStyle={width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white,outline:"none"};
  const set=(key,value)=>setForm(p=>({...p,[key]:value}));
  async function submit(e){
    e.preventDefault();setError("");
    if(Object.values(form).some(v=>!String(v).trim()))return setError(tx("กรุณากรอกข้อมูลให้ครบ","Please complete all fields"));
    if(form.password.length<8)return setError(tx("รหัสผ่านต้องมีอย่างน้อย 8 ตัว","Password must contain at least 8 characters"));
    if(form.password!==form.confirm)return setError(tx("ยืนยันรหัสผ่านไม่ตรงกัน","Passwords do not match"));
    setBusy(true);
    try{await signUpParent(form);setSent(true);}
    catch(e){setError(e.message);}
    finally{setBusy(false);}
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px 40px"}}>
      <div style={{maxWidth:420,margin:"0 auto"}}>
        <button onClick={onBack} style={{border:"none",background:"transparent",color:C.navy,fontSize:14,cursor:"pointer",marginBottom:14}}>← {tx("กลับหน้าเข้าสู่ระบบ","Back to sign in")}</button>
        <div style={{background:C.white,borderRadius:18,padding:20,boxShadow:"0 3px 14px rgba(15,35,71,0.1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <img src="./icon-192.png" alt="" style={{width:46,height:46,objectFit:"contain"}}/>
            <div><div style={{fontSize:18,fontWeight:800,color:C.navy}}>{tx("ลงทะเบียนผู้ปกครอง","Parent registration")}</div><div style={{fontSize:12,color:C.g400}}>{tx("ยืนยันอีเมลก่อนเริ่มใช้งาน","Email confirmation required")}</div></div>
          </div>
          {sent?(
            <div style={{textAlign:"center",padding:"24px 8px"}}>
              <div style={{fontSize:50}}>📧</div>
              <div style={{fontSize:17,fontWeight:800,color:C.green,marginTop:10}}>{tx("ส่งอีเมลยืนยันแล้ว","Confirmation email sent")}</div>
              <div style={{fontSize:13,color:C.g600,lineHeight:1.6,marginTop:8}}>{tx("กรุณาเปิดอีเมล กดลิงก์ยืนยัน แล้วกลับมาเข้าสู่ระบบด้วยอีเมลและรหัสผ่านที่ตั้งไว้ ระบบจะผูกบุตรหลานให้อัตโนมัติ","Open the email, confirm your address, then return and sign in. Your child will be linked automatically.")}</div>
              <button onClick={onBack} style={{marginTop:18,width:"100%",padding:11,border:"none",borderRadius:10,background:C.navy,color:C.white,fontWeight:800,cursor:"pointer"}}>{tx("ไปหน้าเข้าสู่ระบบ","Go to sign in")}</button>
            </div>
          ):(
            <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:10}}>
              <input style={inputStyle} value={form.full_name} onChange={e=>set("full_name",e.target.value)} placeholder={tx("ชื่อ-นามสกุลผู้ปกครอง","Parent full name")} autoComplete="name"/>
              <input style={inputStyle} type="email" value={form.email} onChange={e=>set("email",e.target.value)} placeholder={tx("อีเมล","Email")} autoComplete="email"/>
              <input style={inputStyle} value={form.student_id_no} onChange={e=>set("student_id_no",e.target.value.replace(/\s/g,""))} placeholder={tx("เลขประจำตัวนักเรียน","Student ID number")} inputMode="numeric"/>
              <input style={{...inputStyle,textTransform:"uppercase"}} value={form.link_code} onChange={e=>set("link_code",e.target.value.toUpperCase().replace(/\s/g,""))} placeholder={tx("รหัสเชื่อมบัญชีจากโรงเรียน","School link code")} autoCapitalize="characters"/>
              <input style={inputStyle} type="password" value={form.password} onChange={e=>set("password",e.target.value)} placeholder={tx("ตั้งรหัสผ่าน อย่างน้อย 8 ตัว","Create password, at least 8 characters")} autoComplete="new-password"/>
              <input style={inputStyle} type="password" value={form.confirm} onChange={e=>set("confirm",e.target.value)} placeholder={tx("ยืนยันรหัสผ่าน","Confirm password")} autoComplete="new-password"/>
              {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:9,padding:"9px 11px",fontSize:13,fontWeight:600}}>⚠️ {error}</div>}
              <button disabled={busy} style={{padding:12,border:"none",borderRadius:10,background:busy?C.g400:C.navy,color:C.white,fontSize:15,fontWeight:800,cursor:busy?"wait":"pointer"}}>{busy?tx("กำลังลงทะเบียน...","Registering..."):tx("ลงทะเบียนและส่งอีเมลยืนยัน","Register and send confirmation email")}</button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ======= LOGIN =======
function Login({onLogin}){
  const [register,setRegister]=useState(false);
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  async function go(){
    if(!email||!pw){setErr("กรุณากรอกอีเมลและรหัสผ่าน");return;}
    setLoading(true);setErr("");
    try{const s=await signIn(email,pw);await claimParentFromMetadata(s);const [p]=await sbFetch(`profiles?id=eq.${s.user.id}&select=*`,{token:s.access_token});localStorage.setItem("sch",JSON.stringify({session:s,profile:p}));onLogin({session:s,profile:p});}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  if(register)return <ParentRegister onBack={()=>setRegister(false)}/>;
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.navyD},${C.navy} 60%,${C.navyL})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <img src="./icon-512.png" style={{width:112,height:112,objectFit:"contain",marginBottom:16,filter:"drop-shadow(0 8px 18px rgba(0,0,0,0.3))"}} alt="ตราโรงเรียนกลั่นวิทยา"/>
      <div style={{color:C.gold,fontSize:22,fontWeight:800,marginBottom:4}}>{tx("โรงเรียนกลั่นวิทยา","Klunwittaya School")}</div>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,marginBottom:32}}>{tx("ระบบแอปโรงเรียน","School application")}</div>
      <div style={{width:"100%",maxWidth:360,background:"rgba(255,255,255,0.1)",backdropFilter:"blur(12px)",borderRadius:20,padding:24,border:"1px solid rgba(255,255,255,0.2)"}}>
        <div style={{color:C.white,fontWeight:700,fontSize:17,marginBottom:16}}>{tx("เข้าสู่ระบบ","Sign in")}</div>
        {[[tx("อีเมล","Email"),"email"],[tx("รหัสผ่าน","Password"),"password"]].map(([ph,type],i)=>(
          <input key={i} type={type} placeholder={ph} value={i===0?email:pw}
            onChange={e=>i===0?setEmail(e.target.value):setPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:C.white,fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
        ))}
        {err&&<div style={{background:"rgba(220,38,38,0.2)",border:"1px solid rgba(220,38,38,0.4)",borderRadius:8,padding:"8px 12px",color:"#fca5a5",fontSize:13,marginBottom:12}}>⚠️ {err}</div>}
        <button onClick={go} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:loading?"rgba(255,255,255,0.2)":`linear-gradient(135deg,${C.gold},${C.goldL})`,color:loading?C.white:C.navyD,fontWeight:800,fontSize:16,cursor:loading?"not-allowed":"pointer",boxShadow:loading?"none":"0 4px 16px rgba(201,162,39,0.5)"}}>
          {loading?tx("กำลังเข้าสู่ระบบ...","Signing in..."):tx("เข้าสู่ระบบ","Sign in")}
        </button>
        <button onClick={()=>setRegister(true)} style={{width:"100%",marginTop:10,padding:"11px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.45)",background:"transparent",color:C.white,fontWeight:700,fontSize:14,cursor:"pointer"}}>
          {tx("ลงทะเบียนผู้ปกครอง","Parent registration")}
        </button>
      </div>
    </div>
  );
}

// ======= ICON BUTTON =======

// ======= ATTENDANCE HISTORY =======
function AttendHist({token,studentId,studentName}){
  const [logs,setLogs]=useState([]);const [loading,setLoading]=useState(true);
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  useEffect(()=>{
    setLoading(true);
    const p=studentId
      ?`checkin_log?student_id=eq.${studentId}&scanned_at=gte.${date}T00:00:00&scanned_at=lte.${date}T23:59:59&select=*,students(full_name,student_no)&order=scanned_at.asc`
      :`checkin_log?scanned_at=gte.${date}T00:00:00&scanned_at=lte.${date}T23:59:59&select=*,students(full_name,student_no)&order=scanned_at.asc`;
    sbFetch(p,{token}).then(l=>setLogs(l||[])).finally(()=>setLoading(false));
  },[token,studentId,date]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>📅 เลือกวันที่</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none"}}/>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>{studentName?`สแกนของ ${studentName}`:"ประวัติสแกนทั้งหมด"}</div>
        {loading?<Spin/>:logs.length===0?<Empty icon="📋" msg="ไม่มีข้อมูลในวันนี้"/>:logs.map((l,i)=>(
          <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<logs.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{width:40,height:40,borderRadius:99,background:l.type==="in"?C.greenL:C.redL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{l.type==="in"?"🟢":"🔴"}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{l.students?.full_name||"—"}</div><div style={{fontSize:12,color:C.g400}}>เลขที่ {l.students?.student_no||"—"}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontWeight:700,fontSize:13,color:l.type==="in"?C.green:C.red}}>{l.type==="in"?"เข้า":"ออก"}</div><div style={{fontSize:12,color:C.g400}}>{new Date(l.scanned_at).toLocaleTimeString("th-TH",{timeStyle:"short"})}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ======= LEAVE REQUEST =======
function LeaveForm({token,profile,initStudents=[]}){
  const [stu,setStu]=useState(initStudents);
  const [requests,setRequests]=useState([]);
  const [form,setForm]=useState({student_id:"",date:new Date().toISOString().split("T")[0],type:"sick",reason:""});
  const [saving,setSaving]=useState(false);const [done,setDone]=useState(false);
  const loadRequests=useCallback(()=>{
    sbFetch("leave_requests?select=*,students(full_name,student_no,classes(name))&order=created_at.desc",{token})
      .then(r=>setRequests(r||[])).catch(()=>{});
  },[token]);
  useEffect(()=>{
    if(["parent","teacher_parent"].includes(profile?.role)){
      sbFetch(`parent_student?parent_id=eq.${profile.id}&select=student_id,students(id,full_name,student_no)`,{token})
        .then(r=>setStu((r||[]).map(x=>x.students))).catch(()=>{});
    }
    loadRequests();
  },[token,profile,loadRequests]);
  async function submit(){
    if(!form.student_id||!form.reason){alert("กรุณากรอกข้อมูลให้ครบ");return;}
    setSaving(true);
    try{
      await sbFetch("leave_requests",{method:"POST",token,body:JSON.stringify({
        student_id:parseInt(form.student_id),parent_id:profile.id,leave_date:form.date,
        leave_type:form.type,reason:form.reason.trim(),status:"pending"
      })});
      setDone(true);setForm({student_id:"",date:new Date().toISOString().split("T")[0],type:"sick",reason:""});loadRequests();setTimeout(()=>setDone(false),3000);
    }catch(e){alert(e.message);}finally{setSaving(false);}
  }
  const s={width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white,outline:"none"};
  const typeLabel={sick:tx("ลาป่วย","Sick leave"),personal:tx("ลากิจ","Personal leave"),other:tx("อื่นๆ","Other")};
  const statusInfo={
    pending:{label:tx("รอตรวจสอบ","Pending"),color:C.yellow,bg:C.yellowL},
    approved:{label:tx("อนุมัติแล้ว","Approved"),color:C.green,bg:C.greenL},
    rejected:{label:tx("ไม่อนุมัติ","Rejected"),color:C.red,bg:C.redL}
  };
  return(

function LeaveRequestsView({token,profile}){

// ======= ATTENDANCE CHECK =======
function AttendCheck({token,profile}){
  const [students,setStudents]=useState([]);const [att,setAtt]=useState({});const [loading,setLoading]=useState(true);const [saving,setSaving]=useState(false);const [saved,setSaved]=useState(false);
  const today=new Date().toISOString().split("T")[0];
  useEffect(()=>{
    const load=async()=>{
      try{
        let tc=[];try{tc=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id`,{token});}catch(e){}
        const a=await sbFetch(`attendance?date=eq.${today}&select=*`,{token}).catch(()=>[]);
        const ids=tc?.length>0?tc.map(t=>t.class_id).join(","):null;
        const stu=ids?await sbFetch(`students?class_id=in.(${ids})&select=*,classes(name)&order=student_no.asc`,{token}).catch(()=>[]):await sbFetch("students?select=*,classes(name)&order=student_no.asc",{token}).catch(()=>[]);
        setStudents(stu||[]);const m={};(a||[]).forEach(x=>{m[x.student_id]=x.status;});setAtt(m);
      }catch(e){}finally{setLoading(false);}
    };load();
  },[token,profile.id,today]);
  async function save(){
    setSaving(true);
    try{for(const [sid,status] of Object.entries(att)){await sbFetch("attendance",{method:"POST",token,headers:{Prefer:"resolution=merge-duplicates,return=minimal"},body:JSON.stringify({student_id:parseInt(sid),date:today,status})});} setSaved(true);setTimeout(()=>setSaved(false),2500);}
    catch(e){alert(e.message);}finally{setSaving(false);}
  }
  const opts=[{v:"present",l:"มา",c:C.green,bg:C.greenL},{v:"late",l:"สาย",c:C.yellow,bg:C.yellowL},{v:"absent",l:"ขาด",c:C.red,bg:C.redL},{v:"leave",l:"ลา",c:C.g600,bg:C.g100}];
  const sum={present:0,late:0,absent:0,leave:0};Object.values(att).forEach(s=>{if(sum[s]!==undefined)sum[s]++;});
  if(loading)return <Spin/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:8}}>📅 {new Date(today+"T00:00:00").toLocaleDateString("th-TH",{dateStyle:"long"})}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{opts.map(o=><span key={o.v} style={{background:o.bg,color:o.c,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700}}>{o.l} {sum[o.v]}</span>)}</div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {students.length===0?<Empty icon="🏫" msg="ยังไม่มีนักเรียน"/>:students.map((s,i)=>(
          <div key={s.id} style={{padding:"12px 0",borderBottom:i<students.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:99,background:C.goldP,color:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,border:`1.5px solid ${C.gold}`}}>{s.student_no||i+1}</div>
              <div style={{fontWeight:600,fontSize:14,color:C.g900,flex:1}}>{s.full_name}</div>
              <div style={{fontSize:11,color:C.g400}}>{s.classes?.name}</div>
            </div>
            <div style={{display:"flex",gap:5}}>{opts.map(o=><button key={o.v} onClick={()=>setAtt(p=>({...p,[s.id]:o.v}))} style={{border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",background:att[s.id]===o.v?o.bg:C.g100,color:att[s.id]===o.v?o.c:C.g600,outline:att[s.id]===o.v?`2px solid ${o.c}`:"none"}}>{o.l}</button>)}</div>
          </div>
        ))}
        {students.length>0&&<button onClick={save} disabled={saving} style={{width:"100%",marginTop:14,padding:"12px",background:saved?C.green:saving?C.g400:`linear-gradient(135deg,${C.navy},${C.navyL})`,color:C.white,border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>{saved?"✅ บันทึกสำเร็จ!":saving?"กำลังบันทึก...":"💾 บันทึกเช็คชื่อ"}</button>}
      </div>
    </div>
  );
}

function Messages({token,profile}){
  const [msgs,setMsgs]=useState([]);const [users,setUsers]=useState([]);const [sel,setSel]=useState(null);const [body,setBody]=useState("");const [loading,setLoading]=useState(true);const [sending,setSending]=useState(false);
  const load=useCallback(async()=>{
    const [m,u]=await Promise.all([sbFetch(`messages?or=(sender_id.eq.${profile.id},receiver_id.eq.${profile.id})&select=*&order=created_at.desc`,{token}),sbFetch("profiles?select=id,full_name,role",{token})]);
    setMsgs(m||[]);setUsers((u||[]).filter(x=>x.id!==profile.id));setLoading(false);
  },[token,profile]);
  useEffect(()=>{load();},[load]);
  async function send(){if(!body.trim()||!sel)return;setSending(true);try{await sbFetch("messages",{method:"POST",token,body:JSON.stringify({sender_id:profile.id,receiver_id:sel,body})});setBody("");load();}catch(e){alert(e.message);}finally{setSending(false);}}
  const rl={teacher:"ครู",student:"นักเรียน",parent:"ผู้ปกครอง"};
  const conv=sel?msgs.filter(m=>(m.sender_id===profile.id&&m.receiver_id===sel)||(m.sender_id===sel&&m.receiver_id===profile.id)):[];
  if(loading)return <Spin/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>

        <select value={sel||""} onChange={e=>setSel(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,marginBottom:10}}><option value="">เลือกผู้รับ</option>{users.map(u=><option key={u.id} value={u.id}>{u.full_name} ({rl[u.role]||u.role})</option>)}</select>
        <div style={{display:"flex",gap:8}}><input style={{flex:1,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,outline:"none"}} placeholder="พิมพ์ข้อความ..." value={body} onChange={e=>setBody(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/><button onClick={send} disabled={sending||!sel||!body.trim()} style={{background:sending||!sel||!body.trim()?C.g400:C.navy,color:C.white,border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>ส่ง</button></div>
      </div>
      {sel&&conv.length>0&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {conv.map(m=>{const isMe=m.sender_id===profile.id;return(<div key={m.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:8}}><div style={{maxWidth:"75%",padding:"9px 13px",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isMe?C.navy:C.g100,color:isMe?C.white:C.g900,fontSize:14}}><div>{m.body}</div><div style={{fontSize:10,marginTop:3,opacity:0.6,textAlign:isMe?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString("th-TH",{timeStyle:"short"})}</div></div></div>);})}
      </div>}
      {msgs.length>0&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>ข้อความล่าสุด</div>
        {msgs.slice(0,8).map((m,i)=>{const other=users.find(u=>u.id===(m.sender_id===profile.id?m.receiver_id:m.sender_id));const isMe=m.sender_id===profile.id;return(<div key={m.id} style={{padding:"9px 0",borderBottom:i<7?`1px solid ${C.g100}`:"none",cursor:"pointer"}} onClick={()=>setSel(isMe?m.receiver_id:m.sender_id)}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontWeight:600,fontSize:14}}>{isMe?"ฉัน → ":""}{other?.full_name||"—"}</div><div style={{fontSize:11,color:C.g400}}>{new Date(m.created_at).toLocaleDateString("th-TH",{dateStyle:"short"})}</div></div><div style={{fontSize:13,color:C.g600,marginTop:1}}>{m.body}</div></div>);})}
      </div>}
    </div>
  );
}

// ======= TUITION PHASE 1 =======
function TuitionView({token,profile,student}){
  const isStaff=["finance","admin"].includes(profile?.role);
  const isTeacher=!student&&["teacher","teacher_parent"].includes(profile?.role);
  const [studentInfo,setStudentInfo]=useState(student||null);
  const [teacherClasses,setTeacherClasses]=useState([]);
  const [invoices,setInvoices]=useState([]);
  const [staffInvoices,setStaffInvoices]=useState([]);
  const [payments,setPayments]=useState([]);
  const [paymentHistory,setPaymentHistory]=useState([]);
  const [showHistory,setShowHistory]=useState(false);
  const [historyStatus,setHistoryStatus]=useState("all");
  const [staffSection,setStaffSection]=useState("manage");
  const [invoiceClass,setInvoiceClass]=useState("all");
  const [historyClass,setHistoryClass]=useState("all");
  const [receipts,setReceipts]=useState([]);
  const [terms,setTerms]=useState([]);
  const [classes,setClasses]=useState([]);
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState("");
  const [form,setForm]=useState({invoiceId:"",amount:"",file:null});
  const [createForm,setCreateForm]=useState({termId:"",classId:"",description:"ค่าเล่าเรียน",amount:"",dueDate:""});
  const [error,setError]=useState("");
  const money=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
  const statusMap={
    draft:["ฉบับร่าง",C.g600,C.g100],unpaid:["ค้างชำระ",C.red,C.redL],
    pending:["รอตรวจสอบ",C.yellow,C.yellowL],paid:["ชำระแล้ว",C.green,C.greenL],
    cancelled:["ยกเลิก",C.g600,C.g100],approved:["อนุมัติแล้ว",C.green,C.greenL],
    rejected:["ไม่ผ่าน",C.red,C.redL]
  };

  const load=useCallback(async()=>{
    setLoading(true);setError("");
    try{
      if(isStaff){
        const [allPay,t,c,allInv]=await Promise.all([
          sbFetch("payments?select=*,student_invoices(invoice_no,total_amount,student_id,students(full_name,student_no,classes(name))),receipts(receipt_no,issued_at)&order=created_at.desc&limit=300",{token}),
          sbFetch("fee_terms?is_active=eq.true&select=*&order=academic_year.desc,term_no.desc",{token}),
          sbFetch("classes?select=id,name&order=id.asc",{token}),
          sbFetch("student_invoices?select=*,fee_terms(name,academic_year,term_no),students(full_name,student_no,classes(name))&order=created_at.desc&limit=300",{token})
        ]);
        setPaymentHistory(allPay||[]);
        setPayments((allPay||[]).filter(x=>x.status==="pending").reverse());
        setTerms(t||[]);setClasses(c||[]);
        setStaffInvoices(allInv||[]);
      }else if(isTeacher){
        const links=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id,classes(id,name)`,{token});
        const classIds=(links||[]).map(x=>x.class_id);
        setTeacherClasses((links||[]).map(x=>x.classes).filter(Boolean));
        if(!classIds.length){setInvoices([]);setError("ยังไม่ได้ผูกครูประจำชั้นกับห้องเรียน");return;}
        const students=await sbFetch(`students?class_id=in.(${classIds.join(",")})&select=id&order=student_no.asc`,{token});
        const studentIds=(students||[]).map(x=>x.id);
        if(!studentIds.length){setInvoices([]);return;}
        const inv=await sbFetch(`student_invoices?student_id=in.(${studentIds.join(",")})&select=*,fee_terms(name,academic_year,term_no),students(full_name,student_no,classes(name))&order=created_at.desc`,{token});
        setInvoices(inv||[]);
      }else{
        let s=studentInfo;
        if(!s){
          const found=await sbFetch(`students?profile_id=eq.${profile.id}&select=id,full_name,student_no,classes(name)&limit=1`,{token});
          s=found?.[0]||null;setStudentInfo(s);
        }
        if(!s){setInvoices([]);return;}
        const inv=await sbFetch(`student_invoices?student_id=eq.${s.id}&select=*,fee_terms(name,academic_year,term_no),invoice_items(id,description,amount)&order=created_at.desc`,{token});
        setInvoices(inv||[]);
        const ids=(inv||[]).map(x=>x.id);
        if(ids.length){
          const pay=await sbFetch(`payments?invoice_id=in.(${ids.join(",")})&select=*&order=created_at.desc`,{token});
          setPayments(pay||[]);
          const payIds=(pay||[]).map(x=>x.id);
          if(payIds.length){
            const rec=await sbFetch(`receipts?payment_id=in.(${payIds.join(",")})&select=*`,{token});
            setReceipts(rec||[]);
          }else setReceipts([]);
        }else{setPayments([]);setReceipts([]);}
      }
    }catch(e){setError(e.message||"โหลดข้อมูลค่าเทอมไม่สำเร็จ");}
    finally{setLoading(false);}
  },[token,profile.id,isStaff,isTeacher,studentInfo?.id]);
  useEffect(()=>{load();},[load]);

  async function submitPayment(){
    const invoice=invoices.find(x=>x.id===form.invoiceId);
    if(!invoice||!form.file||Number(form.amount)<=0){setError("กรุณาเลือกใบแจ้งยอด ระบุจำนวนเงิน และแนบสลิป");return;}
    if(!form.file.type.startsWith("image/")){setError("กรุณาแนบสลิปเป็นไฟล์รูปภาพ");return;}
    if(form.file.size>5*1024*1024){setError("ไฟล์สลิปต้องมีขนาดไม่เกิน 5 MB");return;}
    setBusy("submit");setError("");
    try{
      const ext=(form.file.name.split(".").pop()||"jpg").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
      const path=`${profile.id}/${invoice.id}/${Date.now()}.${ext}`;
      await uploadPaymentSlip(form.file,path,token);
      const created=await sbFetch("payments",{method:"POST",token,body:JSON.stringify({
        invoice_id:invoice.id,parent_id:profile.id,amount:Number(form.amount),
        method:"bank_transfer",paid_at:new Date().toISOString(),slip_path:path,status:"pending"
      })});
      const payment=created?.[0];
      if(payment){
        try{
          await notifyTelegramPayment(payment.id,token);
        }catch(e){
          setError(`ส่งสลิปแล้ว แต่แจ้ง Telegram ไม่สำเร็จ: ${e.message}`);
        }
      }
      setForm({invoiceId:"",amount:"",file:null});await load();
    }catch(e){setError(e.message);}
    finally{setBusy("");}
  }

  async function openSlip(path){
    try{const url=await getPaymentSlipUrl(path,token);window.open(url,"_blank");}
    catch(e){setError(e.message);}
  }
  async function review(payment,status){
    const note=status==="rejected"?(prompt("ระบุเหตุผลที่ไม่อนุมัติ")||"หลักฐานไม่ถูกต้อง"):"";
    setBusy(payment.id);setError("");
    try{
      await sbFetch(`payments?id=eq.${payment.id}`,{method:"PATCH",token,body:JSON.stringify({
        status,review_note:note,reviewed_by:profile.id,reviewed_at:new Date().toISOString()
      })});
      await load();
    }catch(e){setError(e.message);}
    finally{setBusy("");}
  }
  async function createInvoices(){
    if(!createForm.termId||!createForm.description.trim()||Number(createForm.amount)<=0||!createForm.dueDate){
      setError("กรุณากรอกข้อมูลใบแจ้งยอดให้ครบ");return;
    }
    setBusy("create");setError("");
    try{
      const result=await sbFetch("rpc/create_fee_invoices",{method:"POST",token,body:JSON.stringify({
        p_term_id:Number(createForm.termId),
        p_description:createForm.description.trim(),
        p_amount:Number(createForm.amount),
        p_due_date:createForm.dueDate,
        p_class_id:createForm.classId?Number(createForm.classId):null
      })});
      alert(`สร้างใบแจ้งยอดสำเร็จ ${Number(result||0)} รายการ`);
      setCreateForm(p=>({...p,description:"ค่าเล่าเรียน",amount:""}));
      await load();
    }catch(e){setError(e.message);}
    finally{setBusy("");}
  }

  if(loading)return <Spin/>;
  const box={background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"};
  const badge=status=>{const x=statusMap[status]||[status,C.g600,C.g100];return <span style={{background:x[2],color:x[1],borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:800}}>{x[0]}</span>;};
  const filteredStaffInvoices=staffInvoices.filter(x=>invoiceClass==="all"||String(x.students?.classes?.name)===invoiceClass);
  const filteredPaymentHistory=paymentHistory.filter(p=>
    (historyStatus==="all"||p.status===historyStatus)&&
    (historyClass==="all"||String(p.student_invoices?.students?.classes?.name)===historyClass)
  );

  if(isStaff)return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={box}>
        <div style={{fontSize:16,fontWeight:800,color:C.navy}}>💰 ตรวจสอบการชำระค่าเทอม</div>
        <div style={{fontSize:12,color:C.g400,marginTop:3}}>รายการรอตรวจสอบ {payments.length} รายการ</div>
      </div>
      {error&&<div style={{background:C.redL,color:C.red,borderRadius:10,padding:12,fontSize:13,fontWeight:700}}>{error}</div>}
      <div style={{background:C.white,borderRadius:12,padding:5,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {[{id:"manage",label:"จัดการ"},{id:"invoices",label:"ใบแจ้งยอด"},{id:"history",label:"ประวัติ"}].map(x=><button key={x.id} onClick={()=>setStaffSection(x.id)} style={{border:"none",borderRadius:9,padding:"9px 4px",background:staffSection===x.id?C.navy:C.g100,color:staffSection===x.id?C.white:C.g600,fontWeight:800,fontSize:12,cursor:"pointer"}}>{x.label}</button>)}
      </div>
      {staffSection==="manage"&&<div style={box}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:10}}>สร้างใบแจ้งยอดทั้งห้อง</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <select value={createForm.termId} onChange={e=>setCreateForm(p=>({...p,termId:e.target.value}))} style={{padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14}}>
            <option value="">เลือกปีการศึกษา/ภาคเรียน</option>
            {terms.map(t=><option key={t.id} value={t.id}>{t.name} ({t.academic_year})</option>)}
          </select>
          <select value={createForm.classId} onChange={e=>setCreateForm(p=>({...p,classId:e.target.value}))} style={{padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14}}>
            <option value="">นักเรียนทุกห้อง</option>
            {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <input value={createForm.description} onChange={e=>setCreateForm(p=>({...p,description:e.target.value}))} placeholder="รายการค่าใช้จ่าย" style={{padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14}}/>
          <div style={{display:"flex",gap:8}}>
            <input type="number" min="0" value={createForm.amount} onChange={e=>setCreateForm(p=>({...p,amount:e.target.value}))} placeholder="จำนวนเงิน" style={{minWidth:0,flex:1,padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14}}/>
            <input type="date" value={createForm.dueDate} onChange={e=>setCreateForm(p=>({...p,dueDate:e.target.value}))} style={{minWidth:0,flex:1,padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14}}/>
          </div>
          <button onClick={createInvoices} disabled={busy==="create"} style={{border:"none",background:busy==="create"?C.g400:C.navy,color:C.white,borderRadius:10,padding:11,fontWeight:800,cursor:"pointer"}}>{busy==="create"?"กำลังสร้าง...":"สร้างใบแจ้งยอด"}</button>
        </div>
      </div>}
      {staffSection==="invoices"&&<div style={box}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:800,color:C.navy}}>ใบแจ้งยอดที่สร้างแล้ว</div>
          <span style={{background:C.g100,color:C.g600,borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:800}}>{filteredStaffInvoices.length} รายการ</span>
        </div>
        <select value={invoiceClass} onChange={e=>setInvoiceClass(e.target.value)} style={{width:"100%",padding:9,border:`1.5px solid ${C.g200}`,borderRadius:9,background:C.white,fontSize:13,marginBottom:8}}>
          <option value="all">ทุกห้องเรียน</option>
          {classes.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
        </select>
        {filteredStaffInvoices.length===0?<Empty icon="🧾" msg="ยังไม่มีใบแจ้งยอดในห้องนี้"/>:filteredStaffInvoices.map((inv,i)=>(
          <div key={inv.id} style={{padding:"10px 0",borderBottom:i<filteredStaffInvoices.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{inv.students?.full_name||"-"}</div>
                <div style={{fontSize:11,color:C.g400}}>{inv.students?.classes?.name||"-"} · เลขที่ {inv.students?.student_no||"-"} · {inv.fee_terms?.name||inv.invoice_no}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:13,color:C.navy}}>฿{money(inv.total_amount)}</div>
                <div style={{marginTop:3}}>{badge(inv.status)}</div>
              </div>
            </div>
          </div>
        ))}
      </div>}
      {staffSection==="manage"&&(payments.length===0?<div style={box}><Empty icon="✅" msg="ไม่มีรายการรอตรวจสอบ"/></div>:payments.map(p=>(
        <div key={p.id} style={box}>
          <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
            <div><div style={{fontWeight:800,color:C.navy}}>{p.student_invoices?.students?.full_name}</div>
            <div style={{fontSize:12,color:C.g400}}>{p.student_invoices?.students?.classes?.name} · {p.student_invoices?.invoice_no}</div></div>
            <div style={{fontSize:18,fontWeight:800,color:C.yellow}}>฿{money(p.amount)}</div>
          </div>
          <div style={{fontSize:12,color:C.g600,marginTop:8}}>แจ้งชำระ {new Date(p.paid_at).toLocaleString("th-TH")}</div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>openSlip(p.slip_path)} style={{flex:1,border:`1.5px solid ${C.navy}`,background:C.white,color:C.navy,borderRadius:10,padding:10,fontWeight:700,cursor:"pointer"}}>ดูสลิป</button>
            <button onClick={()=>review(p,"rejected")} disabled={busy===p.id} style={{border:"none",background:C.redL,color:C.red,borderRadius:10,padding:"10px 14px",fontWeight:700,cursor:"pointer"}}>ไม่อนุมัติ</button>
            <button onClick={()=>review(p,"approved")} disabled={busy===p.id} style={{border:"none",background:C.green,color:C.white,borderRadius:10,padding:"10px 14px",fontWeight:700,cursor:"pointer"}}>อนุมัติ</button>
          </div>
        </div>
      )))}
      {staffSection==="history"&&<div style={box}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:10}}>🕘 ประวัติการชำระย้อนหลัง</div>
        <div>
          <select value={historyClass} onChange={e=>setHistoryClass(e.target.value)} style={{width:"100%",padding:9,border:`1.5px solid ${C.g200}`,borderRadius:9,background:C.white,fontSize:13,marginBottom:8}}>
            <option value="all">ทุกห้องเรียน</option>
            {classes.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
          </select>
          <select value={historyStatus} onChange={e=>setHistoryStatus(e.target.value)} style={{width:"100%",padding:9,border:`1.5px solid ${C.g200}`,borderRadius:9,background:C.white,fontSize:13,marginBottom:8}}>
            <option value="all">ทุกสถานะ</option>
            <option value="pending">รอตรวจสอบ</option>
            <option value="approved">อนุมัติแล้ว</option>
            <option value="rejected">ไม่อนุมัติ</option>
          </select>
          {filteredPaymentHistory.length===0?<Empty icon="🕘" msg="ยังไม่มีประวัติการชำระ"/>:filteredPaymentHistory.map((p,i)=>{
            const receipt=p.receipts?.[0];
            return <div key={p.id} style={{padding:"11px 0",borderBottom:i<filteredPaymentHistory.length-1?`1px solid ${C.g100}`:"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.student_invoices?.students?.full_name||"-"}</div>
                  <div style={{fontSize:11,color:C.g400}}>{p.student_invoices?.students?.classes?.name||"-"} · {new Date(p.paid_at).toLocaleString("th-TH")}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.navy}}>฿{money(p.amount)}</div>
                  <div style={{marginTop:3}}>{badge(p.status)}</div>
                </div>
              </div>
              {receipt&&<div style={{fontSize:11,color:C.green,fontWeight:700,marginTop:5}}>ใบเสร็จ {receipt.receipt_no}</div>}
              {p.review_note&&<div style={{fontSize:11,color:C.red,marginTop:4}}>หมายเหตุ: {p.review_note}</div>}
              {p.slip_path&&<button onClick={()=>openSlip(p.slip_path)} style={{marginTop:7,border:`1px solid ${C.navy}`,background:C.white,color:C.navy,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>ดูสลิป</button>}
            </div>;
          })}
        </div>
      </div>}
    </div>
  );

  if(isTeacher){
    const counts={unpaid:0,pending:0,paid:0};
    invoices.forEach(x=>{if(counts[x.status]!==undefined)counts[x.status]++;});
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={box}>
          <div style={{fontSize:16,fontWeight:800,color:C.navy}}>💰 สถานะค่าเทอมห้องประจำชั้น</div>
          <div style={{fontSize:12,color:C.g400,marginTop:3}}>{teacherClasses.map(x=>x.name).join(", ")||"-"}</div>
        </div>
        {error&&<div style={{background:C.redL,color:C.red,borderRadius:10,padding:12,fontSize:13,fontWeight:700}}>{error}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[
            {label:"ค้างชำระ",value:counts.unpaid,color:C.red,bg:C.redL},
            {label:"รอตรวจ",value:counts.pending,color:C.yellow,bg:C.yellowL},
            {label:"ชำระแล้ว",value:counts.paid,color:C.green,bg:C.greenL}
          ].map(x=><div key={x.label} style={{background:x.bg,borderRadius:12,padding:"12px 6px",textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:x.color}}>{x.value}</div><div style={{fontSize:11,fontWeight:700,color:x.color}}>{x.label}</div></div>)}
        </div>
        {invoices.length===0?<div style={box}><Empty icon="🧾" msg="ฝ่ายการเงินยังไม่ได้สร้างใบแจ้งยอดสำหรับห้องนี้"/></div>:invoices.map(inv=>(
          <div key={inv.id} style={box}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div>
                <div style={{fontWeight:800,color:C.navy}}>{inv.students?.full_name}</div>

            {badge(inv.status)}

          <div style={{marginTop:12,borderTop:`1px solid ${C.g100}`,paddingTop:8}}>

          </div>
          {invPayments.map(p=>{const receipt=receipts.find(r=>r.payment_id===p.id);return <div key={p.id} style={{marginTop:10,background:C.g50,borderRadius:10,padding:10,fontSize:12}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>แจ้งชำระ ฿{money(p.amount)}</span>{badge(p.status)}</div>
            {p.review_note&&<div style={{color:C.red,marginTop:4}}>หมายเหตุ: {p.review_note}</div>}
            {receipt&&<div style={{color:C.green,fontWeight:700,marginTop:4}}>ใบเสร็จเลขที่ {receipt.receipt_no}</div>}
          </div>;})}
          {!["paid","cancelled"].includes(inv.status)&&<button onClick={()=>setForm({invoiceId:inv.id,amount:String(Math.max(0,Number(inv.total_amount)-Number(inv.paid_amount))),file:null})} style={{width:"100%",marginTop:12,border:"none",background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:C.navyD,borderRadius:10,padding:11,fontWeight:800,cursor:"pointer"}}>แจ้งชำระเงิน</button>}
        </div>;
      })}
      {form.invoiceId&&<div style={box}>

        <input type="number" min="0" step="0.01" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="จำนวนเงิน" style={{width:"100%",padding:11,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,marginBottom:9}}/>
        <input type="file" accept="image/*" onChange={e=>setForm(p=>({...p,file:e.target.files?.[0]||null}))} style={{width:"100%",padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:13,marginBottom:9}}/>
        <div style={{fontSize:11,color:C.g400,marginBottom:10}}>รองรับไฟล์รูปภาพ ขนาดไม่เกิน 5 MB</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setForm({invoiceId:"",amount:"",file:null})} style={{flex:1,border:"none",background:C.g100,color:C.g600,borderRadius:10,padding:11,fontWeight:700}}>ยกเลิก</button>
          <button onClick={submitPayment} disabled={busy==="submit"} style={{flex:2,border:"none",background:busy==="submit"?C.g400:C.navy,color:C.white,borderRadius:10,padding:11,fontWeight:800}}>{busy==="submit"?"กำลังส่ง...":"ส่งสลิปให้ตรวจสอบ"}</button>
        </div>
      </div>}
    </div>
  );
}

  useEffect(()=>{

    {id:"leave",icon:"📝",label:tx("แจ้งลาเรียน","Leave request"),bg:"linear-gradient(135deg,#ea580c,#f97316)",action:()=>onPageChange("leave")},

        <div style={{width:58,height:58,borderRadius:99,background:C.goldP,border:`3px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>

function ParentView({token,profile,userId}){
  const [children,setChildren]=useState([]);const [sel,setSel]=useState(null);const [info,setInfo]=useState(null);const [loading,setLoading]=useState(true);const [page,setPage]=useState("home");const [err,setErr]=useState("");
  useEffect(()=>{
    const load=async()=>{
      setLoading(true);setErr("");
      try{
        const parentId=userId||profile?.id;
        const links=await sbFetch(`parent_student?parent_id=eq.${parentId}&select=student_id`,{token});
        const ids=(links||[]).map(x=>x.student_id).filter(Boolean);
        if(ids.length===0){setChildren([]);setErr("ไม่พบข้อมูลการผูกผู้ปกครองกับนักเรียนใน parent_student");return;}
        const k=await sbFetch(`students?id=in.(${ids.join(",")})&select=id,full_name,student_no,classes(name)&order=student_no.asc`,{token});
        setChildren(k||[]);
        if((k||[]).length===0){setErr("พบการผูกแล้ว แต่ยังอ่านข้อมูลนักเรียนไม่ได้ กรุณาตรวจ RLS ของ students/classes");}
        if((k||[]).length===1){setSel(k[0]);setInfo(k[0]);}
      }catch(e){
        setChildren([]);
        setErr(e.message||"โหลดข้อมูลบุตรหลานไม่สำเร็จ");
      }finally{setLoading(false);}

  if(loading)return <Spin/>;
  if(!sel)return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`linear-gradient(135deg,${C.navyD},${C.navy})`,borderRadius:20,padding:20}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:58,height:58,borderRadius:99,background:C.goldP,border:`3px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>👪</div>
          <div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>ผู้ปกครอง</div><div style={{color:C.gold,fontSize:17,fontWeight:800}}>{profile?.full_name}</div></div>
        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>👶 เลือกบุตรหลาน</div>
        {err&&<div style={{background:C.redL,color:C.red,border:`1.5px solid ${C.red}`,borderRadius:10,padding:"10px 12px",fontSize:13,fontWeight:700,marginBottom:10}}>{err}</div>}
        {children.length===0?<Empty icon="👪" msg="ยังไม่มีข้อมูลบุตรหลาน"/>:children.map(c=>(
          <button key={c.id} onClick={()=>{setSel(c);setInfo(c);}} style={{width:"100%",textAlign:"left",background:C.g50,border:`1.5px solid ${C.g200}`,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:46,height:46,borderRadius:99,background:C.goldP,border:`2px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👧</div>
            <div><div style={{fontWeight:700,fontSize:15,color:C.navy}}>{c.full_name}</div><div style={{fontSize:12,color:C.g400}}>{c.classes?.name||"—"} · เลขที่ {c.student_no||"—"}</div></div>
            <div style={{marginLeft:"auto",color:C.gold,fontSize:20}}>›</div>
          </button>
        ))}
      </div>
    </div>
  );
  // หน้าย่อยสำหรับผู้ปกครอง
  const Back=()=><button onClick={()=>setPage("home")} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,marginBottom:14}}>← กลับ</button>;
  if(page==="attend")return <div><Back/><AttendContent token={token} studentId={sel.id}/></div>;
  if(page==="grades")return <div><Back/><Grades token={token} isTeacher={false}/></div>;
  if(page==="announce")return <div><Back/><Announce token={token} profile={profile}/></div>;
  if(page==="leave")return <div><Back/><LeaveForm token={token} profile={profile} initStudents={children}/></div>;
  if(page==="messages")return <div><Back/><Messages token={token} profile={profile}/></div>;
  if(page==="checkin")return <div><Back/><AttendHist token={token} studentId={sel.id} studentName={sel.full_name}/></div>;
  if(page==="tuition")return <div><Back/><TuitionView token={token} profile={profile} student={sel}/></div>;
  if(page==="exam"){window.open(EXAM_URL,"_blank");setPage("home");}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSel(null)} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14}}>← กลับ</button>
        <div style={{fontWeight:700,fontSize:15,color:C.navy}}>{sel.full_name}</div>
      </div>
      <StudentHome token={token} profile={profile} studentId={sel.id} studentInfo={info} onPageChange={setPage}/>
    </div>
  );
}

function AttendContent({token,studentId}){
  const [att,setAtt]=useState([]);const [loading,setLoading]=useState(true);
  useEffect(()=>{sbFetch(`attendance?student_id=eq.${studentId}&select=*&order=date.desc&limit=30`,{token}).then(a=>setAtt(a||[])).finally(()=>setLoading(false));},[token,studentId]);
  if(loading)return <Spin/>;
  const sum={present:0,late:0,absent:0,leave:0};att.forEach(a=>{if(sum[a.status]!==undefined)sum[a.status]++;});
  const pct=att.length>0?Math.round((sum.present/att.length)*100):0;
  return(
    <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
        <div style={{width:64,height:64,borderRadius:99,background:pct>=80?C.greenL:C.yellowL,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,color:pct>=80?C.green:C.yellow}}>{pct}%</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{Object.entries(sum).map(([k,v])=>{const c={present:C.green,late:C.yellow,absent:C.red,leave:C.g600};const bg={present:C.greenL,late:C.yellowL,absent:C.redL,leave:C.g100};const l={present:"มา",late:"สาย",absent:"ขาด",leave:"ลา"};return <span key={k} style={{background:bg[k],color:c[k],borderRadius:8,padding:"3px 9px",fontSize:12,fontWeight:700}}>{l[k]} {v}</span>;})}
        </div>
      </div>
      {att.slice(0,10).map((a,i)=>(
        <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<9?`1px solid ${C.g100}`:"none"}}>
          <div style={{fontSize:14,color:C.g700}}>{new Date(a.date+"T00:00:00").toLocaleDateString("th-TH",{dateStyle:"short"})}</div>
          <span style={{background:{present:C.greenL,late:C.yellowL,absent:C.redL,leave:C.g100}[a.status],color:{present:C.green,late:C.yellow,absent:C.red,leave:C.g600}[a.status],borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:700}}>{{"present":"มา","late":"สาย","absent":"ขาด","leave":"ลา"}[a.status]}</span>
        </div>
      ))}
    </div>
  );
}

function ChangePasswordView({email,token,onChanged}){
  const [form,setForm]=useState({current:"",next:"",confirm:""});
  const [show,setShow]=useState({current:false,next:false,confirm:false});
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState("");
  const fieldStyle={width:"100%",border:`1.5px solid ${C.g200}`,borderRadius:10,padding:"12px 44px 12px 12px",fontSize:15,outline:"none",background:C.white};
  const setValue=(key,value)=>setForm(p=>({...p,[key]:value}));
  const toggle=(key)=>setShow(p=>({...p,[key]:!p[key]}));
  async function submit(e){
    e.preventDefault();setError("");
    if(!form.current||!form.next||!form.confirm)return setError(tx("กรุณากรอกข้อมูลให้ครบ","Please complete all fields"));
    if(form.next.length<8)return setError(tx("รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว","New password must contain at least 8 characters"));
    if(form.next!==form.confirm)return setError(tx("ยืนยันรหัสผ่านใหม่ไม่ตรงกัน","New passwords do not match"));
    if(form.current===form.next)return setError(tx("รหัสผ่านใหม่ต้องไม่ซ้ำกับรหัสเดิม","New password must differ from the current password"));
    setBusy(true);
    try{
      await signIn(email,form.current);
      await updatePassword(token,form.next);
      window.alert(tx("เปลี่ยนรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบใหม่","Password changed. Please sign in again."));
      onChanged();
    }catch(err){setError(err.message||tx("เปลี่ยนรหัสผ่านไม่สำเร็จ","Could not change password"));}
    finally{setBusy(false);}
  }
  const PasswordField=({field,label})=>(
    <label style={{display:"block",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.g700,marginBottom:6}}>{label}</div>
      <div style={{position:"relative"}}>
        <input type={show[field]?"text":"password"} value={form[field]} onChange={e=>setValue(field,e.target.value)} autoComplete={field==="current"?"current-password":"new-password"} style={fieldStyle}/>
        <button type="button" onClick={()=>toggle(field)} aria-label={show[field]?tx("ซ่อนรหัสผ่าน","Hide password"):tx("แสดงรหัสผ่าน","Show password")} title={show[field]?tx("ซ่อนรหัสผ่าน","Hide password"):tx("แสดงรหัสผ่าน","Show password")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",width:36,height:36,border:"none",background:"transparent",fontSize:18,cursor:"pointer"}}>{show[field]?"🙈":"👁️"}</button>
      </div>
    </label>
  );
  return(
    <form onSubmit={submit} style={{background:C.white,borderRadius:16,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
      <div style={{fontSize:17,fontWeight:800,color:C.navy,marginBottom:18}}>🔐 {tx("เปลี่ยนรหัสผ่าน","Change password")}</div>
      <PasswordField field="current" label={tx("รหัสผ่านปัจจุบัน","Current password")}/>
      <PasswordField field="next" label={tx("รหัสผ่านใหม่","New password")}/>
      <PasswordField field="confirm" label={tx("ยืนยันรหัสผ่านใหม่","Confirm new password")}/>
      {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:9,padding:"10px 12px",fontSize:13,fontWeight:600,marginBottom:14}}>{error}</div>}
      <button disabled={busy} style={{width:"100%",padding:"12px",border:"none",borderRadius:11,background:C.navy,color:C.white,fontSize:15,fontWeight:800,cursor:busy?"wait":"pointer",opacity:busy?0.7:1}}>{busy?tx("กำลังเปลี่ยน...","Changing..."):tx("บันทึกรหัสผ่านใหม่","Save new password")}</button>
    </form>
  );
}

// ======= MAIN APP =======
function App(){
  const [auth,setAuth]=useState(()=>{try{const s=localStorage.getItem("sch");return s?JSON.parse(s):null;}catch{return null;}});
  const [tab,setTab]=useState("home");
  const [subPage,setSubPage]=useState(null);
  const [activeRole,setActiveRole]=useState(null);
  const [lang,setLang]=useState(()=>localStorage.getItem("school_lang")||"th");

  function goPage(p){setSubPage(p);setTab("home");}
  function goBack(){setSubPage(null);}
  function onLogin(d){setAuth(d);setTab("home");setSubPage(null);setActiveRole(null);}
  function onLogout(){signOut(auth?.session?.access_token);localStorage.removeItem("sch");setAuth(null);}

  if(!auth)return <Login onLogin={onLogin}/>;
  const {session,profile}=auth;
  const token=session?.access_token;
  const rawRole=profile?.role;
  const role=rawRole==="teacher_parent"?(activeRole||"teacher"):rawRole;
  const hasDualRole=rawRole==="teacher_parent";

  // Bottom tabs
  const tabs=["teacher","finance","admin"].includes(role)
    ?[{id:"home",icon:"🏠",label:tx("หน้าหลัก","Home")},{id:"scan",icon:"📷",label:tx("สแกน","Scan")},{id:"announce",icon:"📢",label:tx("ประกาศ","News")},{id:"messages",icon:"💬",label:tx("ข้อความ","Messages")},{id:"settings",icon:"⚙️",label:tx("ตั้งค่า","Settings")}]
    :[{id:"home",icon:"🏠",label:tx("หน้าหลัก","Home")},{id:"announce",icon:"📢",label:tx("ประกาศ","News")},{id:"messages",icon:"💬",label:tx("ข้อความ","Messages")},{id:"settings",icon:"⚙️",label:tx("ตั้งค่า","Settings")}];

  function handleTab(id){
    if(id==="scan"){window.open("./scanner.html","_self");return;}
    setTab(id);setSubPage(null);
  }

  function renderContent(){
    // sub pages
    if(subPage){
      const Back=()=><button onClick={goBack} style={{background:C.g100,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,marginBottom:14}}>← {tx("กลับ","Back")}</button>;
      if(subPage==="checkin")return <div><Back/><AttendHist token={token}/></div>;
      if(subPage==="attendance")return <div><Back/><AttendCheck token={token} profile={profile}/></div>;
      if(subPage==="grades")return <div><Back/><Grades token={token} isTeacher={role==="teacher"}/></div>;
      if(subPage==="leave")return <div><Back/>{role==="parent"?<LeaveForm token={token} profile={profile} initStudents={[]}/>:<LeaveRequestsView token={token} profile={profile}/>}</div>;
      if(subPage==="tuition")return <div><Back/><TuitionView token={token} profile={profile}/></div>;
      if(subPage==="password")return <div><Back/><ChangePasswordView email={session?.user?.email||""} token={token} onChanged={onLogout}/></div>;
    }
    // tabs
    if(tab==="announce")return <Announce token={token} profile={profile}/>;
    if(tab==="messages")return <Messages token={token} profile={profile}/>;
    if(tab==="settings")return(
      <div style={{background:C.white,borderRadius:16,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:16}}>⚙️ {tx("การตั้งค่า","Settings")}</div>
        {[{icon:"👤",label:tx("ข้อมูลส่วนตัว","Profile")},{icon:"🔐",label:tx("เปลี่ยนรหัสผ่าน","Change password"),action:()=>goPage("password")},{icon:"🔔",label:tx("การแจ้งเตือน","Notifications")},{icon:"ℹ️",label:tx("เวอร์ชัน 1.4.0","Version 1.4.0")}].map((x,i)=>(
          <div key={i} onClick={x.action} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.g100}`,cursor:x.action?"pointer":"default"}}>
            <span style={{fontSize:20}}>{x.icon}</span><div style={{flex:1,fontSize:14,fontWeight:600,color:C.g700}}>{x.label}</div><span style={{color:C.g400}}>›</span>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.g100}`}}>
          <span style={{fontSize:20}}>🌐</span>
          <label htmlFor="language-select" style={{flex:1,fontSize:14,fontWeight:600,color:C.g700}}>{tx("ภาษา","Language")}</label>
          <select id="language-select" value={lang} onChange={e=>{localStorage.setItem("school_lang",e.target.value);setLang(e.target.value);}} style={{border:`1.5px solid ${C.g200}`,borderRadius:9,padding:"7px 9px",background:C.white,color:C.navy,fontWeight:700}}>
            <option value="th">ไทย</option>
            <option value="en">English</option>
          </select>
        </div>
        <button onClick={onLogout} style={{width:"100%",marginTop:20,padding:"12px",background:C.redL,color:C.red,border:`1.5px solid ${C.red}`,borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>🚪 {tx("ออกจากระบบ","Sign out")}</button>
      </div>
    );
    if(tab==="home"){
      if(["teacher","finance","admin"].includes(role))return <TeacherHomeView token={token} profile={profile} setPage={goPage}/>;
      if(role==="parent")return <ParentView token={token} profile={profile} userId={session?.user?.id}/>;
      return <StudentHome token={token} profile={profile} studentId={null} studentInfo={null} onPageChange={goPage}/>;
    }
    return null;
  }

  const rl={teacher:tx("ครู","Teacher"),student:tx("นักเรียน","Student"),parent:tx("ผู้ปกครอง","Parent"),teacher_parent:tx("ครู/ผู้ปกครอง","Teacher/Parent"),finance:tx("ฝ่ายการเงิน","Finance"),admin:tx("ผู้ดูแลระบบ","Administrator")};

  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:C.bg,fontFamily:"'Sarabun','Segoe UI',sans-serif",paddingBottom:72}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.navyD},${C.navy})`,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:20,boxShadow:"0 2px 12px rgba(26,58,107,0.35)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src="./icon-512.png" style={{width:38,height:38,objectFit:"contain"}} alt="ตราโรงเรียนกลั่นวิทยา"/>
          <div style={{color:C.gold,fontSize:15,fontWeight:800}}>{tx("กลั่นวิทยา","Klunwittaya")}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20,cursor:"pointer"}}>🔔</span>
          <div style={{background:"rgba(201,162,39,0.2)",border:`1px solid ${C.gold}`,borderRadius:99,padding:"3px 10px",color:C.gold,fontSize:12,fontWeight:700}}>{rl[role]||role}</div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:14,animation:"fadeIn 0.25s ease"}}>
        {hasDualRole&&<div style={{background:C.white,borderRadius:14,padding:6,display:"flex",gap:6,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:12}}>
          {[{id:"teacher",label:tx("โหมดครู","Teacher mode"),icon:"👩‍🏫"},{id:"parent",label:tx("โหมดผู้ปกครอง","Parent mode"),icon:"👪"}].map(x=>(
            <button key={x.id} onClick={()=>{setActiveRole(x.id);setTab("home");setSubPage(null);}} style={{flex:1,border:"none",borderRadius:10,padding:"9px 8px",background:role===x.id?`linear-gradient(135deg,${C.navy},${C.navyL})`:C.g100,color:role===x.id?C.white:C.g600,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              {x.icon} {x.label}
            </button>
          ))}
        </div>}
        {renderContent()}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:C.white,borderTop:`1px solid ${C.g200}`,display:"flex",zIndex:20,paddingBottom:"env(safe-area-inset-bottom)",boxShadow:"0 -2px 12px rgba(0,0,0,0.08)"}}>
        {tabs.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>handleTab(t.id)} style={{flex:1,padding:"8px 2px 10px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:tab===t.id&&!subPage?`2.5px solid ${C.navy}`:"2.5px solid transparent",transition:"all 0.15s"}}>
            <span style={{fontSize:22}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,color:tab===t.id&&!subPage?C.navy:C.g400}}>{t.label}</span>
          </button>
        ))}
      </div>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js").catch(()=>{});});}
</script>
</body>
