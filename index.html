              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setEditing(null);setEditImageFile(null);setRemoveEditImage(false);}} style={{flex:1,border:"none",background:C.g100,color:C.g600,borderRadius:10,padding:10,fontWeight:800,cursor:"pointer"}}>ยกเลิก</button>
                <button onClick={saveEdit} disabled={saving||!editing.title} style={{flex:1,border:"none",background:saving||!editing.title?C.g400:C.navy,color:C.white,borderRadius:10,padding:10,fontWeight:800,cursor:"pointer"}}>{saving?"กำลังบันทึก...":"บันทึก"}</button>
              </div>
            </div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ======= MESSAGES =======
function Messages({token,profile}){
  const [msgs,setMsgs]=useState([]);const [users,setUsers]=useState([]);const [sel,setSel]=useState(null);const [body,setBody]=useState("");const [loading,setLoading]=useState(true);const [sending,setSending]=useState(false);
  const load=useCallback(async()=>{
    const [m,u]=await Promise.all([sbFetch(`messages?or=(sender_id.eq.${profile.id},receiver_id.eq.${profile.id})&select=*&order=created_at.desc`,{token}),sbFetch("profiles?select=id,full_name,role",{token})]);
    setMsgs(m||[]);setUsers((u||[]).filter(x=>x.id!==profile.id));setLoading(false);
  },[token,profile]);
  useEffect(()=>{load();},[load]);
  async function send(){if(!body.trim()||!sel)return;setSending(true);try{await sbFetch("messages",{method:"POST",token,body:JSON.stringify({sender_id:profile.id,receiver_id:sel,body})});setBody("");load();}catch(e){alert(e.message);}finally{setSending(false);}}
  const rl={teacher:"ครู",student:"นักเรียน",parent:"ผู้ปกครอง"};
  const conv=sel?msgs.filter(m=>(m.sender_id===profile.id&&m.receiver_id===sel)||(m.sender_id===sel&&m.receiver_id===profile.id)):[];
  if(loading)return <Spin/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>💬 ส่งข้อความ</div>
        <select value={sel||""} onChange={e=>setSel(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,marginBottom:10}}><option value="">เลือกผู้รับ</option>{users.map(u=><option key={u.id} value={u.id}>{u.full_name} ({rl[u.role]||u.role})</option>)}</select>
        <div style={{display:"flex",gap:8}}><input style={{flex:1,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,outline:"none"}} placeholder="พิมพ์ข้อความ..." value={body} onChange={e=>setBody(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/><button onClick={send} disabled={sending||!sel||!body.trim()} style={{background:sending||!sel||!body.trim()?C.g400:C.navy,color:C.white,border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>ส่ง</button></div>
      </div>
      {sel&&conv.length>0&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {conv.map(m=>{const isMe=m.sender_id===profile.id;return(<div key={m.id} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",marginBottom:8}}><div style={{maxWidth:"75%",padding:"9px 13px",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isMe?C.navy:C.g100,color:isMe?C.white:C.g900,fontSize:14}}><div>{m.body}</div><div style={{fontSize:10,marginTop:3,opacity:0.6,textAlign:isMe?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString("th-TH",{timeStyle:"short"})}</div></div></div>);})}
      </div>}
      {msgs.length>0&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>ข้อความล่าสุด</div>
        {msgs.slice(0,8).map((m,i)=>{const other=users.find(u=>u.id===(m.sender_id===profile.id?m.receiver_id:m.sender_id));const isMe=m.sender_id===profile.id;return(<div key={m.id} style={{padding:"9px 0",borderBottom:i<7?`1px solid ${C.g100}`:"none",cursor:"pointer"}} onClick={()=>setSel(isMe?m.receiver_id:m.sender_id)}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontWeight:600,fontSize:14}}>{isMe?"ฉัน → ":""}{other?.full_name||"—"}</div><div style={{fontSize:11,color:C.g400}}>{new Date(m.created_at).toLocaleDateString("th-TH",{dateStyle:"short"})}</div></div><div style={{fontSize:13,color:C.g600,marginTop:1}}>{m.body}</div></div>);})}
      </div>}
    </div>
  );
}

// ======= PARENT-TEACHER TALK =======
function ParentTeacherTalk({token,profile,role,student=null}){
  const [students,setStudents]=useState([]);
  const [selected,setSelected]=useState(student||null);
  const [unreadByStudent,setUnreadByStudent]=useState({});
  const [messages,setMessages]=useState([]);
  const [body,setBody]=useState("");
  const [loading,setLoading]=useState(true);
  const [sending,setSending]=useState(false);
  const isStaff=["teacher","teacher_parent","admin"].includes(role);
  const load=useCallback(async()=>{
    setLoading(true);
    try{
      if(isStaff){
        let stu=[];
        if(role==="admin"){
          const rows=await sbFetch("students?select=id,full_name,student_no,class_id,classes(name)&order=class_id.asc,student_no.asc",{token}).catch(()=>[]);
          stu=rows||[];
        }else{
          const links=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id`,{token}).catch(()=>[]);
          const ids=(links||[]).map(x=>x.class_id).filter(Boolean);
          stu=ids.length?await sbFetch(`students?class_id=in.(${ids.join(",")})&select=id,full_name,student_no,class_id,classes(name)&order=class_id.asc,student_no.asc`,{token}).catch(()=>[]):[];
        }
        let unreadMap={};
        if(stu.length){
          const ids=stu.map(s=>s.id).filter(Boolean);
          const readCol=isStaff?"teacher_read_at":"parent_read_at";
          const unreadFrom=isStaff?"parent_id=not.is.null":"teacher_id=not.is.null";
          const unread=await sbFetch(`parent_teacher_messages?student_id=in.(${ids.join(",")})&${unreadFrom}&${readCol}=is.null&select=id,student_id,body,created_at&order=created_at.desc`,{token}).catch(()=>[]);
          (unread||[]).forEach(m=>{
            if(!unreadMap[m.student_id])unreadMap[m.student_id]={count:0,lastBody:m.body,lastAt:m.created_at};
            unreadMap[m.student_id].count+=1;
          });
          stu=[...stu].sort((a,b)=>{
            const au=unreadMap[a.id]?.count||0,bu=unreadMap[b.id]?.count||0;
            if(au!==bu)return bu-au;
            return String(a.classes?.name||"").localeCompare(String(b.classes?.name||""),"th")||Number(a.student_no||0)-Number(b.student_no||0);
          });
        }
        setUnreadByStudent(unreadMap);
        setStudents(stu);
        if(!selected&&stu.length>0)setSelected(stu[0]);
      }else if(student){
        setStudents([student]);
        setSelected(student);
      }
    }finally{setLoading(false);}
  },[token,profile.id,role,student?.id]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{
    if(!selected?.id){setMessages([]);return;}
    const loadMessages=()=>{
      sbFetch(`parent_teacher_messages?student_id=eq.${selected.id}&select=*&order=created_at.asc`,{token})
        .then(rows=>{
          const list=rows||[];
          setMessages(list);
          const readCol=isStaff?"teacher_read_at":"parent_read_at";
          const incoming=m=>isStaff?!!m.parent_id:!!m.teacher_id;
          const readFilter=isStaff?"parent_id=not.is.null":"teacher_id=not.is.null";
          if(list.some(m=>incoming(m)&&!m[readCol])){
            sbFetch(`parent_teacher_messages?student_id=eq.${selected.id}&${readFilter}&${readCol}=is.null`,{method:"PATCH",token,body:JSON.stringify({[readCol]:new Date().toISOString()})}).catch(()=>{});
            setUnreadByStudent(p=>{const next={...p};delete next[selected.id];return next;});
          }
        })
        .catch(()=>setMessages([]));
    };
    loadMessages();
    const timer=setInterval(loadMessages,15000);
    return()=>clearInterval(timer);
  },[token,selected?.id,profile.id,isStaff]);
  async function send(){
    if(!selected?.id||!body.trim())return;
    setSending(true);
    try{
      const payload={student_id:selected.id,sender_id:profile.id,body:body.trim()};
      if(!isStaff)payload.parent_id=profile.id;
      if(isStaff)payload.teacher_id=profile.id;
      await sbFetch("parent_teacher_messages",{method:"POST",token,body:JSON.stringify(payload)});
      setBody("");
      const rows=await sbFetch(`parent_teacher_messages?student_id=eq.${selected.id}&select=*&order=created_at.asc`,{token});
      setMessages(rows||[]);
    }catch(e){alert(e.message);}
    finally{setSending(false);}
  }
  if(loading)return <Spin/>;
  const studentLabel=s=>`${s.full_name||"-"}${s.classes?.name?` · ${s.classes.name}`:""}${s.student_no?` · เลขที่ ${s.student_no}`:""}`;
  const unreadStudents=students.filter(s=>unreadByStudent[s.id]?.count>0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:16,fontWeight:800,color:C.navy}}>💬 พูดคุย / ติดต่อครู</div>
        <div style={{fontSize:12,color:C.g400,marginTop:3}}>ใช้สำหรับเรื่องการเรียน การมาเรียน งานโรงเรียน และเรื่องจำเป็นของนักเรียน</div>
        {isStaff&&unreadStudents.length>0&&<div style={{marginTop:12,background:C.redL,border:`1px solid ${C.red}`,borderRadius:12,padding:10}}>
          <div style={{fontSize:12,fontWeight:900,color:C.red,marginBottom:7}}>ข้อความใหม่จากผู้ปกครอง</div>
          {unreadStudents.slice(0,5).map(s=><button key={s.id} onClick={()=>setSelected(s)} style={{width:"100%",border:"none",background:C.white,borderRadius:9,padding:"8px 10px",marginTop:6,textAlign:"left",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:900,color:C.navy}}>{studentLabel(s)}</span>
              <span style={{background:C.red,color:C.white,borderRadius:99,padding:"2px 7px",fontSize:11,fontWeight:900,whiteSpace:"nowrap"}}>{unreadByStudent[s.id].count} ใหม่</span>
            </div>
            {unreadByStudent[s.id].lastBody&&<div style={{fontSize:12,color:C.g600,marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{unreadByStudent[s.id].lastBody}</div>}
          </button>)}
        </div>}
        {isStaff&&<select value={selected?.id||""} onChange={e=>setSelected(students.find(s=>String(s.id)===e.target.value)||null)} style={{width:"100%",marginTop:12,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white}}>
          <option value="">เลือกนักเรียน</option>
          {students.map(s=><option key={s.id} value={s.id}>{unreadByStudent[s.id]?.count?`🔴 ${unreadByStudent[s.id].count} ใหม่ - `:""}{studentLabel(s)}</option>)}
        </select>}
        {!isStaff&&selected&&<div style={{marginTop:12,background:C.g50,borderRadius:10,padding:"10px 12px",fontSize:13,fontWeight:800,color:C.navy}}>👧 {studentLabel(selected)}</div>}
      </div>
      {selected?<div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{minHeight:220,maxHeight:430,overflowY:"auto",paddingRight:2}}>
          {messages.length===0?<Empty icon="💬" msg="ยังไม่มีข้อความ เริ่มสนทนาได้เลย"/>:messages.map(m=>{
            const mine=m.sender_id===profile.id;
            return <div key={m.id} style={{display:"flex",justifyContent:mine?"flex-end":"flex-start",margin:"8px 0"}}>
              <div style={{maxWidth:"82%",background:mine?C.navy:C.g100,color:mine?C.white:C.g900,borderRadius:mine?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 12px"}}>
                <div style={{fontSize:14,lineHeight:1.55,whiteSpace:"pre-line",wordBreak:"break-word"}}>{m.body}</div>
                <div style={{fontSize:10,opacity:0.65,marginTop:4,textAlign:mine?"right":"left"}}>{formatThaiDateTime(m.created_at)}</div>
              </div>
            </div>;
          })}
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="พิมพ์ข้อความ..." style={{flex:1,minHeight:44,maxHeight:120,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,resize:"vertical",outline:"none",fontFamily:"inherit"}} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button onClick={send} disabled={sending||!body.trim()} style={{alignSelf:"stretch",border:"none",background:sending||!body.trim()?C.g400:C.navy,color:C.white,borderRadius:10,padding:"0 14px",fontWeight:800,cursor:"pointer"}}>{sending?"...":"ส่ง"}</button>
        </div>
      </div>:<div style={{background:C.white,borderRadius:16}}><Empty icon="👧" msg="เลือกนักเรียนเพื่อดูข้อความ"/></div>}
    </div>
  );
}

// ======= ADMIN REPORTS =======
function AdminReports({token}){
  const [data,setData]=useState({classes:[],students:[],parents:[],ann:[],talk:[],leave:[]});
  const [classId,setClassId]=useState("all");
  const [detail,setDetail]=useState("students");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const [classes,students,parents,ann,talk,leave]=await Promise.all([
        sbFetch("classes?select=id,name&order=id.asc",{token}).catch(()=>[]),
        sbFetch("students?select=id,full_name,student_no,class_id,classes(name)&order=class_id.asc,student_no.asc",{token}).catch(()=>[]),
        sbFetch("rpc/admin_parent_link_report",{method:"POST",token,body:"{}"}).catch(()=>sbFetch("parent_student?select=student_id,parent_id",{token}).catch(()=>[])),
        sbFetch("announcements?select=id,title,class_id,pinned,created_at&order=created_at.desc&limit=200",{token}).catch(()=>[]),
        sbFetch("parent_teacher_messages?select=id,student_id,parent_id,teacher_id,sender_id,body,created_at,parent_read_at,teacher_read_at&order=created_at.desc&limit=200",{token}).catch(()=>[]),
        sbFetch("leave_requests?select=id,status,student_id,created_at,leave_date,students(class_id)&order=created_at.desc&limit=200",{token}).catch(()=>[])
      ]);
      setData({classes:classes||[],students:students||[],parents:parents||[],ann:ann||[],talk:talk||[],leave:leave||[]});
      setLoading(false);
    };
    load();
  },[token]);
  if(loading)return <Spin/>;
  const students=classId==="all"?data.students:data.students.filter(s=>String(s.class_id)===classId);
  const studentIds=new Set(students.map(s=>s.id));
  const parentLinks=data.parents.filter(p=>studentIds.has(p.student_id));
  const linkedIds=new Set(parentLinks.map(p=>p.student_id));
  const noParent=students.filter(s=>!linkedIds.has(s.id));
  const ann=data.ann.filter(a=>classId==="all"||!a.class_id||String(a.class_id)===classId);
  const talk=data.talk.filter(m=>studentIds.has(m.student_id));
  const unreadTalk=talk.filter(m=>m.parent_id&&!m.teacher_read_at);
  const talkStudentCount=new Set(talk.map(m=>m.student_id)).size;
  const leave=data.leave.filter(x=>studentIds.has(x.student_id));
  const pendingLeave=leave.filter(x=>x.status==="pending");
  const studentMap=Object.fromEntries(data.students.map(s=>[s.id,s]));
  const classNameMap=Object.fromEntries(data.classes.map(c=>[c.id,c.name]));
  const classSummary=data.classes.map(c=>{
    const list=data.students.filter(s=>String(s.class_id)===String(c.id));
    const ids=new Set(list.map(s=>s.id));
    return {
      id:c.id,
      name:c.name,
      students:list.length,
      linked:data.parents.filter(p=>ids.has(p.student_id)).length,
      messages:data.talk.filter(m=>ids.has(m.student_id)).length
    };
  }).sort((a,b)=>classSortValue(a.name)-classSortValue(b.name)||String(a.name).localeCompare(String(b.name),"th"));
  const card=(key,label,value,color=C.navy,sub="")=><button onClick={()=>setDetail(key)} style={{textAlign:"left",border:detail===key?`2px solid ${C.navy}`:"2px solid transparent",flex:1,minWidth:92,background:C.white,borderRadius:14,padding:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",cursor:"pointer",fontFamily:"inherit"}}>
    <div style={{fontSize:22,fontWeight:900,color}}>{value}</div>
    <div style={{fontSize:12,fontWeight:800,color:C.navy,marginTop:2,display:"flex",justifyContent:"space-between",gap:6}}><span>{label}</span><span style={{color:C.g400}}>›</span></div>
    {sub&&<div style={{fontSize:11,color:C.g400,marginTop:2}}>{sub}</div>}
  </button>;
  const detailTitle={students:"รายชื่อนักเรียน",parents:"รายละเอียดผู้ปกครอง",ann:"รายละเอียดประกาศ",talk:"รายละเอียดการพูดคุย",leave:"รายละเอียดใบลา",classes:"รายละเอียดห้องเรียน"}[detail]||"รายละเอียด";
  const detailEmpty={students:"ไม่พบนักเรียน",parents:"ไม่พบข้อมูลผู้ปกครอง",ann:"ยังไม่มีประกาศ",talk:"ยังไม่มีข้อความ",leave:"ยังไม่มีใบลา",classes:"ไม่พบห้องเรียน"}[detail]||"ไม่พบข้อมูล";
  const detailRows=()=>{
    if(detail==="students")return students.map(s=>({id:s.id,title:s.full_name,meta:`${s.classes?.name||"-"} · เลขที่ ${s.student_no||"-"}`,status:linkedIds.has(s.id)?"มีผู้ปกครอง":"ยังไม่มี",color:linkedIds.has(s.id)?C.green:C.red}));
    if(detail==="parents")return students.map(s=>({id:s.id,title:s.full_name,meta:`${s.classes?.name||"-"} · เลขที่ ${s.student_no||"-"}`,status:linkedIds.has(s.id)?"ผูกแล้ว":"ยังไม่ผูก",color:linkedIds.has(s.id)?C.green:C.red}));
    if(detail==="ann")return ann.map(a=>({id:a.id,title:a.title||"-",meta:`${a.class_id?classNameMap[a.class_id]||"เฉพาะห้อง":"ทั้งโรงเรียน"} · ${formatThaiDate(a.created_at)}`,status:a.pinned?"ปักหมุด":"ประกาศ",color:a.pinned?C.red:C.gold}));
    if(detail==="talk")return talk.map(m=>{const s=studentMap[m.student_id]||{};return {id:m.id,title:s.full_name||"-",meta:`${s.classes?.name||"-"} · เลขที่ ${s.student_no||"-"} · ${formatThaiDateTime(m.created_at)}`,body:m.body,status:m.parent_id&&!m.teacher_read_at?"ใหม่":"อ่านแล้ว",color:m.parent_id&&!m.teacher_read_at?C.red:C.green};});
    if(detail==="leave")return leave.map(l=>{const s=studentMap[l.student_id]||{};return {id:l.id,title:s.full_name||"-",meta:`${s.classes?.name||"-"} · เลขที่ ${s.student_no||"-"} · วันที่ลา ${l.leave_date||"-"}`,status:l.status==="pending"?"รอตรวจ":l.status||"-",color:l.status==="pending"?C.yellow:C.green};});
    if(detail==="classes")return classSummary.filter(c=>c.students>0&&(classId==="all"||String(c.id)===classId)).map(c=>({id:c.id,title:c.name,meta:`นักเรียน ${c.students} คน · ผู้ปกครอง ${c.linked} · คุย ${c.messages}`,status:"ดูห้อง",color:C.navy}));
    return [];
  };
  const exportCsv=()=>{
    const rows=[["ห้อง","นักเรียน","เลขที่","มีผู้ปกครอง"]];
    students.forEach(s=>rows.push([s.classes?.name||"-",s.full_name||"-",s.student_no||"-",linkedIds.has(s.id)?"มี":"ยังไม่มี"]));
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="student-parent-report.csv";a.click();
    URL.revokeObjectURL(url);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"center"}}>
          <div><div style={{fontSize:17,fontWeight:900,color:C.navy}}>📈 รายงานผู้ดูแลระบบ</div><div style={{fontSize:12,color:C.g400,marginTop:2}}>สรุปข้อมูลโรงเรียน ผู้ปกครอง ประกาศ และการพูดคุย</div></div>
          <button onClick={exportCsv} style={{border:"none",background:C.navy,color:C.white,borderRadius:10,padding:"9px 10px",fontSize:12,fontWeight:900,cursor:"pointer"}}>ส่งออก CSV</button>
        </div>
        <select value={classId} onChange={e=>setClassId(e.target.value)} style={{width:"100%",marginTop:12,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,background:C.white,fontSize:14,fontWeight:800,color:C.navy}}>
          <option value="all">ทุกห้องเรียน</option>
          {data.classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {card("students","นักเรียน",students.length,C.navy)}
        {card("parents","ผูกผู้ปกครอง",linkedIds.size,C.green,`ยังไม่มี ${noParent.length} คน`)}
        {card("ann","ประกาศ",ann.length,C.gold)}
        {card("talk","การพูดคุย",talk.length,C.red,`นักเรียน ${talkStudentCount} คน · ใหม่ ${unreadTalk.length}`)}
        {card("leave","ใบลา",leave.length,C.yellow,`รอตรวจ ${pendingLeave.length}`)}
        {card("classes","ห้องเรียน",classId==="all"?data.classes.length:1,C.green)}
      </div>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:14,fontWeight:900,color:C.navy}}>{detailTitle}</div>
          <div style={{fontSize:11,color:C.g400,fontWeight:800}}>{detailRows().length} รายการ</div>
        </div>
        {detailRows().length===0?<Empty icon="🔎" msg={detailEmpty}/>:detailRows().slice(0,60).map((x,i)=><div key={`${detail}-${x.id}-${i}`} style={{padding:"9px 0",borderBottom:i<Math.min(detailRows().length,60)-1?`1px solid ${C.g100}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:13,fontWeight:900,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{x.title}</div>
              <div style={{fontSize:11,color:C.g400,marginTop:1}}>{x.meta}</div>
              {x.body&&<div style={{fontSize:12,color:C.g700,marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{x.body}</div>}
            </div>
            <span style={{fontSize:11,fontWeight:900,color:x.color,background:x.color===C.red?C.redL:x.color===C.green?C.greenL:x.color===C.yellow?C.yellowL:C.g100,borderRadius:99,padding:"4px 8px",whiteSpace:"nowrap"}}>{x.status}</span>
          </div>
        </div>)}
        {detailRows().length>60&&<div style={{fontSize:11,color:C.g400,textAlign:"center",marginTop:8}}>แสดง 60 รายการแรก เลือกห้องเพื่อดูให้แคบลง</div>}
      </div>
      {noParent.length>0&&<div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.red,marginBottom:8}}>นักเรียนที่ยังไม่ผูกผู้ปกครอง ({noParent.length})</div>
        {noParent.slice(0,20).map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.g100}`}}>
          <div><div style={{fontSize:13,fontWeight:900,color:C.navy}}>{s.full_name}</div><div style={{fontSize:11,color:C.g400}}>{s.classes?.name||"-"} · เลขที่ {s.student_no||"-"}</div></div>
          <span style={{fontSize:11,color:C.red,fontWeight:900}}>ยังไม่มี</span>
        </div>)}
      </div>}
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>สรุปตามห้องเรียน</div>
        {classSummary.filter(c=>c.students>0&&(classId==="all"||String(c.id)===classId)).map(c=><div key={c.id} style={{display:"grid",gridTemplateColumns:"1.2fr 0.7fr 0.8fr 0.8fr",gap:6,padding:"9px 0",borderBottom:`1px solid ${C.g100}`,alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:900,color:C.navy}}>{c.name}</div>
          <div style={{fontSize:12,color:C.g600}}>นร. {c.students}</div>
          <div style={{fontSize:12,color:C.green,fontWeight:800}}>ผปค. {c.linked}</div>
          <div style={{fontSize:12,color:C.navy,fontWeight:800}}>คุย {c.messages}</div>
        </div>)}
      </div>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>ข้อความล่าสุด</div>
        {talk.length===0?<Empty icon="💬" msg="ยังไม่มีข้อความในช่วงล่าสุด"/>:talk.slice(0,10).map(m=>{const s=studentMap[m.student_id]||{};return <div key={m.id} style={{padding:"9px 0",borderBottom:`1px solid ${C.g100}`}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8}}><div style={{fontSize:13,fontWeight:900,color:C.navy}}>{s.full_name||"-"}</div><div style={{fontSize:11,color:C.g400,whiteSpace:"nowrap"}}>{formatThaiDateTime(m.created_at)}</div></div>
          <div style={{fontSize:11,color:C.g400,marginTop:1}}>{s.classes?.name||"-"} · เลขที่ {s.student_no||"-"}</div>
          <div style={{fontSize:12,color:C.g700,marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.body}</div>
        </div>})}
      </div>
    </div>
  );
}

// ======= HOMEROOM PARENT REPORT =======
function HomeroomParentReport({token,profile,role}){
  const [classes,setClasses]=useState([]);
  const [students,setStudents]=useState([]);
  const [links,setLinks]=useState([]);
  const [classId,setClassId]=useState("all");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      let cls=[];
      if(role==="admin"){
        cls=await sbFetch("classes?select=id,name&order=id.asc",{token}).catch(()=>[]);
      }else{
        const rows=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id`,{token}).catch(()=>[]);
        const ids=(rows||[]).map(x=>x.class_id).filter(Boolean);
        cls=ids.length?await sbFetch(`classes?id=in.(${ids.join(",")})&select=id,name&order=id.asc`,{token}).catch(()=>[]):[];
      }
      cls=[...(cls||[])].sort((a,b)=>classSortValue(a.name)-classSortValue(b.name)||String(a.name).localeCompare(String(b.name),"th"));
      const ids=cls.map(c=>c.id).filter(Boolean);
      const stu=ids.length?await sbFetch(`students?class_id=in.(${ids.join(",")})&select=id,full_name,student_no,class_id,classes(name)&order=class_id.asc,student_no.asc`,{token}).catch(()=>[]):[];
      const parentLinks=await sbFetch("rpc/teacher_parent_link_report",{method:"POST",token,body:"{}"}).catch(()=>[]);
      setClasses(cls);
      setStudents([...(stu||[])].sort((a,b)=>classSortValue(a.classes?.name)-classSortValue(b.classes?.name)||Number(a.student_no||0)-Number(b.student_no||0)));
      setLinks(parentLinks||[]);
      setLoading(false);
    };
    load();
  },[token,profile.id,role]);
  if(loading)return <Spin/>;
  const visible=classId==="all"?students:students.filter(s=>String(s.class_id)===classId);
  const linkMap={};
  links.forEach(x=>{if(!linkMap[x.student_id])linkMap[x.student_id]=[];linkMap[x.student_id].push(x);});
  const linked=visible.filter(s=>linkMap[s.id]?.length).length;
  const notLinked=visible.length-linked;
  const classSummary=classes.map(c=>{
    const list=students.filter(s=>String(s.class_id)===String(c.id));
    const ok=list.filter(s=>linkMap[s.id]?.length).length;
    return {id:c.id,name:c.name,total:list.length,linked:ok,missing:list.length-ok};
  }).filter(c=>c.total>0);
  const chip=(text,active,onClick)=><button onClick={onClick} style={{border:`1.5px solid ${active?C.navy:C.g200}`,background:active?C.navy:C.g50,color:active?C.white:C.navy,borderRadius:10,padding:"8px 10px",fontSize:12,fontWeight:900,cursor:"pointer"}}>{text}</button>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:17,fontWeight:900,color:C.navy}}>👪 รายงานผู้ปกครองประจำห้อง</div>
        <div style={{fontSize:12,color:C.g400,marginTop:2}}>ดูว่านักเรียนคนไหนผูกบัญชีผู้ปกครองแล้วหรือยังไม่ผูก</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:12}}>
          <div style={{background:C.g50,borderRadius:12,padding:10}}><div style={{fontSize:20,fontWeight:900,color:C.navy}}>{visible.length}</div><div style={{fontSize:11,color:C.g600,fontWeight:800}}>นักเรียน</div></div>
          <div style={{background:C.greenL,borderRadius:12,padding:10}}><div style={{fontSize:20,fontWeight:900,color:C.green}}>{linked}</div><div style={{fontSize:11,color:C.g600,fontWeight:800}}>ผูกแล้ว</div></div>
          <div style={{background:C.redL,borderRadius:12,padding:10}}><div style={{fontSize:20,fontWeight:900,color:C.red}}>{notLinked}</div><div style={{fontSize:11,color:C.g600,fontWeight:800}}>ยังไม่ผูก</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginTop:12}}>
          {chip("ทุกห้อง",classId==="all",()=>setClassId("all"))}
          {classes.map(c=><React.Fragment key={c.id}>{chip(c.name,String(classId)===String(c.id),()=>setClassId(String(c.id)))}</React.Fragment>)}
        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>สรุปตามห้อง</div>
        {classSummary.filter(c=>classId==="all"||String(c.id)===classId).map(c=><div key={c.id} style={{display:"grid",gridTemplateColumns:"1.2fr 0.8fr 0.8fr 0.8fr",gap:6,padding:"9px 0",borderBottom:`1px solid ${C.g100}`,alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:900,color:C.navy}}>{c.name}</div>
          <div style={{fontSize:12,color:C.g600}}>นร. {c.total}</div>
          <div style={{fontSize:12,color:C.green,fontWeight:900}}>ผูก {c.linked}</div>
          <div style={{fontSize:12,color:C.red,fontWeight:900}}>ยัง {c.missing}</div>
        </div>)}
      </div>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>รายชื่อนักเรียน</div>
        {visible.length===0?<Empty icon="👪" msg="ไม่พบนักเรียนในห้องที่เลือก"/>:visible.map(s=>{
          const parents=linkMap[s.id]||[];
          const ok=parents.length>0;
          return <div key={s.id} style={{display:"flex",justifyContent:"space-between",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.g100}`}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:13,fontWeight:900,color:C.navy}}>{s.full_name}</div>
              <div style={{fontSize:11,color:C.g400}}>{s.classes?.name||"-"} · เลขที่ {s.student_no||"-"}</div>
              {ok&&<div style={{fontSize:11,color:C.green,marginTop:3,fontWeight:800}}>ผู้ปกครอง: {parents.map(p=>p.parent_name||"ไม่ระบุชื่อ").join(", ")}</div>}
            </div>
            <span style={{alignSelf:"center",background:ok?C.greenL:C.redL,color:ok?C.green:C.red,borderRadius:99,padding:"4px 9px",fontSize:11,fontWeight:900,whiteSpace:"nowrap"}}>{ok?"ผูกแล้ว":"ยังไม่ผูก"}</span>
          </div>;
        })}
      </div>
    </div>
  );
}

function ParentUsageReport({token}){
  const [rows,setRows]=useState([]);
  const [classId,setClassId]=useState("all");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const data=await sbFetch("rpc/teacher_parent_usage_report",{method:"POST",token,body:"{}"}).catch(()=>[]);
      setRows(data||[]);
      setLoading(false);
    };
    load();
  },[token]);
  if(loading)return <Spin/>;
  const classes=Array.from(new Map(rows.map(r=>[r.class_id,{id:r.class_id,name:r.class_name}]).filter(x=>x[0])).values())
    .sort((a,b)=>classSortValue(a.name)-classSortValue(b.name)||String(a.name).localeCompare(String(b.name),"th"));
  const visible=classId==="all"?rows:rows.filter(r=>String(r.class_id)===classId);
  const studentIds=new Set(visible.map(r=>r.student_id));
  const linked=visible.filter(r=>r.parent_id).length;
  const signedIn=visible.filter(r=>r.parent_id&&r.last_sign_in_at).length;
  const never=visible.filter(r=>r.parent_id&&!r.last_sign_in_at).length;
  const card=(label,value,color=C.navy)=><div style={{background:C.white,borderRadius:14,padding:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
    <div style={{fontSize:22,fontWeight:900,color}}>{value}</div>
    <div style={{fontSize:12,fontWeight:800,color:C.navy,marginTop:2}}>{label}</div>
  </div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:17,fontWeight:900,color:C.navy}}>📱 รายงานการเข้าใช้งานผู้ปกครอง</div>
        <div style={{fontSize:12,color:C.g400,marginTop:2}}>ดูว่าผู้ปกครองผูกบัญชีแล้วหรือยัง และเข้าใช้งานล่าสุดเมื่อไหร่</div>
        <select value={classId} onChange={e=>setClassId(e.target.value)} style={{width:"100%",marginTop:12,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,background:C.white,fontSize:14,fontWeight:800,color:C.navy}}>
          <option value="all">ทุกห้องเรียน</option>
          {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {card("นักเรียน",studentIds.size,C.navy)}
        {card("บัญชีผู้ปกครอง",linked,C.green)}
        {card("เคยเข้าใช้",signedIn,C.gold)}
        {card("ยังไม่เคยเข้า",never,C.red)}
      </div>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>รายชื่อผู้ปกครอง</div>
        {visible.length===0?<Empty icon="📱" msg="ไม่พบข้อมูลในห้องที่เลือก"/>:visible.map((r,i)=>{
          const hasParent=!!r.parent_id;
          const hasLogin=!!r.last_sign_in_at;
          return <div key={`${r.student_id}-${r.parent_id||"none"}-${i}`} style={{padding:"10px 0",borderBottom:`1px solid ${C.g100}`}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:13,fontWeight:900,color:C.navy}}>{r.student_name||"-"}</div>
                <div style={{fontSize:11,color:C.g400}}>{r.class_name||"-"} · เลขที่ {r.student_no||"-"}</div>
                <div style={{fontSize:12,color:hasParent?C.g700:C.red,marginTop:5,fontWeight:800}}>
                  {hasParent?(r.parent_name||r.parent_email||"ไม่ระบุชื่อผู้ปกครอง"):"ยังไม่ผูกผู้ปกครอง"}
                </div>
                {hasParent&&<div style={{fontSize:11,color:C.g400,marginTop:2}}>{r.parent_email||"-"}</div>}
              </div>
              <span style={{background:!hasParent?C.redL:hasLogin?C.greenL:C.yellowL,color:!hasParent?C.red:hasLogin?C.green:C.yellow,borderRadius:99,padding:"4px 8px",fontSize:11,fontWeight:900,whiteSpace:"nowrap"}}>
                {!hasParent?"ยังไม่ผูก":hasLogin?"เข้าแล้ว":"ยังไม่เข้า"}
              </span>
            </div>
            {hasParent&&<div style={{fontSize:11,color:C.g600,marginTop:6}}>
              ยืนยันบัญชี: {r.confirmed_at?formatThaiDateTime(r.confirmed_at):"ยังไม่ยืนยัน"} · เข้าใช้ล่าสุด: {r.last_sign_in_at?formatThaiDateTime(r.last_sign_in_at):"ยังไม่เคยเข้า"}
            </div>}
          </div>;
        })}
      </div>
    </div>
  );
}

// ======= ADMIN STUDENT MANAGEMENT =======
function AdminStudentManagement({token}){
  const [classes,setClasses]=useState([]);
  const [students,setStudents]=useState([]);
  const [fromClass,setFromClass]=useState("");
  const [toClass,setToClass]=useState("");
  const [selected,setSelected]=useState([]);
  const [query,setQuery]=useState("");
  const [manageClass,setManageClass]=useState("");
  const [editing,setEditing]=useState(null);
  const [photoDraft,setPhotoDraft]=useState(null);
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState("");
  const load=useCallback(async()=>{
    setLoading(true);
    const [cls,stu]=await Promise.all([
      sbFetch("classes?select=id,name&order=id.asc",{token}).catch(()=>[]),
      sbFetch("students?select=id,full_name,student_no,class_id,student_id_no,photo_path,classes(name)&order=class_id.asc,student_no.asc",{token}).catch(()=>[])
    ]);
    const sortedClasses=[...(cls||[])].sort((a,b)=>classSortValue(a.name)-classSortValue(b.name)||String(a.name).localeCompare(String(b.name),"th"));
    const sortedStudents=[...(stu||[])].sort((a,b)=>classSortValue(a.classes?.name)-classSortValue(b.classes?.name)||Number(a.student_no||0)-Number(b.student_no||0)||String(a.full_name).localeCompare(String(b.full_name),"th"));
    setClasses(sortedClasses);setStudents(sortedStudents);setLoading(false);
  },[token]);
  useEffect(()=>{load();},[load]);
  if(loading)return <Spin/>;
  const fromStudents=students.filter(s=>String(s.class_id)===String(fromClass));
  const deleteList=students.filter(s=>{
    const q=query.trim().toLowerCase();
    if(manageClass&&String(s.class_id)!==String(manageClass))return false;
    if(!q)return true;
    return String(s.full_name||"").toLowerCase().includes(q)||String(s.classes?.name||"").toLowerCase().includes(q)||String(s.student_no||"").includes(q);
  }).slice(0,80);
  const toggle=id=>setSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  async function moveStudents(){
    if(selected.length===0||!toClass)return alert("กรุณาเลือกนักเรียนและห้องปลายทาง");
    const target=classes.find(c=>String(c.id)===String(toClass));
    if(!confirm(`ยืนยันย้ายนักเรียน ${selected.length} คน ไป ${target?.name||"ห้องปลายทาง"} ?`))return;
    setBusy("move");
    try{
      await sbFetch("rpc/admin_move_students",{method:"POST",token,body:JSON.stringify({p_student_ids:selected.map(Number),p_class_id:Number(toClass)})});
      setSelected([]);await load();alert("ย้ายชั้นเรียบร้อย");
    }catch(e){alert(e.message);}
    finally{setBusy("");}
  }
  async function deleteStudent(s){
    const text=prompt(`ต้องการลบนักเรียนคนนี้ใช่ไหม?\n\n${s.full_name}\n${s.classes?.name||"-"} เลขที่ ${s.student_no||"-"}\n\nพิมพ์คำว่า ลบ เพื่อยืนยัน`);
    if(text!=="ลบ")return;
    setBusy(`delete-${s.id}`);
    try{
      await sbFetch("rpc/admin_delete_student",{method:"POST",token,body:JSON.stringify({p_student_id:Number(s.id)})});
      await load();alert("ลบนักเรียนเรียบร้อย");
    }catch(e){alert(e.message);}
    finally{setBusy("");}
  }
  function startEditStudent(s){
    setEditing({
      id:s.id,
      full_name:s.full_name||"",
      student_no:s.student_no||"",
      class_id:s.class_id?String(s.class_id):"",
      student_id_no:s.student_id_no||""
    });
  }
  async function saveStudentEdit(){
    if(!editing?.full_name.trim())return alert("กรุณากรอกชื่อ-สกุล");
    if(!editing.class_id)return alert("กรุณาเลือกห้องเรียน");
    setBusy(`edit-${editing.id}`);
    try{
      await sbFetch("rpc/admin_update_student",{method:"POST",token,body:JSON.stringify({
        p_student_id:Number(editing.id),
        p_full_name:editing.full_name.trim(),
        p_student_no:editing.student_no===""?null:Number(editing.student_no),
        p_class_id:Number(editing.class_id),
        p_student_id_no:String(editing.student_id_no||"").trim()
      })});
      setEditing(null);await load();alert("แก้ไขข้อมูลนักเรียนเรียบร้อย");
    }catch(e){alert(e.message);}
    finally{setBusy("");}
  }
  async function saveStudentPhoto(s,file){
    if(!file)return;
    if(!file.type.startsWith("image/"))return alert("กรุณาเลือกไฟล์รูปภาพ");
    if(photoDraft?.url)URL.revokeObjectURL(photoDraft.url);
    setPhotoDraft({student:s,file,url:URL.createObjectURL(file),zoom:1,x:0,y:0});
  }
  function closePhotoDraft(){
    if(photoDraft?.url)URL.revokeObjectURL(photoDraft.url);
    setPhotoDraft(null);
  }
  async function confirmStudentPhoto(){
    if(!photoDraft)return;
    const s=photoDraft.student;
    setBusy(`photo-${s.id}`);
    try{
      const croppedFile=await cropStudentPhotoFile(photoDraft.file,photoDraft);
      const readyFile=await compressImageFile(croppedFile);
      const ext=(readyFile.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,5)||"jpg";
      const path=`students/${s.id}-${Date.now()}.${ext}`;
      await uploadStudentPhoto(readyFile,path,token);
      await sbFetch("rpc/admin_set_student_photo",{method:"POST",token,body:JSON.stringify({p_student_id:Number(s.id),p_photo_path:path})});
      closePhotoDraft();await load();alert("อัปโหลดรูปนักเรียนเรียบร้อย");
    }catch(e){alert(e.message);}
    finally{setBusy("");}
  }
  const box={background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"};
  const field={width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,background:C.white,fontSize:14,color:C.navy,fontWeight:800,boxSizing:"border-box"};
  const classButtons=(value,onPick,exclude="")=><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginTop:8}}>
    {classes.filter(c=>String(c.id)!==String(exclude)).map(c=><button key={c.id} type="button" onClick={()=>onPick(String(c.id))} style={{border:`1.5px solid ${String(value)===String(c.id)?C.navy:C.g200}`,background:String(value)===String(c.id)?C.navy:C.g50,color:String(value)===String(c.id)?C.white:C.navy,borderRadius:10,padding:"8px 4px",fontSize:12,fontWeight:900,cursor:"pointer"}}>{c.name}</button>)}
  </div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {photoDraft&&<div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(15,23,42,0.55)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:C.white,borderRadius:18,padding:16,width:"100%",maxWidth:360,boxShadow:"0 20px 50px rgba(0,0,0,0.25)"}}>
          <div style={{fontSize:16,fontWeight:900,color:C.navy}}>ปรับรูปนักเรียน</div>
          <div style={{fontSize:12,color:C.g400,marginTop:2,marginBottom:12}}>เริ่มจากเห็นรูปครบ กดขยายถ้าต้องการให้หน้าใหญ่ขึ้น</div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <div style={{width:220,height:220,borderRadius:999,overflow:"hidden",border:`4px solid ${C.gold}`,background:C.g100,position:"relative"}}>
              <img src={photoDraft.url} alt="" style={{width:"100%",height:"100%",objectFit:"contain",transform:`translate(${photoDraft.x*110}px, ${photoDraft.y*110}px) scale(${photoDraft.zoom})`,transformOrigin:"center",transition:"transform 0.12s ease"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
            <button onClick={()=>setPhotoDraft(p=>({...p,y:Math.max(-1,p.y-0.08)}))} style={{gridColumn:"2",border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ขึ้น</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,x:Math.max(-1,p.x-0.08)}))} style={{border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ซ้าย</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,x:0,y:0,zoom:1}))} style={{border:"none",background:C.goldP,color:C.yellow,borderRadius:10,padding:10,fontWeight:900}}>กลาง</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,x:Math.min(1,p.x+0.08)}))} style={{border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ขวา</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,y:Math.min(1,p.y+0.08)}))} style={{gridColumn:"2",border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ลง</button>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setPhotoDraft(p=>({...p,zoom:Math.max(1,p.zoom-0.08)}))} style={{flex:1,border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ย่อ</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,x:0,y:0,zoom:1}))} style={{flex:1,border:"none",background:C.goldP,color:C.yellow,borderRadius:10,padding:10,fontWeight:900}}>พอดี</button>
            <button onClick={()=>setPhotoDraft(p=>({...p,zoom:Math.min(2.4,p.zoom+0.08)}))} style={{flex:1,border:"none",background:C.g100,color:C.navy,borderRadius:10,padding:10,fontWeight:900}}>ขยาย</button>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={closePhotoDraft} disabled={busy===`photo-${photoDraft.student.id}`} style={{flex:1,border:"none",background:C.g200,color:C.navy,borderRadius:10,padding:11,fontWeight:900}}>ยกเลิก</button>
            <button onClick={confirmStudentPhoto} disabled={busy===`photo-${photoDraft.student.id}`} style={{flex:2,border:"none",background:busy===`photo-${photoDraft.student.id}`?C.g400:C.navy,color:C.white,borderRadius:10,padding:11,fontWeight:900}}>{busy===`photo-${photoDraft.student.id}`?"กำลังบันทึก...":"บันทึกรูป"}</button>
          </div>
        </div>
      </div>}
      <div style={box}>
        <div style={{fontSize:17,fontWeight:900,color:C.navy}}>🎓 จัดการนักเรียน</div>
        <div style={{fontSize:12,color:C.g400,marginTop:2}}>สำหรับย้ายชั้นปีการศึกษาใหม่ และจัดการรายชื่อนักเรียนในระบบ</div>
      </div>
      <div style={box}>
        <div style={{fontSize:15,fontWeight:900,color:C.navy,marginBottom:10}}>เลื่อนชั้น / ย้ายห้อง</div>
        <select value={fromClass} onChange={e=>{setFromClass(e.target.value);setSelected([]);}} style={field}>
          <option value="">เลือกห้องต้นทาง</option>
          {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        {classButtons(fromClass,id=>{setFromClass(id);setSelected([]);})}
        <select value={toClass} onChange={e=>setToClass(e.target.value)} style={{...field,marginTop:8}}>

          {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        {classButtons(toClass,setToClass,fromClass)}
        {fromClass&&<div style={{marginTop:10,border:`1px solid ${C.g100}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:10,background:C.g50}}>
            <span style={{fontSize:12,fontWeight:900,color:C.navy}}>เลือกแล้ว {selected.length}/{fromStudents.length} คน</span>
            <button onClick={()=>setSelected(selected.length===fromStudents.length?[]:fromStudents.map(s=>s.id))} style={{border:"none",background:"transparent",color:C.navy,fontSize:12,fontWeight:900,cursor:"pointer"}}>{selected.length===fromStudents.length?"ยกเลิกทั้งหมด":"เลือกทั้งห้อง"}</button>
          </div>
          <div style={{maxHeight:260,overflowY:"auto"}}>
            {fromStudents.map(s=><label key={s.id} style={{display:"flex",gap:9,alignItems:"center",padding:"9px 10px",borderTop:`1px solid ${C.g100}`,cursor:"pointer"}}>
              <input type="checkbox" checked={selected.includes(s.id)} onChange={()=>toggle(s.id)} style={{width:18,height:18,accentColor:C.navy}}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:900,color:C.navy}}>{s.full_name}</div><div style={{fontSize:11,color:C.g400}}>เลขที่ {s.student_no||"-"}</div></div>
            </label>)}
          </div>
        </div>}
        <button onClick={moveStudents} disabled={busy==="move"||selected.length===0||!toClass} style={{width:"100%",marginTop:12,border:"none",background:busy==="move"||selected.length===0||!toClass?C.g400:C.navy,color:C.white,borderRadius:10,padding:12,fontWeight:900,cursor:"pointer"}}>{busy==="move"?"กำลังย้าย...":"ย้ายชั้น/ย้ายห้อง"}</button>
      </div>
      <div style={box}>
        <div style={{fontSize:15,fontWeight:900,color:C.red,marginBottom:4}}>ลบนักเรียนออกจากระบบ</div>

        <select value={manageClass} onChange={e=>setManageClass(e.target.value)} style={{...field,marginBottom:8}}>
          <option value="">ทุกห้อง</option>
          {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="ค้นหาชื่อ ห้อง หรือเลขที่" style={{...field,fontWeight:700,color:C.g700}}/>
        {editing&&<div style={{marginTop:10,background:C.g50,border:`1px solid ${C.g200}`,borderRadius:12,padding:12}}>
          <div style={{fontSize:14,fontWeight:900,color:C.navy,marginBottom:8}}>แก้ไขข้อมูลนักเรียน</div>
          <input value={editing.full_name} onChange={e=>setEditing(p=>({...p,full_name:e.target.value}))} placeholder="ชื่อ-สกุล" style={{...field,fontWeight:700,color:C.g700,marginBottom:8}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <input value={editing.student_no} onChange={e=>setEditing(p=>({...p,student_no:e.target.value.replace(/[^\d]/g,"")}))} placeholder="เลขที่" inputMode="numeric" style={{...field,fontWeight:700,color:C.g700}}/>
            <input value={editing.student_id_no} onChange={e=>setEditing(p=>({...p,student_id_no:e.target.value.replace(/\D/g,"").slice(0,13)}))} placeholder="เลขประจำตัว 13 หลัก" inputMode="numeric" maxLength="13" style={{...field,fontWeight:700,color:C.g700}}/>
          </div>
          <select value={editing.class_id} onChange={e=>setEditing(p=>({...p,class_id:e.target.value}))} style={{...field,marginTop:8}}>
            <option value="">เลือกห้องเรียน</option>
            {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {classButtons(editing.class_id,id=>setEditing(p=>({...p,class_id:id})))}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={saveStudentEdit} disabled={busy===`edit-${editing.id}`} style={{flex:1,border:"none",background:C.navy,color:C.white,borderRadius:10,padding:10,fontWeight:900,cursor:"pointer"}}>{busy===`edit-${editing.id}`?"กำลังบันทึก...":"บันทึกข้อมูล"}</button>
            <button onClick={()=>setEditing(null)} style={{border:"none",background:C.g200,color:C.navy,borderRadius:10,padding:"10px 14px",fontWeight:900,cursor:"pointer"}}>ยกเลิก</button>
          </div>
        </div>}
        <div style={{marginTop:10,maxHeight:360,overflowY:"auto"}}>
          {deleteList.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.g100}`}}>
            <StudentAvatar path={s.photo_path} token={token} size={38}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:900,color:C.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.full_name}</div><div style={{fontSize:11,color:C.g400}}>{s.classes?.name||"-"} · เลขที่ {s.student_no||"-"}</div></div>
            <div style={{display:"flex",gap:6}}>
              <label style={{border:"none",background:C.goldP,color:C.yellow,borderRadius:9,padding:"7px 9px",fontSize:12,fontWeight:900,cursor:"pointer",whiteSpace:"nowrap"}}>
                {busy===`photo-${s.id}`?"...":"รูป"}
                <input type="file" accept="image/*" disabled={busy===`photo-${s.id}`} onChange={e=>saveStudentPhoto(s,e.target.files?.[0])} style={{display:"none"}}/>
              </label>
              <button onClick={()=>startEditStudent(s)} style={{border:"none",background:C.g100,color:C.navy,borderRadius:9,padding:"7px 9px",fontSize:12,fontWeight:900,cursor:"pointer"}}>แก้ไข</button>
              <button onClick={()=>deleteStudent(s)} disabled={busy===`delete-${s.id}`} style={{border:"none",background:C.redL,color:C.red,borderRadius:9,padding:"7px 10px",fontSize:12,fontWeight:900,cursor:"pointer"}}>{busy===`delete-${s.id}`?"...":"ลบ"}</button>
            </div>
          </div>)}
        </div>
      </div>
    </div>
  );
}

      if(isStaff){
        const [allPay,t,c,allInv]=await Promise.all([
          sbFetch("payments?select=*,student_invoices(invoice_no,total_amount,student_id,students(full_name,student_no,classes(name))),receipts(receipt_no,issued_at)&order=created_at.desc&limit=300",{token}),
          sbFetch("fee_terms?is_active=eq.true&select=*&order=academic_year.desc,term_no.desc",{token}),
          sbFetch("classes?select=id,name&order=id.asc",{token}),
          sbFetch("student_invoices?select=*,fee_terms(name,academic_year,term_no),students(full_name,student_no,classes(name))&order=created_at.desc&limit=300",{token})
        ]);
        setPaymentHistory(allPay||[]);
        setPayments((allPay||[]).filter(x=>x.status==="pending").reverse());
        setTerms(t||[]);setClasses(c||[]);
        setStaffInvoices(allInv||[]);
      }else if(isTeacher){
        const links=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id,classes(id,name)`,{token});
        const classIds=(links||[]).map(x=>x.class_id);
        setTeacherClasses((links||[]).map(x=>x.classes).filter(Boolean));
        if(!classIds.length){setInvoices([]);setError("ยังไม่ได้ผูกครูประจำชั้นกับห้องเรียน");return;}
        const students=await sbFetch(`students?class_id=in.(${classIds.join(",")})&select=id&order=student_no.asc`,{token});
        const studentIds=(students||[]).map(x=>x.id);
        if(!studentIds.length){setInvoices([]);return;}
        const inv=await sbFetch(`student_invoices?student_id=in.(${studentIds.join(",")})&select=*,fee_terms(name,academic_year,term_no),students(full_name,student_no,classes(name))&order=created_at.desc`,{token});
        setInvoices(inv||[]);
      }else{
        let s=studentInfo;
        if(!s){
          const found=await sbFetch(`students?profile_id=eq.${profile.id}&select=id,full_name,student_no,classes(name)&limit=1`,{token});
          s=found?.[0]||null;setStudentInfo(s);
        }
        if(!s){setInvoices([]);return;}
        const inv=await sbFetch(`student_invoices?student_id=eq.${s.id}&select=*,fee_terms(name,academic_year,term_no),invoice_items(id,description,amount)&order=created_at.desc`,{token});
        setInvoices(inv||[]);
        const ids=(inv||[]).map(x=>x.id);
        if(ids.length){
          const pay=await sbFetch(`payments?invoice_id=in.(${ids.join(",")})&select=*&order=created_at.desc`,{token});
          setPayments(pay||[]);
          const payIds=(pay||[]).map(x=>x.id);
          if(payIds.length){
            const rec=await sbFetch(`receipts?payment_id=in.(${payIds.join(",")})&select=*`,{token});
            setReceipts(rec||[]);
          }else setReceipts([]);
        }else{setPayments([]);setReceipts([]);}
      }
    }catch(e){setError(e.message||"โหลดข้อมูลค่าเทอมไม่สำเร็จ");}
    finally{setLoading(false);}
  },[token,profile.id,isStaff,isTeacher,studentInfo?.id]);

  useEffect(()=>{

      setSelectedStudentIds([]);
      return;

  async function submitPayment(){
    const invoice=invoices.find(x=>x.id===form.invoiceId);
    if(!invoice||!form.file||Number(form.amount)<=0){setError("กรุณาเลือกใบแจ้งยอด ระบุจำนวนเงิน และแนบสลิป");return;}
    if(!form.file.type.startsWith("image/")){setError("กรุณาแนบสลิปเป็นไฟล์รูปภาพ");return;}
    if(form.file.size>5*1024*1024){setError("ไฟล์สลิปต้องมีขนาดไม่เกิน 5 MB");return;}
    setBusy("submit");setError("");
    try{
      const ext=(form.file.name.split(".").pop()||"jpg").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
      const path=`${profile.id}/${invoice.id}/${Date.now()}.${ext}`;
      await uploadPaymentSlip(form.file,path,token);
      const created=await sbFetch("payments",{method:"POST",token,body:JSON.stringify({
        invoice_id:invoice.id,parent_id:profile.id,amount:Number(form.amount),
        method:"bank_transfer",paid_at:new Date().toISOString(),slip_path:path,status:"pending"
      })});
      const payment=created?.[0];
      if(payment){
        try{
          await notifyTelegramPayment(payment.id,token);
        }catch(e){
          setError(`ส่งสลิปแล้ว แต่แจ้ง Telegram ไม่สำเร็จ: ${e.message}`);
        }
      }
      setForm({invoiceId:"",amount:"",file:null});await load();
    }catch(e){setError(e.message);}
    finally{setBusy("");}
  }

  async function openSlip(path){
    try{const url=await getPaymentSlipUrl(path,token);window.open(url,"_blank");}
    catch(e){setError(e.message);}
  }
  async function review(payment,status){
    const note=status==="rejected"?(prompt("ระบุเหตุผลที่ไม่อนุมัติ")||"หลักฐานไม่ถูกต้อง"):"";
    setBusy(payment.id);setError("");
    try{
      await sbFetch(`payments?id=eq.${payment.id}`,{method:"PATCH",token,body:JSON.stringify({
        status,review_note:note,reviewed_by:profile.id,reviewed_at:new Date().toISOString()
      })});
      await load();
    }catch(e){setError(e.message);}
    finally{setBusy("");}
  }

    }

        p_due_date:createForm.dueDate,
        p_student_ids:selectedStudentIds.map(Number)

      setCreateForm(p=>({...p,description:"ค่าเล่าเรียน",amount:""}));

          </div>
          {invPayments.map(p=>{const receipt=receipts.find(r=>r.payment_id===p.id);return <div key={p.id} style={{marginTop:10,background:C.g50,borderRadius:10,padding:10,fontSize:12}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>แจ้งชำระ ฿{money(p.amount)}</span>{badge(p.status)}</div>

          </div>;})}
          {!["paid","cancelled"].includes(inv.status)&&<button onClick={()=>setForm({invoiceId:inv.id,amount:String(Math.max(0,Number(inv.total_amount)-Number(inv.paid_amount))),file:null})} style={{width:"100%",marginTop:12,border:"none",background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:C.navyD,borderRadius:10,padding:11,fontWeight:800,cursor:"pointer"}}>แจ้งชำระเงิน</button>}

        <input type="number" min="0" step="0.01" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="จำนวนเงิน" style={{width:"100%",padding:11,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,marginBottom:9}}/>
        <input type="file" accept="image/*" onChange={e=>setForm(p=>({...p,file:e.target.files?.[0]||null}))} style={{width:"100%",padding:10,borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:13,marginBottom:9}}/>
        <div style={{fontSize:11,color:C.g400,marginBottom:10}}>รองรับไฟล์รูปภาพ ขนาดไม่เกิน 5 MB</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setForm({invoiceId:"",amount:"",file:null})} style={{flex:1,border:"none",background:C.g100,color:C.g600,borderRadius:10,padding:11,fontWeight:700}}>ยกเลิก</button>

        </div>
      </div>}
    </div>
  );
}

function StudentHome({token,profile,studentId,studentInfo,onPageChange}){
  const [data,setData]=useState({att:[],grades:[],ann:[]});const [loading,setLoading]=useState(true);
  const [talkUnread,setTalkUnread]=useState(0);
  useEffect(()=>{
    const load=async()=>{
      let sid=studentId;
      if(!sid){const s=await sbFetch(`students?profile_id=eq.${profile.id}&select=*`,{token}).catch(()=>[]);sid=s?.[0]?.id;}
      if(!sid){setLoading(false);return;}
      const range=attendanceRangeForClass(studentInfo?.classes?.name);
      const [a,g,n]=await Promise.all([
        sbFetch("rpc/get_derived_attendance",{method:"POST",token,body:JSON.stringify({p_student_id:sid,p_date_from:range.from,p_date_to:range.to})}).catch(()=>[]),
        sbFetch(`grades?student_id=eq.${sid}&select=*&order=created_at.desc`,{token}).catch(()=>[]),
        sbFetch("announcements?select=*&order=pinned.desc,created_at.desc&limit=3",{token}).catch(()=>[]),
      ]);
      setData({att:a||[],grades:g||[],ann:n||[]});setLoading(false);
      if(["parent","teacher_parent"].includes(profile?.role)){
        const unread=await sbFetch(`parent_teacher_messages?student_id=eq.${sid}&sender_id=neq.${profile.id}&parent_read_at=is.null&select=id`,{token}).catch(()=>[]);
        setTalkUnread((unread||[]).length);
      }
    };load();
  },[token,profile,studentId]);
  if(loading)return <Spin/>;
  const sum={present:0,late:0,absent:0,leave:0};data.att.forEach(a=>{if(sum[a.status]!==undefined)sum[a.status]++;});
  const pct=data.att.length>0?Math.round(((sum.present+sum.late)/data.att.length)*100):0;
  const isParent=["parent","teacher_parent"].includes(profile?.role);
  const displayName=isParent?(studentInfo?.full_name||profile?.full_name):(profile?.full_name||studentInfo?.full_name);
  const menus=[
    {id:"att",icon:"📅",label:tx("การมาเรียน","Attendance"),bg:"linear-gradient(135deg,#16a34a,#22c55e)",action:()=>onPageChange("attend")},
    {id:"hist",icon:"🕐",label:tx("ประวัติสแกน","Scan history"),bg:"linear-gradient(135deg,#0f766e,#0d9488)",action:()=>onPageChange("checkin")},
    ...(isParent?[{id:"schedule",icon:"🗓️",label:tx("ตารางสอน","Timetable"),bg:"linear-gradient(135deg,#2563eb,#3b82f6)",action:()=>onPageChange("schedule")}]:[]),
    {id:"grade",icon:"📊",label:tx("ผลการเรียน","Grades"),bg:"linear-gradient(135deg,#7c3aed,#8b5cf6)",action:()=>onPageChange("grades")},
    {id:"ann",icon:"📢",label:tx("ประกาศ","Announcements"),bg:`linear-gradient(135deg,${C.gold},${C.goldL})`,action:()=>onPageChange("announce")},
    ...(isParent?[{id:"talk",icon:"💬",label:tx("พูดคุย","Talk"),bg:"linear-gradient(135deg,#0891b2,#06b6d4)",badge:talkUnread,action:()=>onPageChange("talk")}]:[]),
    {id:"exam",icon:"📋",label:tx("ผลสอบ","Exam results"),bg:"linear-gradient(135deg,#0369a1,#0ea5e9)",action:()=>onPageChange("exam")},
    {id:"tuition",icon:"💰",label:tx("ค่าเทอม","Tuition"),bg:"linear-gradient(135deg,#b45309,#d97706)",action:()=>onPageChange("tuition")},
    {id:"leave",icon:"📝",label:tx("แจ้งลาเรียน","Leave request"),bg:"linear-gradient(135deg,#ea580c,#f97316)",action:()=>onPageChange("leave")},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

        <div style={{position:"absolute",right:-10,top:-10,width:100,height:100,borderRadius:99,background:"rgba(201,162,39,0.12)"}}/>
        {studentInfo?.photo_path
          ? <StudentAvatar path={studentInfo.photo_path} token={token} size={58} fallback={isParent?"👪":"👩‍🎓"}/>
          : <div style={{width:58,height:58,borderRadius:99,background:C.goldP,border:`3px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{isParent?"👪":"👩‍🎓"}</div>}
        <div>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>{isParent?tx("บุตรหลาน","Child"):tx("นักเรียน","Student")}</div>

      <div style={{display:"flex",gap:10}}>
        {[{v:`${pct}%`,l:"มาเรียน",c:pct>=80?C.green:C.yellow},{v:data.grades.length,l:"วิชา",c:C.navy},{v:sum.absent,l:"ขาดเรียน",c:C.red}].map(x=>(

function TeacherHomeView({token,profile,setPage,role,email}){
  const [students,setStudents]=useState([]);const [ann,setAnn]=useState([]);const [loading,setLoading]=useState(true);
  const [studentCount,setStudentCount]=useState(0);

  const [parentRequestCount,setParentRequestCount]=useState(0);
  useEffect(()=>{
    let timer=null;
    let lastStudentIds=[];
    const refreshTalkUnread=async(stuIds=lastStudentIds)=>{
      lastStudentIds=stuIds||[];
      if(!lastStudentIds.length){setTalkUnread(0);return;}
      const unread=await sbFetch(`parent_teacher_messages?student_id=in.(${lastStudentIds.join(",")})&parent_id=not.is.null&teacher_read_at=is.null&select=id`,{token}).catch(()=>[]);
      setTalkUnread((unread||[]).length);
    };
    const load=async()=>{
      try{
        const a=await sbFetch("announcements?select=*&order=pinned.desc,created_at.desc&limit=3",{token}).catch(()=>[]);setAnn(a||[]);
        const tc=await sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id`,{token}).catch(()=>[]);
        const ids=tc?.length>0?tc.map(t=>t.class_id).join(","):null;
        const stu=ids?await sbFetch(`students?class_id=in.(${ids})&select=*,classes(name)&order=student_no.asc`,{token}).catch(()=>[]):await sbFetch("students?select=*,classes(name)&order=student_no.asc",{token}).catch(()=>[]);
        setStudents(stu||[]);
        if(role==="admin"){
          const countRows=await sbFetch("students?select=id",{token,headers:{Prefer:"count=exact"},parseCount:true}).catch(()=>({count:(stu||[]).length}));
          setStudentCount(Number(countRows?.count ?? (stu||[]).length));
          const requests=await sbFetch("rpc/list_parent_link_requests",{method:"POST",token,body:"{}"}).catch(()=>[]);
          setParentRequestCount((requests||[]).filter(r=>r.status==="pending").length);
        }else{
          setStudentCount((stu||[]).length);
          setParentRequestCount(0);
        }
        const stuIds=(stu||[]).map(s=>s.id).filter(Boolean);
        await refreshTalkUnread(stuIds);
        timer=setInterval(()=>refreshTalkUnread(),10000);
      }catch(e){}finally{setLoading(false);}
    };load();
    return()=>{if(timer)clearInterval(timer);};

  const isDirector=String(email||"").toLowerCase()==="director@klunschool.com";
  let menus=[

    role==="teacher"
      ?{id:"schedule",icon:"🗓️",label:tx("ตารางสอน","Timetable"),bg:"linear-gradient(135deg,#7c3aed,#8b5cf6)",action:()=>setPage("schedule")}
      :{id:"grade",icon:"📊",label:tx("คะแนน","Grades"),bg:"linear-gradient(135deg,#7c3aed,#8b5cf6)",action:()=>setPage("grades")},
    {id:"ann",icon:"📢",label:tx("ประกาศ","Announcements"),bg:`linear-gradient(135deg,${C.gold},${C.goldL})`,action:()=>setPage("announce")},
    {id:"talk",icon:"💬",label:tx("พูดคุย","Talk"),bg:"linear-gradient(135deg,#0891b2,#06b6d4)",badge:talkUnread,action:()=>setPage("talk")},
    {id:"leave",icon:"📝",label:tx("รับใบลา","Leave requests"),bg:"linear-gradient(135deg,#ea580c,#f97316)",action:()=>setPage("leave")},
    {id:"exam",icon:"📋",label:tx("ผลสอบ","Exam results"),bg:"linear-gradient(135deg,#0369a1,#0ea5e9)",action:()=>setPage("exam")},
    {id:"tuition",icon:"💰",label:tx("ค่าเทอม","Tuition"),bg:"linear-gradient(135deg,#b45309,#d97706)",action:()=>setPage("tuition")},
  ];
  if(["teacher","teacher_parent","admin"].includes(role))menus.push({id:"parent-report",icon:"👪",label:tx("ผู้ปกครอง","Parents"),bg:"linear-gradient(135deg,#475569,#64748b)",action:()=>setPage("parent-report")});

  if(role==="admin")menus.push({id:"student-management",icon:"🎓",label:tx("จัดการนักเรียน","Students"),bg:"linear-gradient(135deg,#0f766e,#16a34a)",action:()=>setPage("student-management")});

  if(isDirector)menus=menus.filter(item=>!["att","grade"].includes(item.id));

        <div style={{position:"absolute",right:-15,top:-15,width:110,height:110,borderRadius:99,background:"rgba(201,162,39,0.12)"}}/>
        <div style={{position:"absolute",right:20,bottom:-25,width:70,height:70,borderRadius:99,background:"rgba(201,162,39,0.08)"}}/>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <div style={{width:58,height:58,borderRadius:99,background:C.goldP,border:`3px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>👩‍🏫</div>
          <div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>คุณครู</div>
            <div style={{color:C.gold,fontSize:17,fontWeight:800}}>{profile?.full_name}</div>

        <div style={{display:"flex",gap:10}}>

        <Grid items={menus}/>

function formatThaiDateTime(value){
  if(!value)return "-";
  const date=new Date(value);
  if(Number.isNaN(date.getTime()))return "-";
  return date.toLocaleString("th-TH",{dateStyle:"medium",timeStyle:"short",timeZone:"Asia/Bangkok"});
}
