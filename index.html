async function sbFetch(path,options={}){
  const {headers:extraHeaders={},token,parseCount=false,...fetchOptions}=options;
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...fetchOptions,
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token||SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation",...extraHeaders},
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||res.statusText);}
  if(parseCount){
    const data=res.status===204?null:await res.json();
    const range=res.headers.get("content-range")||"";
    const count=Number(range.split("/")[1]);
    return {data,count:Number.isFinite(count)?count:null};
  }
  return res.status===204?null:res.json();
}

function blobToImage(blob){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("อ่านไฟล์รูปภาพไม่สำเร็จ"));};
    img.src=url;
  });
}
function canvasToBlob(canvas,type,quality){
  return new Promise(resolve=>canvas.toBlob(resolve,type,quality));
}
async function compressImageFile(file,maxBytes=1024*1024){
  if(!file||!file.type.startsWith("image/"))return file;
  if(file.size<=maxBytes)return file;
  const img=await blobToImage(file);
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");
  const maxSide=1600;
  const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
  canvas.width=Math.max(1,Math.round(img.width*scale));
  canvas.height=Math.max(1,Math.round(img.height*scale));
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  for(const quality of [0.82,0.74,0.66,0.58,0.5,0.42,0.34]){
    const blob=await canvasToBlob(canvas,"image/jpeg",quality);
    if(blob&&blob.size<=maxBytes)return new File([blob],file.name.replace(/\.[^.]+$/,"")+".jpg",{type:"image/jpeg"});
  }
  let width=canvas.width;
  let height=canvas.height;
  while(width>480&&height>480){
    width=Math.round(width*0.82);
    height=Math.round(height*0.82);
    const smaller=document.createElement("canvas");
    smaller.width=width;
    smaller.height=height;
    smaller.getContext("2d").drawImage(canvas,0,0,width,height);
    const blob=await canvasToBlob(smaller,"image/jpeg",0.38);
    if(blob&&blob.size<=maxBytes)return new File([blob],file.name.replace(/\.[^.]+$/,"")+".jpg",{type:"image/jpeg"});
  }
  throw new Error("บีบอัดรูปให้ต่ำกว่า 1 MB ไม่สำเร็จ กรุณาเลือกรูปอื่น");
}
async function cropStudentPhotoFile(file,{zoom=1,x=0,y=0}={}){
  const img=await blobToImage(file);
  const size=512;
  const canvas=document.createElement("canvas");
  canvas.width=size;
  canvas.height=size;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,size,size);
  const scale=Math.min(size/img.width,size/img.height)*zoom;
  const drawW=img.width*scale;
  const drawH=img.height*scale;
  const drawX=(size-drawW)/2+(x*size/2);
  const drawY=(size-drawH)/2+(y*size/2);
  ctx.drawImage(img,drawX,drawY,drawW,drawH);
  const blob=await canvasToBlob(canvas,"image/jpeg",0.88);
  if(!blob)throw new Error("ปรับรูปไม่สำเร็จ");
  return new File([blob],file.name.replace(/\.[^.]+$/,"")+".jpg",{type:"image/jpeg"});
}

function classSortValue(name){
  const text=String(name||"");
  const k=text.match(/^(ตอ\.?|เตรียมอนุบาล)\s*\/?\s*(\d+)?/);
  if(k)return 10+Number(k[2]||1);
  const a=text.match(/^อ\.?\s*(\d+)\s*\/\s*(\d+)/);
  if(a)return 100+Number(a[1])*10+Number(a[2]);
  const m=text.match(/(\d+)\s*\/\s*(\d+)/);
  if(m)return 1000+Number(m[1])*100+Number(m[2]);
  return 9999;
}
function formatThaiTime(value){
  if(!value)return "-";
  const raw=String(value);
  const hasTimezone=/([zZ]|[+-]\d{2}:?\d{2})$/.test(raw);
  const date=new Date(hasTimezone?raw:`${raw}Z`);
  if(Number.isNaN(date.getTime()))return "-";
  return date.toLocaleTimeString("th-TH",{
    hour:"2-digit",
    minute:"2-digit",
    hour12:false,
    timeZone:"Asia/Bangkok",
  });
}
function formatThaiDate(value){
  if(!value)return "-";
  const date=new Date(value);
  if(Number.isNaN(date.getTime()))return "-";
  return date.toLocaleDateString("th-TH",{
    day:"numeric",
    month:"long",
    year:"numeric",
    timeZone:"Asia/Bangkok",
  });
}

function ParentRegister({onBack}){
  const [form,setForm]=useState({full_name:"",email:"",student_id_no:"",password:"",confirm:""});
  const [busy,setBusy]=useState(false);const [error,setError]=useState("");const [sent,setSent]=useState(false);
  const [studentMatch,setStudentMatch]=useState(null);const [studentLookup,setStudentLookup]=useState(false);
  const inputStyle={width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white,outline:"none"};
  const set=(key,value)=>setForm(p=>({...p,[key]:value}));
  useEffect(()=>{
    let cancelled=false;
    const studentIdNo=form.student_id_no.trim();
    setStudentMatch(null);
    if(!/^\d{13}$/.test(studentIdNo)){setStudentLookup(false);return()=>{cancelled=true;};}
    setStudentLookup(true);
    lookupStudentForRegistration(studentIdNo)
      .then(result=>{if(!cancelled)setStudentMatch(result||{found:false});})
      .catch(()=>{if(!cancelled)setStudentMatch({found:false,error:true});})
      .finally(()=>{if(!cancelled)setStudentLookup(false);});
    return()=>{cancelled=true;};
  },[form.student_id_no]);
  async function submit(e){
    e.preventDefault();setError("");
    if(Object.values(form).some(v=>!String(v).trim()))return setError(tx("กรุณากรอกข้อมูลให้ครบ","Please complete all fields"));
    if(!/^\d{13}$/.test(form.student_id_no))return setError(tx("กรุณากรอกเลขบัตรนักเรียนให้ครบ 13 หลัก","Enter the student's complete 13-digit ID number"));
    if(studentLookup)return setError(tx("กำลังตรวจสอบข้อมูลนักเรียน กรุณารอสักครู่","Checking student information. Please wait."));
    if(!studentMatch?.found)return setError(tx("ไม่พบข้อมูลนักเรียน กรุณาตรวจสอบเลขบัตรอีกครั้ง","Student not found. Check the ID number."));
    if(form.password.length<8)return setError(tx("รหัสผ่านต้องมีอย่างน้อย 8 ตัว","Password must contain at least 8 characters"));
    if(form.password!==form.confirm)return setError(tx("ยืนยันรหัสผ่านไม่ตรงกัน","Passwords do not match"));
    setBusy(true);
    try{
      const existing=await checkExistingParentRegistration(form.email,form.student_id_no);
      if(existing?.student_claimed)throw new Error(tx("นักเรียนคนนี้ลงทะเบียนผู้ปกครองแล้ว","This student already has a registered parent."));
      if(existing?.email_exists)throw new Error(tx("อีเมลนี้ลงทะเบียนผู้ปกครองแล้ว กรุณากลับไปเข้าสู่ระบบ หากต้องการเพิ่มลูกให้เลือกเมนูเพิ่มบุตรหลาน","This email is already registered as a parent. Sign in and use Add child if needed."));
      await signUpParent(form);setSent(true);
    }
    catch(e){setError(e.message);}
    finally{setBusy(false);}
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px 40px"}}>
      <div style={{maxWidth:420,margin:"0 auto"}}>
        <button onClick={onBack} style={{border:"none",background:"transparent",color:C.navy,fontSize:14,cursor:"pointer",marginBottom:14}}>← {tx("กลับหน้าเข้าสู่ระบบ","Back to sign in")}</button>
        <div style={{background:C.white,borderRadius:18,padding:20,boxShadow:"0 3px 14px rgba(15,35,71,0.1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <img src="./icon-192.png" alt="" style={{width:46,height:46,objectFit:"contain"}}/>
            <div><div style={{fontSize:18,fontWeight:800,color:C.navy}}>{tx("ลงทะเบียนผู้ปกครอง","Parent registration")}</div><div style={{fontSize:12,color:C.g400}}>{tx("ยืนยันอีเมลก่อนเริ่มใช้งาน","Email confirmation required")}</div></div>
          </div>
          {sent?(
            <div style={{textAlign:"center",padding:"24px 8px"}}>
              <div style={{fontSize:50}}>📧</div>
              <div style={{fontSize:17,fontWeight:800,color:C.green,marginTop:10}}>{tx("ส่งอีเมลยืนยันแล้ว","Confirmation email sent")}</div>
              <div style={{fontSize:13,color:C.g600,lineHeight:1.6,marginTop:8}}>{tx("กรุณาเปิดอีเมล กดลิงก์ยืนยัน แล้วกลับมาเข้าสู่ระบบ ระบบจะส่งคำขอให้ผู้ดูแลตรวจสอบก่อนผูกบัญชี","Open the email, confirm your address, then return and sign in. An administrator will review the link request.")}</div>
              <button onClick={onBack} style={{marginTop:18,width:"100%",padding:11,border:"none",borderRadius:10,background:C.navy,color:C.white,fontWeight:800,cursor:"pointer"}}>{tx("ไปหน้าเข้าสู่ระบบ","Go to sign in")}</button>
            </div>
          ):(
            <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:10}}>
              <input style={inputStyle} value={form.full_name} onChange={e=>set("full_name",e.target.value)} placeholder={tx("ชื่อ-นามสกุลผู้ปกครอง","Parent full name")} autoComplete="name"/>
              <input style={inputStyle} type="email" value={form.email} onChange={e=>set("email",e.target.value)} placeholder={tx("อีเมล","Email")} autoComplete="email"/>
              <input style={inputStyle} value={form.student_id_no} onChange={e=>set("student_id_no",e.target.value.replace(/\D/g,"").slice(0,13))} placeholder={tx("เลขประจำตัวนักเรียน 13 หลัก","Student's 13-digit ID number")} inputMode="numeric" maxLength="13"/>
              {studentLookup&&<div style={{padding:"9px 11px",borderRadius:9,background:C.g100,color:C.g600,fontSize:13}}>🔎 {tx("กำลังค้นหาข้อมูลนักเรียน...","Looking up student...")}</div>}
              {!studentLookup&&studentMatch?.found&&<div style={{padding:"10px 11px",borderRadius:9,background:C.greenL,color:C.green,fontSize:13,lineHeight:1.5}}>✅ <b>{studentMatch.full_name}</b><br/>{studentMatch.class_name||"-"} · {tx("เลขที่","No.")} {studentMatch.student_no||"-"}</div>}
              {!studentLookup&&studentMatch?.error&&<div style={{padding:"9px 11px",borderRadius:9,background:C.redL,color:C.red,fontSize:13}}>⚠️ {tx("ระบบค้นหานักเรียนยังไม่พร้อม กรุณาแจ้งผู้ดูแลระบบ","Student lookup is not ready. Please contact the administrator.")}</div>}
              {!studentLookup&&studentMatch&&!studentMatch.found&&!studentMatch.error&&<div style={{padding:"9px 11px",borderRadius:9,background:C.redL,color:C.red,fontSize:13}}>⚠️ {tx("ไม่พบข้อมูลนักเรียน กรุณาตรวจสอบเลขบัตร","Student not found. Check the ID number.")}</div>}
              <input style={inputStyle} type="password" value={form.password} onChange={e=>set("password",e.target.value)} placeholder={tx("ตั้งรหัสผ่าน อย่างน้อย 8 ตัว","Create password, at least 8 characters")} autoComplete="new-password"/>
              <input style={inputStyle} type="password" value={form.confirm} onChange={e=>set("confirm",e.target.value)} placeholder={tx("ยืนยันรหัสผ่าน","Confirm password")} autoComplete="new-password"/>
              {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:9,padding:"9px 11px",fontSize:13,fontWeight:600}}>⚠️ {error}</div>}
              <button disabled={busy} style={{padding:12,border:"none",borderRadius:10,background:busy?C.g400:C.navy,color:C.white,fontSize:15,fontWeight:800,cursor:busy?"wait":"pointer"}}>{busy?tx("กำลังลงทะเบียน...","Registering..."):tx("ลงทะเบียนและส่งอีเมลยืนยัน","Register and send confirmation email")}</button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

function getRecoveryToken(){
  const params=new URLSearchParams(location.hash.replace(/^#/,""));
  return params.get("type")==="recovery"?params.get("access_token"):"";
}
function ResetPasswordView({token,onDone}){
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState("");
  async function submit(e){
    e.preventDefault();setError("");
    if(password.length<8)return setError(tx("รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว","New password must contain at least 8 characters"));
    if(password!==confirm)return setError(tx("ยืนยันรหัสผ่านไม่ตรงกัน","Passwords do not match"));
    setBusy(true);
    try{
      await updatePassword(token,password);
      await sbFetch("rpc/log_my_password_change",{method:"POST",token,body:"{}"}).catch(()=>null);
      await signOut(token);
      history.replaceState(null,"",location.pathname+location.search);
      window.alert(tx("ตั้งรหัสผ่านใหม่สำเร็จ กรุณาเข้าสู่ระบบ","Password reset successfully. Please sign in."));
      onDone();
    }catch(e2){setError(e2.message||tx("ตั้งรหัสผ่านใหม่ไม่สำเร็จ","Could not reset password"));}
    finally{setBusy(false);}
  }
  const field={width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:C.white,fontSize:15,outline:"none",boxSizing:"border-box"};
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.navyD},${C.navy} 60%,${C.navyL})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <img src="./icon-512.png" style={{width:100,height:100,objectFit:"contain",marginBottom:16}} alt="ตราโรงเรียนกลั่นวิทยา"/>
      <form onSubmit={submit} style={{width:"100%",maxWidth:360,background:"rgba(255,255,255,0.1)",borderRadius:20,padding:24,border:"1px solid rgba(255,255,255,0.2)"}}>
        <div style={{color:C.white,fontWeight:800,fontSize:18}}>🔐 {tx("ตั้งรหัสผ่านใหม่","Set a new password")}</div>
        <div style={{color:"rgba(255,255,255,0.65)",fontSize:13,margin:"5px 0 16px"}}>{tx("กรอกรหัสผ่านใหม่อย่างน้อย 8 ตัว","Enter a new password with at least 8 characters")}</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder={tx("รหัสผ่านใหม่","New password")} autoComplete="new-password" style={field}/>
          <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder={tx("ยืนยันรหัสผ่านใหม่","Confirm new password")} autoComplete="new-password" style={field}/>
          {error&&<div role="alert" style={{background:"rgba(220,38,38,0.2)",color:"#fca5a5",borderRadius:9,padding:10,fontSize:13}}>⚠️ {error}</div>}
          <button disabled={busy} style={{padding:13,border:"none",borderRadius:12,background:busy?C.g400:C.goldL,color:C.navyD,fontSize:15,fontWeight:800}}>{busy?tx("กำลังบันทึก...","Saving..."):tx("บันทึกรหัสผ่านใหม่","Save new password")}</button>
        </div>
      </form>
    </div>
  );
}

function SupportContact({onBack}){
  const [email,setEmail]=useState("");
  const [category,setCategory]=useState("login");
  const [message,setMessage]=useState("");
  const [loading,setLoading]=useState(false);
  const [sent,setSent]=useState(false);
  const [error,setError]=useState("");
  async function send(){
    const cleanEmail=email.trim().toLowerCase();
    const cleanMessage=message.trim();
    if(!cleanEmail||!cleanMessage)return setError(tx("กรุณากรอกอีเมลและรายละเอียดปัญหา","Enter your email and issue details"));
    if(/\d{13}/.test(cleanMessage))return setError(tx("กรุณาอย่าส่งเลขประจำตัวนักเรียน 13 หลัก","Do not include the student's 13-digit ID"));
    setLoading(true);setError("");
    try{
      await notifyTelegramSupport({email:cleanEmail,category,message:cleanMessage});
      setSent(true);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  }
  const fieldStyle={width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:C.white,fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"};
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.navyD},${C.navy} 60%,${C.navyL})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <img src="./icon-512.png" style={{width:96,height:96,objectFit:"contain",marginBottom:14}} alt="Klunwittaya"/>
      <div style={{color:C.gold,fontSize:22,fontWeight:800,marginBottom:24}}>{tx("ติดต่อผู้ดูแลระบบ","Contact support")}</div>
      <div style={{width:"100%",maxWidth:380,background:"rgba(255,255,255,0.1)",borderRadius:20,padding:24,border:"1px solid rgba(255,255,255,0.2)"}}>
        {sent?(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:42,marginBottom:10}}>✅</div>
            <div style={{color:C.white,fontSize:18,fontWeight:800}}>{tx("ส่งคำขอแล้ว","Request sent")}</div>
            <div style={{color:"rgba(255,255,255,0.72)",fontSize:13,lineHeight:1.6,margin:"10px 0 20px"}}>{tx("ผู้ดูแลได้รับการแจ้งเตือนแล้ว และจะติดต่อกลับทางอีเมล","The administrator has been notified and will contact you by email.")}</div>
          </div>
        ):(
          <>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder={tx("อีเมลสำหรับติดต่อกลับ","Contact email")} style={fieldStyle}/>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={fieldStyle}>
              <option value="login">{tx("เข้าสู่ระบบไม่ได้","Cannot sign in")}</option>
              <option value="registration">{tx("ปัญหาการลงทะเบียนผู้ปกครอง","Parent registration")}</option>
              <option value="approval">{tx("รอการอนุมัติบัญชี","Account approval")}</option>
              <option value="student-linked">{tx("นักเรียนถูกผูกกับบัญชีอื่น","Student linked to another account")}</option>
              <option value="other">{tx("ปัญหาอื่น ๆ","Other issue")}</option>
            </select>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} maxLength={500} rows="4" placeholder={tx("อธิบายปัญหาโดยย่อ","Briefly describe the issue")} style={{...fieldStyle,resize:"vertical"}}/>
            <div style={{background:"rgba(240,208,96,0.13)",border:"1px solid rgba(240,208,96,0.35)",borderRadius:9,padding:"9px 11px",color:C.goldL,fontSize:12,lineHeight:1.5,marginBottom:12}}>
              {tx("เพื่อความปลอดภัย ห้ามส่งรหัสผ่านหรือเลขประจำตัวนักเรียน 13 หลัก","For security, never send a password or a student's 13-digit ID.")}
            </div>
            {error&&<div style={{background:"rgba(220,38,38,0.2)",borderRadius:8,padding:"8px 12px",color:"#fca5a5",fontSize:13,marginBottom:12}}>⚠️ {error}</div>}
            <button onClick={send} disabled={loading} style={{width:"100%",padding:13,border:"none",borderRadius:12,background:loading?C.g400:C.goldL,color:C.navyD,fontWeight:800,fontSize:15,cursor:"pointer"}}>
              {loading?tx("กำลังส่ง...","Sending..."):tx("ส่งคำขอช่วยเหลือ","Send support request")}
            </button>
          </>
        )}
        <button onClick={onBack} style={{width:"100%",marginTop:10,padding:10,border:"1px solid rgba(255,255,255,0.4)",borderRadius:11,background:"transparent",color:C.white,fontWeight:700,cursor:"pointer"}}>← {tx("กลับหน้าเข้าสู่ระบบ","Back to sign in")}</button>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [lang,setLang]=useState(()=>localStorage.getItem("school_lang")||"th");
  const [register,setRegister]=useState(false);
  const [support,setSupport]=useState(false);
  const [forgot,setForgot]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  async function go(){
    if(!email||!pw){setErr("กรุณากรอกอีเมลและรหัสผ่าน");return;}
    setLoading(true);setErr("");
    try{const s=await signIn(email,pw);await submitParentRequestFromMetadata(s);const [p]=await sbFetch(`profiles?id=eq.${s.user.id}&select=*`,{token:s.access_token});await assertParentApproved(s,p);localStorage.setItem("sch",JSON.stringify({session:s,profile:p}));onLogin({session:s,profile:p});}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  function toggleLanguage(){
    const next=lang==="th"?"en":"th";
    localStorage.setItem("school_lang",next);
    setLang(next);
  }
  if(register)return <ParentRegister onBack={()=>setRegister(false)}/>;
  if(support)return <SupportContact onBack={()=>setSupport(false)}/>;
  async function sendRecovery(){
    if(!email.trim())return setErr(tx("กรุณากรอกอีเมล","Please enter your email"));
    setLoading(true);setErr("");
    try{await requestPasswordReset(email);setResetSent(true);}
    catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.navyD},${C.navy} 60%,${C.navyL})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}}>
      <button onClick={toggleLanguage} title={lang==="th"?"Switch to English":"เปลี่ยนเป็นภาษาไทย"} style={{position:"absolute",top:18,right:18,width:48,height:48,borderRadius:"50%",border:`1.5px solid ${C.gold}`,background:"rgba(255,255,255,0.12)",color:C.goldL,fontSize:13,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 12px rgba(0,0,0,0.18)"}}>
        {lang==="th"?"EN":"TH"}
      </button>
      <img src="./icon-512.png" style={{width:112,height:112,objectFit:"contain",marginBottom:16,filter:"drop-shadow(0 8px 18px rgba(0,0,0,0.3))"}} alt="ตราโรงเรียนกลั่นวิทยา"/>
      <div style={{color:C.gold,fontSize:22,fontWeight:800,marginBottom:4}}>{tx("โรงเรียนกลั่นวิทยา","Klunwittaya School")}</div>
      <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,marginBottom:32}}>{tx("ระบบแอปโรงเรียน","School application")}</div>
      <div style={{width:"100%",maxWidth:360,background:"rgba(255,255,255,0.1)",backdropFilter:"blur(12px)",borderRadius:20,padding:24,border:"1px solid rgba(255,255,255,0.2)"}}>
        <div style={{color:C.white,fontWeight:700,fontSize:17,marginBottom:16}}>{forgot?tx("ลืมรหัสผ่าน","Forgot password"):tx("เข้าสู่ระบบ","Sign in")}</div>
        {forgot&&<div style={{color:"rgba(255,255,255,0.65)",fontSize:13,marginBottom:14}}>{resetSent?tx("ส่งลิงก์แล้ว กรุณาตรวจสอบอีเมลและโฟลเดอร์จดหมายขยะ","Link sent. Check your inbox and spam folder."):tx("กรอกอีเมลที่ใช้ลงทะเบียน ระบบจะส่งลิงก์ตั้งรหัสใหม่","Enter your registered email to receive a reset link.")}</div>}
        {forgot?(
          <>
            {!resetSent&&<input type="email" placeholder={tx("อีเมล","Email")} value={email} onChange={e=>setEmail(e.target.value)} style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:C.white,fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>}
            {err&&<div style={{background:"rgba(220,38,38,0.2)",borderRadius:8,padding:"8px 12px",color:"#fca5a5",fontSize:13,marginBottom:12}}>⚠️ {err}</div>}
            {!resetSent&&<button onClick={sendRecovery} disabled={loading} style={{width:"100%",padding:13,border:"none",borderRadius:12,background:loading?C.g400:C.goldL,color:C.navyD,fontWeight:800,fontSize:15}}>{loading?tx("กำลังส่ง...","Sending..."):tx("ส่งลิงก์ตั้งรหัสใหม่","Send reset link")}</button>}
            <button onClick={()=>{setForgot(false);setResetSent(false);setErr("");}} style={{width:"100%",marginTop:10,padding:10,border:"1px solid rgba(255,255,255,0.4)",borderRadius:11,background:"transparent",color:C.white,fontWeight:700}}>← {tx("กลับหน้าเข้าสู่ระบบ","Back to sign in")}</button>
          </>
        ):(
          <>
        {[[tx("อีเมล","Email"),"email"],[tx("รหัสผ่าน","Password"),"password"]].map(([ph,type],i)=>(
          <input key={i} type={type} placeholder={ph} value={i===0?email:pw}
            onChange={e=>i===0?setEmail(e.target.value):setPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.12)",color:C.white,fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
        ))}
        {err&&<div style={{background:"rgba(220,38,38,0.2)",border:"1px solid rgba(220,38,38,0.4)",borderRadius:8,padding:"8px 12px",color:"#fca5a5",fontSize:13,marginBottom:12}}>⚠️ {err}</div>}
        <button onClick={go} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:loading?"rgba(255,255,255,0.2)":`linear-gradient(135deg,${C.gold},${C.goldL})`,color:loading?C.white:C.navyD,fontWeight:800,fontSize:16,cursor:loading?"not-allowed":"pointer",boxShadow:loading?"none":"0 4px 16px rgba(201,162,39,0.5)"}}>
          {loading?tx("กำลังเข้าสู่ระบบ...","Signing in..."):tx("เข้าสู่ระบบ","Sign in")}
        </button>
        <button onClick={()=>{setForgot(true);setErr("");}} style={{width:"100%",padding:"9px",border:"none",background:"transparent",color:C.goldL,fontSize:13,fontWeight:700,cursor:"pointer"}}>{tx("ลืมรหัสผ่าน?","Forgot password?")}</button>
        <button onClick={()=>setRegister(true)} style={{width:"100%",marginTop:10,padding:"11px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.45)",background:"transparent",color:C.white,fontWeight:700,fontSize:14,cursor:"pointer"}}>
          {tx("ลงทะเบียนผู้ปกครอง","Parent registration")}
        </button>
        <button onClick={()=>setSupport(true)} style={{width:"100%",marginTop:9,padding:"10px",border:"none",background:"transparent",color:C.goldL,fontWeight:700,fontSize:13,cursor:"pointer"}}>
          🛟 {tx("ติดต่อผู้ดูแลระบบ","Contact support")}
        </button>
          </>
        )}
      </div>
    </div>
  );
}

// ======= ATTENDANCE HISTORY =======
function AttendHist({token,studentId,studentName,role,email}){
  const [logs,setLogs]=useState([]);const [loading,setLoading]=useState(true);
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [classes,setClasses]=useState([]);const [classId,setClassId]=useState("");
  const [lastUpdated,setLastUpdated]=useState(null);
  const canChooseClass=role==="admin"||String(email||"").toLowerCase()==="director@klunschool.com";
  useEffect(()=>{
    if(!canChooseClass)return;
    sbFetch("classes?select=id,name,students(id)&order=id.asc",{token}).then(rows=>{
      const best=new Map();
      (rows||[]).forEach(c=>{
        const count=(c.students||[]).length;
        const old=best.get(c.name);
        if(!old||count>(old.students||[]).length)best.set(c.name,c);
      });
      setClasses([...best.values()].sort((a,b)=>a.id-b.id));
    }).catch(()=>setClasses([]));
  },[token,canChooseClass]);
  const load=useCallback(async(silent=false)=>{
      if(!silent)setLoading(true);
      try{
        if(studentId&&role==="parent"){
          const rows=await sbFetch("rpc/get_parent_student_checkin_history",{method:"POST",token,body:JSON.stringify({p_student_id:studentId,p_date:date})});
          setLogs(rows||[]);
        }else if(!studentId&&role==="teacher"){
          const rows=await sbFetch("rpc/get_teacher_checkin_history",{method:"POST",token,body:JSON.stringify({p_date:date})});
          setLogs(rows||[]);
        }else if(!studentId&&canChooseClass){
          const rows=await sbFetch("rpc/get_admin_checkin_history",{method:"POST",token,body:JSON.stringify({p_date:date,p_class_id:classId?Number(classId):null})});
          setLogs(rows||[]);
        }else{
          const p=studentId
            ?`checkin_log?student_id=eq.${studentId}&scanned_at=gte.${date}T00:00:00&scanned_at=lte.${date}T23:59:59&select=*,students(full_name,student_no)&order=scanned_at.asc`
            :classId
              ?`checkin_log?students.class_id=eq.${classId}&scanned_at=gte.${date}T00:00:00&scanned_at=lte.${date}T23:59:59&select=*,students!inner(full_name,student_no,class_id)&order=scanned_at.asc`
              :`checkin_log?scanned_at=gte.${date}T00:00:00&scanned_at=lte.${date}T23:59:59&select=*,students(full_name,student_no)&order=scanned_at.asc`;
          const rows=await sbFetch(p,{token});setLogs(rows||[]);
        }
        setLastUpdated(new Date());
      }catch(e){if(!silent)setLogs([]);}
      finally{if(!silent)setLoading(false);}
  },[token,studentId,date,role,classId,canChooseClass]);
  useEffect(()=>{
    load();
    const timer=setInterval(()=>load(true),10000);
    return()=>clearInterval(timer);
  },[load]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>📅 เลือกวันที่</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none"}}/>
        {canChooseClass&&<select value={classId} onChange={e=>setClassId(e.target.value)} style={{width:"100%",marginTop:10,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none",background:C.white}}>
          <option value="">{tx("ทุกห้อง","All classes")}</option>
          {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>}
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.navy}}>{studentName?`สแกนของ ${studentName}`:role==="teacher"?"ประวัติสแกนห้องประจำชั้น":"ประวัติสแกนทั้งหมด"}</div>
            <div style={{fontSize:11,color:C.g400,marginTop:2}}>● {tx("อัปเดตอัตโนมัติทุก 10 วินาที","Auto-updates every 10 seconds")}{lastUpdated?` · ${lastUpdated.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`:""}</div>
          </div>
          <button onClick={()=>load()} title={tx("รีเฟรชข้อมูล","Refresh")} style={{width:34,height:34,borderRadius:9,border:`1px solid ${C.g200}`,background:C.g50,color:C.navy,fontSize:17,cursor:"pointer"}}>↻</button>
        </div>
        {loading?<Spin/>:logs.length===0?<Empty icon="📋" msg="ไม่มีข้อมูลในวันนี้"/>:logs.map((l,i)=>(
          <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<logs.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{width:40,height:40,borderRadius:99,background:l.type==="in"?C.greenL:C.redL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{l.type==="in"?"🟢":"🔴"}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{l.students?.full_name||"—"}</div><div style={{fontSize:12,color:C.g400}}>เลขที่ {l.students?.student_no||"—"}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontWeight:700,fontSize:13,color:l.type==="in"?C.green:C.red}}>{l.type==="in"?"เข้า":"ออก"}</div><div style={{fontSize:12,color:C.g400}}>{formatThaiTime(l.scanned_at)}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ======= LEAVE REQUEST =======
function LeaveForm({token,profile,initStudents=[]}){
  const [stu,setStu]=useState(initStudents);
  const [requests,setRequests]=useState([]);
  const [form,setForm]=useState({student_id:"",date:new Date().toISOString().split("T")[0],type:"sick",reason:""});
  const [saving,setSaving]=useState(false);const [done,setDone]=useState(false);
  const loadRequests=useCallback(()=>{
    sbFetch("leave_requests?select=*,students(full_name,student_no,classes(name))&order=created_at.desc",{token})
      .then(r=>setRequests(r||[])).catch(()=>{});
  },[token]);
  useEffect(()=>{
    if(["parent","teacher_parent"].includes(profile?.role)){
      sbFetch(`parent_student?parent_id=eq.${profile.id}&select=student_id,students(id,full_name,student_no)`,{token})
        .then(r=>setStu((r||[]).map(x=>x.students))).catch(()=>{});
    }
    loadRequests();
  },[token,profile,loadRequests]);
  async function submit(){
    if(!form.student_id||!form.reason){alert("กรุณากรอกข้อมูลให้ครบ");return;}
    setSaving(true);
    try{
      await sbFetch("leave_requests",{method:"POST",token,body:JSON.stringify({
        student_id:parseInt(form.student_id),parent_id:profile.id,leave_date:form.date,
        leave_type:form.type,reason:form.reason.trim(),status:"pending"
      })});
      setDone(true);setForm({student_id:"",date:new Date().toISOString().split("T")[0],type:"sick",reason:""});loadRequests();setTimeout(()=>setDone(false),3000);
    }catch(e){alert(e.message);}finally{setSaving(false);}
  }
  const s={width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white,outline:"none"};
  const typeLabel={sick:tx("ลาป่วย","Sick leave"),personal:tx("ลากิจ","Personal leave"),other:tx("อื่นๆ","Other")};
  const statusInfo={
    pending:{label:tx("รอตรวจสอบ","Pending"),color:C.yellow,bg:C.yellowL},
    approved:{label:tx("อนุมัติแล้ว","Approved"),color:C.green,bg:C.greenL},
    rejected:{label:tx("ไม่อนุมัติ","Rejected"),color:C.red,bg:C.redL}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {done&&<div style={{background:C.greenL,color:C.green,borderRadius:12,padding:12,textAlign:"center",fontWeight:800}}>✅ {tx("ส่งใบลาสำเร็จ","Leave request submitted")}</div>}
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:14}}>📝 {tx("แจ้งลาเรียน","Request leave")}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <select style={s} value={form.student_id} onChange={e=>setForm(p=>({...p,student_id:e.target.value}))}><option value="">{tx("เลือกนักเรียน","Select student")}</option>{stu.map(x=><option key={x.id} value={x.id}>{x.full_name} ({tx("เลขที่","No.")} {x.student_no})</option>)}</select>
          <select style={s} value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}><option value="sick">🤒 {tx("ลาป่วย","Sick leave")}</option><option value="personal">📋 {tx("ลากิจ","Personal leave")}</option><option value="other">📌 {tx("อื่นๆ","Other")}</option></select>
          <input type="date" style={s} value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
          <textarea style={{...s,minHeight:72,resize:"vertical",fontFamily:"inherit"}} placeholder={tx("เหตุผลการลา *","Reason *")} value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))}/>
          <button onClick={submit} disabled={saving} style={{background:saving?C.g400:`linear-gradient(135deg,${C.navy},${C.navyL})`,color:C.white,border:"none",borderRadius:10,padding:"12px",fontSize:15,fontWeight:700,cursor:saving?"wait":"pointer"}}>{saving?tx("กำลังส่ง...","Submitting..."):tx("📤 ส่งใบลา","📤 Submit leave request")}</button>
        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:10}}>📋 {tx("ประวัติการลา","Leave history")}</div>
        {requests.length===0?<Empty icon="📭" msg={tx("ยังไม่มีใบลา","No leave requests")}/>:requests.map((r,i)=>{
          const st=statusInfo[r.status]||statusInfo.pending;
          return <div key={r.id} style={{padding:"11px 0",borderBottom:i<requests.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
              <div><div style={{fontWeight:700,fontSize:14,color:C.navy}}>{r.students?.full_name}</div><div style={{fontSize:12,color:C.g400}}>วันที่ลา {r.students?.classes?.name||"-"} · {new Date(r.leave_date+"T00:00:00").toLocaleDateString("th-TH",{dateStyle:"medium"})}</div><div style={{fontSize:11,color:C.g400,marginTop:2}}>ส่งใบลาเมื่อ {formatThaiDateTime(r.created_at)}</div></div>
              <span style={{alignSelf:"flex-start",background:st.bg,color:st.color,borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:800,whiteSpace:"nowrap"}}>{st.label}</span>
            </div>
            <div style={{fontSize:13,color:C.g600,marginTop:5}}>{typeLabel[r.leave_type]} · {r.reason}</div>
          </div>;
        })}
      </div>
    </div>
  );
}

function LeaveRequestsView({token,profile,readOnly=false}){

  const [filter,setFilter]=useState("pending");

    setLoading(true);
    sbFetch("leave_requests?select=*,students(full_name,student_no,classes(name))&order=created_at.desc",{token})
      .then(r=>setList((r||[]).sort((a,b)=>(a.status==="pending"?-1:1)-(b.status==="pending"?-1:1))))
      .catch(e=>alert(e.message)).finally(()=>setLoading(false));
  },[token]);
  useEffect(()=>{load();},[load]);
  async function review(item,status){
    setBusy(item.id);

  const shown=filter==="all"?list:list.filter(x=>x.status===filter);

        </div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {loading?<Spin/>:shown.length===0?<Empty icon="📭" msg={tx("ไม่มีใบลาในรายการนี้","No requests in this list")}/>:shown.map((r,i)=>{
          const st=statusInfo[r.status]||statusInfo.pending;

            </div>

            {r.status==="pending"&&canReview&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:9}}>
              <button disabled={busy===r.id} onClick={()=>review(r,"rejected")} style={{border:`1.5px solid ${C.red}`,borderRadius:9,padding:9,background:C.redL,color:C.red,fontWeight:800,cursor:"pointer"}}>{tx("ไม่อนุมัติ","Reject")}</button>

function AttendCheck({token,profile}){
  const [rows,setRows]=useState([]);const [loading,setLoading]=useState(true);
  const [date,setDate]=useState(localDateISO());
  const [busy,setBusy]=useState("");
  const [classes,setClasses]=useState([]);
  const [className,setClassName]=useState("all");
  const canChooseClass=profile?.role==="admin";
  useEffect(()=>{
    if(!canChooseClass)return;
    sbFetch("classes?select=id,name&order=id.asc",{token})
      .then(r=>setClasses(r||[])).catch(()=>setClasses([]));
  },[token,canChooseClass]);
  const load=useCallback((silent=false)=>{
    if(!silent)setLoading(true);
    return sbFetch("rpc/get_derived_attendance",{method:"POST",token,body:JSON.stringify({p_student_id:null,p_date_from:date,p_date_to:date})})
      .then(r=>setRows(r||[])).catch(()=>setRows([])).finally(()=>{if(!silent)setLoading(false);});
  },[token,date]);
  useEffect(()=>{load();const timer=setInterval(()=>load(true),10000);return()=>clearInterval(timer);},[load]);
  async function markPresent(student,reason){
    const key=`${student.student_id}-${reason}`;setBusy(key);
    try{
      await sbFetch("rpc/record_manual_attendance",{method:"POST",token,body:JSON.stringify({p_student_id:student.student_id,p_date:date,p_reason:reason})});
      await load(true);
    }catch(e){alert(e.message||tx("บันทึกไม่สำเร็จ","Could not save attendance"));}
    finally{setBusy("");}
  }
  async function markLeave(student,leaveType){
    const key=`${student.student_id}-leave-${leaveType}`;setBusy(key);
    try{
      await sbFetch("rpc/record_teacher_leave_attendance",{method:"POST",token,body:JSON.stringify({p_student_id:student.student_id,p_date:date,p_leave_type:leaveType})});
      await load(true);
    }catch(e){alert(e.message||tx("บันทึกการลาไม่สำเร็จ","Could not save leave"));}
    finally{setBusy("");}
  }
  const opts=[{v:"present",l:"มา",c:C.green,bg:C.greenL},{v:"late",l:"สาย",c:C.yellow,bg:C.yellowL},{v:"absent",l:"ขาด",c:C.red,bg:C.redL},{v:"leave",l:"ลา",c:C.g600,bg:C.g100}];
  const shownRows=className==="all"?rows:rows.filter(r=>r.class_name===className);
  const sum={present:0,late:0,absent:0,leave:0};shownRows.forEach(r=>{if(sum[r.status]!==undefined)sum[r.status]++;});
  if(loading)return <Spin/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:8}}>📅 {tx("เลือกวันที่","Select date")}</div>
        <input type="date" value={date} max={localDateISO()} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none",marginBottom:10}}/>
        {canChooseClass&&<select value={className} onChange={e=>setClassName(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:15,outline:"none",background:C.white,marginBottom:10}}>
          <option value="all">{tx("ทุกห้องเรียน","All classes")}</option>
          {classes.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
        </select>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{opts.map(o=><span key={o.v} style={{background:o.bg,color:o.c,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700}}>{o.l} {sum[o.v]}</span>)}</div>
      </div>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {shownRows.length===0?<Empty icon="🏫" msg="ยังไม่มีข้อมูลนักเรียน"/>:shownRows.map((s,i)=>{
          const o=opts.find(x=>x.v===s.status)||opts[2];
          return <div key={s.id} style={{padding:"12px 0",borderBottom:i<shownRows.length-1?`1px solid ${C.g100}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:99,background:C.goldP,color:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,border:`1.5px solid ${C.gold}`}}>{s.student_no||i+1}</div>
              <div style={{fontWeight:600,fontSize:14,color:C.g900,flex:1}}>{s.full_name}{s.attendance_note&&<div style={{fontSize:11,color:C.g400,fontWeight:500,marginTop:2}}>{s.attendance_note}</div>}</div>
              <span style={{background:o.bg,color:o.c,borderRadius:99,padding:"4px 10px",fontSize:12,fontWeight:800}}>{o.l}{s.scanned_time?` ${String(s.scanned_time).slice(0,5)}`:""}</span>
            </div>
            {s.status==="absent"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginLeft:40}}>
              <button disabled={!!busy} onClick={()=>markPresent(s,"forgot_card")} style={{border:`1px solid ${C.navy}`,borderRadius:8,padding:"7px 4px",background:C.white,color:C.navy,fontSize:11,fontWeight:800,cursor:"pointer"}}>{busy===`${s.student_id}-forgot_card`?tx("กำลังบันทึก...","Saving..."):tx("ลืมบัตร","Forgot card")}</button>
              <button disabled={!!busy} onClick={()=>markPresent(s,"damaged_card")} style={{border:`1px solid ${C.yellow}`,borderRadius:8,padding:"7px 4px",background:C.yellowL,color:C.yellow,fontSize:11,fontWeight:800,cursor:"pointer"}}>{busy===`${s.student_id}-damaged_card`?tx("กำลังบันทึก...","Saving..."):tx("บัตรชำรุด","Damaged card")}</button>
              <button disabled={!!busy} onClick={()=>markLeave(s,"sick")} style={{border:`1px solid ${C.green}`,borderRadius:8,padding:"7px 4px",background:C.greenL,color:C.green,fontSize:11,fontWeight:800,cursor:"pointer"}}>{busy===`${s.student_id}-leave-sick`?tx("กำลังบันทึก...","Saving..."):tx("ลาป่วย","Sick leave")}</button>
              <button disabled={!!busy} onClick={()=>markLeave(s,"personal")} style={{border:`1px solid ${C.navy}`,borderRadius:8,padding:"7px 4px",background:C.g50,color:C.navy,fontSize:11,fontWeight:800,cursor:"pointer"}}>{busy===`${s.student_id}-leave-personal`?tx("กำลังบันทึก...","Saving..."):tx("ลากิจ","Personal leave")}</button>
            </div>}
          </div>
        })}
      </div>
    </div>
  );
}

// ======= TEACHER TIMETABLE =======
function TeacherSchedule({token,profile}){
  const [row,setRow]=useState(null);
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState("");
  const load=useCallback(async()=>{
    setLoading(true);setError("");
    try{
      const rows=await sbFetch(`teacher_schedules?teacher_id=eq.${profile.id}&select=*&limit=1`,{token});
      setRow(rows?.[0]||null);
    }catch(e){setError(e.message||tx("โหลดตารางสอนไม่สำเร็จ","Could not load timetable"));}
    finally{setLoading(false);}
  },[token,profile.id]);
  useEffect(()=>{load();},[load]);
  async function upload(e){
    const file=e.target.files?.[0];
    e.target.value="";
    if(!file)return;
    if(!file.type.startsWith("image/"))return setError(tx("กรุณาเลือกไฟล์รูปภาพเท่านั้น","Please select an image file"));
    if(file.size>5*1024*1024)return setError(tx("รูปภาพต้องมีขนาดไม่เกิน 5 MB","The image must not exceed 5 MB"));
    setBusy(true);setError("");
    try{
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"")||"jpg";
      const path=`${profile.id}/schedule.${ext}`;
      await uploadTeacherSchedule(file,path,token);
      await sbFetch("teacher_schedules",{
        method:"POST",
        token,
        headers:{Prefer:"resolution=merge-duplicates,return=representation"},
        body:JSON.stringify({teacher_id:profile.id,image_path:path,updated_at:new Date().toISOString()})
      });
      await load();
    }catch(e2){setError(e2.message||tx("บันทึกตารางสอนไม่สำเร็จ","Could not save timetable"));}
    finally{setBusy(false);}
  }
  if(loading)return <Spin/>;
  const imageUrl=row?.image_path?`${teacherSchedulePublicUrl(row.image_path)}?v=${encodeURIComponent(row.updated_at||"")}`:"";
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:17,fontWeight:800,color:C.navy}}>🗓️ {tx("ตารางสอน","Teaching timetable")}</div>
        <div style={{fontSize:12,color:C.g400,marginTop:3}}>{tx("อัปโหลดเป็นไฟล์รูปภาพ ขนาดไม่เกิน 5 MB","Upload an image up to 5 MB")}</div>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:14,padding:12,borderRadius:10,background:busy?C.g400:C.navy,color:C.white,fontWeight:800,cursor:busy?"wait":"pointer"}}>
          📤 {busy?tx("กำลังอัปโหลด...","Uploading..."):row?tx("เปลี่ยนรูปตารางสอน","Replace timetable image"):tx("อัปโหลดตารางสอน","Upload timetable")}
          <input type="file" accept="image/*" onChange={upload} disabled={busy} style={{display:"none"}}/>
        </label>
      </div>
      {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:10,padding:11,fontSize:13,fontWeight:700}}>⚠️ {error}</div>}
      <div style={{background:C.white,borderRadius:16,padding:12,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {imageUrl?<img src={imageUrl} alt={tx("รูปตารางสอน","Timetable")} style={{display:"block",width:"100%",height:"auto",borderRadius:8}}/>:<Empty icon="🗓️" msg={tx("ยังไม่มีรูปตารางสอน","No timetable image yet")}/>}
      </div>
    </div>
  );
}

function StudentSchedule({token,studentId}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    let active=true;
    setLoading(true);setError("");
    sbFetch("rpc/get_student_timetable",{
      method:"POST",
      token,
      body:JSON.stringify({p_student_id:Number(studentId)})
    })
      .then(rows=>{if(active)setItems(rows||[]);})
      .catch(e=>{if(active)setError(e.message||tx("โหลดตารางสอนไม่สำเร็จ","Could not load timetable"));})
      .finally(()=>{if(active)setLoading(false);});
    return()=>{active=false;};
  },[token,studentId]);
  if(loading)return <Spin/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:17,fontWeight:800,color:C.navy}}>🗓️ {tx("ตารางสอน","Teaching timetable")}</div>
        <div style={{fontSize:12,color:C.g400,marginTop:3}}>{tx("ตารางสอนประจำห้องเรียนของบุตรหลาน","Your child's classroom timetable")}</div>
      </div>
      {error&&<div role="alert" style={{background:C.redL,color:C.red,borderRadius:10,padding:11,fontSize:13,fontWeight:700}}>⚠️ {error}</div>}
      {items.length===0
        ?<div style={{background:C.white,borderRadius:16}}><Empty icon="🗓️" msg={tx("คุณครูยังไม่ได้อัปโหลดตารางสอน","The teacher has not uploaded a timetable yet")}/></div>
        :items.map((row,i)=>{
          const imageUrl=`${teacherSchedulePublicUrl(row.image_path)}?v=${encodeURIComponent(row.updated_at||"")}`;

            <img src={imageUrl} alt={tx("รูปตารางสอน","Timetable")} style={{display:"block",width:"100%",height:"auto",borderRadius:8}}/>
          </div>;
        })}
    </div>
  );
}

// ======= GRADES =======
function Grades({token,isTeacher}){
  const [grades,setGrades]=useState([]);const [students,setStudents]=useState([]);const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({student_id:"",subject:"",score:"",term:"เทอม 1"});const [saving,setSaving]=useState(false);
  const load=useCallback(()=>{
    Promise.all([sbFetch("grades?select=*,students(full_name)&order=created_at.desc",{token}),sbFetch("students?select=id,full_name,student_no&order=student_no.asc",{token})])
      .then(([g,s])=>{setGrades(g||[]);setStudents(s||[]);}).finally(()=>setLoading(false));
  },[token]);
  useEffect(()=>{load();},[load]);
  async function add(){if(!form.student_id||!form.subject||form.score==="")return;setSaving(true);try{await sbFetch("grades",{method:"POST",token,body:JSON.stringify({...form,student_id:parseInt(form.student_id),score:parseFloat(form.score)})});setForm({student_id:"",subject:"",score:"",term:"เทอม 1"});load();}catch(e){alert(e.message);}finally{setSaving(false);}}
  if(loading)return <Spin/>;
  const s={padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,background:C.white,width:"100%",outline:"none"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {isTeacher&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>➕ เพิ่มคะแนน</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <select style={s} value={form.student_id} onChange={e=>setForm(p=>({...p,student_id:e.target.value}))}><option value="">เลือกนักเรียน</option>{students.map(x=><option key={x.id} value={x.id}>{x.full_name}</option>)}</select>
          <input style={s} placeholder="วิชา" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}/>
          <div style={{display:"flex",gap:8}}><input style={{...s,flex:1}} type="number" placeholder="คะแนน" value={form.score} onChange={e=>setForm(p=>({...p,score:e.target.value}))}/><select style={{...s,flex:1}} value={form.term} onChange={e=>setForm(p=>({...p,term:e.target.value}))}><option>เทอม 1</option><option>เทอม 2</option></select></div>
          <button onClick={add} disabled={saving} style={{background:saving?C.g400:`linear-gradient(135deg,${C.navy},${C.navyL})`,color:C.white,border:"none",borderRadius:10,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>{saving?"กำลังบันทึก...":"บันทึกคะแนน"}</button>
        </div>
      </div>}
      <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>📊 ผลการเรียน</div>
        {grades.length===0?<Empty icon="📝" msg="ยังไม่มีข้อมูล"/>:grades.map((g,i)=>(
          <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<grades.length-1?`1px solid ${C.g100}`:"none"}}>
            <div><div style={{fontWeight:600,fontSize:14}}>{g.students?.full_name}</div><div style={{fontSize:12,color:C.g400}}>{g.subject} · {g.term}</div></div>
            <div style={{fontWeight:800,fontSize:18,color:g.score>=80?C.green:g.score>=50?C.yellow:C.red}}>{g.score}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ======= ANNOUNCEMENTS =======
function Announce({token,profile}){
  const [list,setList]=useState([]);const [loading,setLoading]=useState(true);const [form,setForm]=useState({title:"",body:"",tag:"",pinned:false,class_id:""});const [saving,setSaving]=useState(false);
  const [imageFile,setImageFile]=useState(null);
  const [editing,setEditing]=useState(null);
  const [editImageFile,setEditImageFile]=useState(null);
  const [removeEditImage,setRemoveEditImage]=useState(false);
  const [isHomeroomTeacher,setIsHomeroomTeacher]=useState(false);
  const [manageableClasses,setManageableClasses]=useState([]);
  const [classLabels,setClassLabels]=useState([]);
  const role=String(profile?.role||"").toLowerCase();
  const canCreateAnnouncement=role==="admin"||isHomeroomTeacher;
  const load=useCallback(()=>{sbFetch("announcements?select=*&order=pinned.desc,created_at.desc",{token}).then(a=>setList(a||[])).finally(()=>setLoading(false));},[token]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{sbFetch("classes?select=id,name&order=id.asc",{token}).then(rows=>setClassLabels(rows||[])).catch(()=>setClassLabels([]));},[token]);
  useEffect(()=>{
    let active=true;
    if(role==="admin"){
      setIsHomeroomTeacher(false);
      sbFetch("classes?select=id,name&order=id.asc",{token}).then(rows=>{if(active)setManageableClasses(rows||[]);}).catch(()=>{if(active)setManageableClasses([]);});
      return()=>{active=false;};
    }
    if(!["teacher","teacher_parent"].includes(role)){setIsHomeroomTeacher(false);setManageableClasses([]);return;}
    sbFetch(`teacher_class?teacher_id=eq.${profile.id}&select=class_id`,{token})
      .then(rows=>{
        if(!active)return;
        const classes=(rows||[]).map(r=>{
          const label=classLabels.find(c=>Number(c.id)===Number(r.class_id));
          return label||{id:r.class_id,name:`ห้อง ${r.class_id}`};
        }).filter(Boolean);
        setManageableClasses(classes);
        setIsHomeroomTeacher(classes.length>0);
        if(classes.length===1)setForm(p=>({...p,class_id:String(classes[0].id)}));
      })
      .catch(()=>{if(active){setIsHomeroomTeacher(false);setManageableClasses([]);}});
    return()=>{active=false;};
  },[token,profile.id,role,classLabels]);
  const manageableClassIds=manageableClasses.map(c=>Number(c.id));
  const className=id=>{
    if(!id)return "ทั้งโรงเรียน";
    return classLabels.find(c=>Number(c.id)===Number(id))?.name||manageableClasses.find(c=>Number(c.id)===Number(id))?.name||`ห้อง ${id}`;
  };
  async function add(){
    if(!canCreateAnnouncement||!form.title)return;setSaving(true);
    try{
      const selectedClassId=form.class_id?Number(form.class_id):null;
      if(role!=="admin"&&!selectedClassId)throw new Error("กรุณาเลือกห้องเรียนของครูประจำชั้น");
      if(role!=="admin"&&!manageableClassIds.includes(selectedClassId))throw new Error("ครูประจำชั้นเพิ่มประกาศได้เฉพาะห้องที่รับผิดชอบ");
      let image_path=null;
      if(imageFile){
        if(!imageFile.type.startsWith("image/"))throw new Error("กรุณาแนบไฟล์รูปภาพเท่านั้น");
        if(imageFile.size>5*1024*1024)throw new Error("ไฟล์รูปประกาศต้องมีขนาดไม่เกิน 5 MB");
        const ext=(imageFile.name.split(".").pop()||"jpg").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
        image_path=`${profile.id}/${Date.now()}.${ext}`;
        await uploadAnnouncementImage(imageFile,image_path,token);
      }
      const payload={title:form.title,body:form.body,tag:form.tag,pinned:form.pinned,class_id:selectedClassId,created_by:profile.id};
      if(image_path)payload.image_path=image_path;
      await sbFetch("announcements",{method:"POST",token,body:JSON.stringify(payload)});
      setForm({title:"",body:"",tag:"",pinned:false,class_id:role==="admin"?"":(manageableClasses.length===1?String(manageableClasses[0].id):"")});setImageFile(null);load();
    }catch(e){alert(e.message);}finally{setSaving(false);}
  }
  function chooseImage(file){
    if(!file){setImageFile(null);return;}
    if(!file.type.startsWith("image/")){alert("กรุณาเลือกไฟล์รูปภาพเท่านั้น");return;}
    if(file.size>5*1024*1024){alert("ไฟล์รูปประกาศต้องมีขนาดไม่เกิน 5 MB");return;}
    setImageFile(file);
  }
  function chooseEditImage(file){
    if(!file){setEditImageFile(null);return;}
    if(!file.type.startsWith("image/")){alert("กรุณาเลือกไฟล์รูปภาพเท่านั้น");return;}
    if(file.size>5*1024*1024){alert("ไฟล์รูปประกาศต้องมีขนาดไม่เกิน 5 MB");return;}
    setEditImageFile(file);setRemoveEditImage(false);
  }
  function canManage(a){
    return role==="admin"||(["teacher","teacher_parent"].includes(role)&&manageableClassIds.includes(Number(a.class_id)));
  }
  function startEdit(a){
    setEditing({id:a.id,title:a.title||"",body:a.body||"",tag:a.tag||"",pinned:!!a.pinned,class_id:a.class_id?String(a.class_id):"",image_path:a.image_path||null});
    setEditImageFile(null);setRemoveEditImage(false);
  }
  async function saveEdit(){
    if(!editing?.title)return;setSaving(true);
    try{
      const selectedClassId=editing.class_id?Number(editing.class_id):null;
      if(role!=="admin"&&!selectedClassId)throw new Error("กรุณาเลือกห้องเรียนของครูประจำชั้น");
      if(role!=="admin"&&!manageableClassIds.includes(selectedClassId))throw new Error("ครูประจำชั้นแก้ไขได้เฉพาะห้องที่รับผิดชอบ");
      const payload={title:editing.title,body:editing.body,tag:editing.tag,pinned:editing.pinned,class_id:selectedClassId};
      if(removeEditImage)payload.image_path=null;
      if(editImageFile){
        const ext=(editImageFile.name.split(".").pop()||"jpg").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
        const image_path=`${profile.id}/${Date.now()}.${ext}`;
        await uploadAnnouncementImage(editImageFile,image_path,token);
        payload.image_path=image_path;
      }
      await sbFetch(`announcements?id=eq.${editing.id}`,{method:"PATCH",token,body:JSON.stringify(payload)});
      setEditing(null);setEditImageFile(null);setRemoveEditImage(false);load();
    }catch(e){alert(e.message);}finally{setSaving(false);}
  }
  async function deleteAnnouncement(a){
    if(!canManage(a))return;
    if(!confirm(`ลบประกาศ "${a.title}" ใช่ไหม?`))return;
    setSaving(true);
    try{await sbFetch(`announcements?id=eq.${a.id}`,{method:"DELETE",token});load();}
    catch(e){alert(e.message);}
    finally{setSaving(false);}
  }
  const inp={width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.g200}`,fontSize:14,outline:"none",boxSizing:"border-box"};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {canCreateAnnouncement&&<div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:12}}>➕ สร้างประกาศ</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <input style={inp} placeholder="หัวข้อ *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
          <textarea style={{...inp,minHeight:68,resize:"vertical",fontFamily:"inherit"}} placeholder="รายละเอียด" value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))}/>
          <select style={inp} value={form.class_id} onChange={e=>setForm(p=>({...p,class_id:e.target.value}))}>
            {role==="admin"&&<option value="">ทั้งโรงเรียน</option>}
            {manageableClasses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...inp,flex:1}} placeholder="ป้ายกำกับ" value={form.tag} onChange={e=>setForm(p=>({...p,tag:e.target.value}))}/><label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:C.navy,whiteSpace:"nowrap",cursor:"pointer"}}><input type="checkbox" checked={form.pinned} onChange={e=>setForm(p=>({...p,pinned:e.target.checked}))}/>ปักหมุด</label></div>
          <label style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,border:`1.5px dashed ${C.g200}`,borderRadius:10,padding:"10px 12px",background:C.g50,cursor:"pointer"}}>
            <span style={{fontSize:13,fontWeight:800,color:C.navy}}>🖼️ {imageFile?imageFile.name:"แนบรูปประกาศ"}</span>
            <span style={{fontSize:12,color:C.g400}}>ไม่เกิน 5 MB</span>
            <input type="file" accept="image/*" onChange={e=>chooseImage(e.target.files?.[0]||null)} style={{display:"none"}}/>
          </label>
          {imageFile&&<button type="button" onClick={()=>setImageFile(null)} style={{border:"none",background:C.redL,color:C.red,borderRadius:8,padding:"7px 10px",fontSize:12,fontWeight:800,cursor:"pointer",alignSelf:"flex-start"}}>ลบรูปที่แนบ</button>}

                  <span>🗓️</span>

            {a.body&&<div style={{fontSize:14,color:C.g700,marginTop:12,lineHeight:1.85,wordBreak:"break-word"}}>

            {a.image_path&&<img src={announcementImagePublicUrl(a.image_path)} alt="" style={{width:"100%",height:"auto",maxHeight:420,objectFit:"contain",borderRadius:12,marginTop:12,background:C.white,border:`1px solid ${C.g200}`}}/>}
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginTop:12,paddingTop:10,borderTop:`1px solid ${C.g200}`}}>
              <span style={{background:C.g100,color:C.navy,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:800}}>🏫 {className(a.class_id)}</span>
              {a.tag&&<span style={{background:C.goldP,color:C.gold,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:800}}>🏷️ {a.tag}</span>}
              {a.pinned&&<span style={{background:C.redL,color:C.red,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:800}}>ปักหมุด</span>}
              {canManage(a)&&<button onClick={()=>startEdit(a)} style={{marginLeft:"auto",border:"none",background:C.g200,color:C.navy,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:800,cursor:"pointer"}}>แก้ไข</button>}
              {canManage(a)&&<button onClick={()=>deleteAnnouncement(a)} disabled={saving} style={{border:"none",background:C.redL,color:C.red,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:800,cursor:"pointer"}}>ลบ</button>}
            </div>
            {editing?.id===a.id&&<div style={{marginTop:12,padding:12,borderRadius:12,background:C.white,border:`1px solid ${C.g200}`,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:13,fontWeight:800,color:C.navy}}>แก้ไขประกาศ</div>
              <input style={inp} placeholder="หัวข้อ *" value={editing.title} onChange={e=>setEditing(p=>({...p,title:e.target.value}))}/>
              <textarea style={{...inp,minHeight:80,resize:"vertical",fontFamily:"inherit"}} placeholder="รายละเอียด" value={editing.body} onChange={e=>setEditing(p=>({...p,body:e.target.value}))}/>
              <select style={inp} value={editing.class_id} onChange={e=>setEditing(p=>({...p,class_id:e.target.value}))}>
                {role==="admin"&&<option value="">ทั้งโรงเรียน</option>}
                {manageableClasses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...inp,flex:1}} placeholder="ป้ายกำกับ" value={editing.tag} onChange={e=>setEditing(p=>({...p,tag:e.target.value}))}/><label style={{display:"flex",alignItems:"center",gap:5,fontSize:13,color:C.navy,whiteSpace:"nowrap",cursor:"pointer"}}><input type="checkbox" checked={editing.pinned} onChange={e=>setEditing(p=>({...p,pinned:e.target.checked}))}/>ปักหมุด</label></div>
              <label style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,border:`1.5px dashed ${C.g200}`,borderRadius:10,padding:"10px 12px",background:C.g50,cursor:"pointer"}}>
                <span style={{fontSize:13,fontWeight:800,color:C.navy}}>🖼️ {editImageFile?editImageFile.name:"เปลี่ยนรูปประกาศ"}</span>
                <span style={{fontSize:12,color:C.g400}}>ไม่เกิน 5 MB</span>
                <input type="file" accept="image/*" onChange={e=>chooseEditImage(e.target.files?.[0]||null)} style={{display:"none"}}/>
